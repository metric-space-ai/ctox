name: AppSec Toolchain Proof

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "AppSec scanner profile to prove"
        required: true
        default: "minimal"
        type: choice
        options:
          - minimal
          - standard
          - full
      include_data_bundles:
        description: "Fetch pinned templates, wordlists, and Trivy DB cache"
        required: true
        default: true
        type: boolean
      attest_native:
        description: "Record current nmap/ncat/ndiff checksums after platform install"
        required: true
        default: true
        type: boolean
      smoke_timeout_seconds:
        description: "Per-scanner smoke timeout"
        required: true
        default: "45"
        type: string
      platform_scope:
        description: "Run the complete matrix or one focused platform acceptance"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows-only
          - macos-intel-only

permissions:
  contents: read

concurrency:
  group: appsec-toolchain-proof-${{ github.ref }}-${{ inputs.profile || 'minimal' }}-${{ inputs.platform_scope || 'all' }}
  cancel-in-progress: false

jobs:
  proof:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.platform_scope == 'windows-only' && '[{"os":"windows-latest","platform":"windows-x86_64","label":"Windows x86_64 deployment audit proof"}]' || inputs.platform_scope == 'macos-intel-only' && '[{"os":"macos-15-intel","platform":"macos-x86_64","label":"macOS x86_64 deployment audit proof"}]' || '[{"os":"ubuntu-22.04","platform":"linux-x86_64","label":"Linux x86_64 deployment audit proof"},{"os":"ubuntu-24.04-arm","platform":"linux-aarch64","label":"Linux aarch64 deployment audit proof"},{"os":"macos-latest","platform":"macos-aarch64","label":"macOS aarch64 deployment audit proof"},{"os":"macos-15-intel","platform":"macos-x86_64","label":"macOS x86_64 deployment audit proof"},{"os":"windows-latest","platform":"windows-x86_64","label":"Windows x86_64 deployment audit proof"}]') }}

    env:
      CARGO_TERM_COLOR: always
      APPSEC_PROFILE: ${{ inputs.profile || 'minimal' }}
      APPSEC_INCLUDE_DATA_BUNDLES: ${{ inputs.include_data_bundles }}
      APPSEC_ATTEST_NATIVE: ${{ inputs.attest_native }}
      APPSEC_SMOKE_TIMEOUT_SECONDS: ${{ inputs.smoke_timeout_seconds || '45' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Configure AppSec proof paths
        shell: bash
        run: |
          {
            echo "CARGO_TARGET_DIR=$RUNNER_TEMP/ctox-cargo-target"
            echo "APPSEC_PROOF_ROOT=$RUNNER_TEMP/ctox-appsec-proof"
            echo "APPSEC_PLATFORM=${{ matrix.platform }}"
          } >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.93.0"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.25.x"
          check-latest: true

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Linux native AppSec packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap ncat ndiff git ca-certificates pkg-config libssl-dev libfontconfig1-dev libpcap-dev

      - name: Install macOS native AppSec packages
        if: runner.os == 'macOS'
        run: |
          brew list nmap >/dev/null 2>&1 || brew install nmap

      - name: Install Windows native AppSec packages
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nmap -y --no-progress
          $candidates = @("${env:ProgramFiles(x86)}\Nmap", "${env:ProgramFiles}\Nmap")
          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              Add-Content -Path $env:GITHUB_PATH -Value $candidate
            }
          }

      - name: Build focused deployment audit CLIs
        run: |
          cargo build --locked --manifest-path src/tools/appsec-pentest/Cargo.toml
          cargo build --locked --manifest-path src/tools/web-stack/Cargo.toml --no-default-features --bin ctox-web-stack

      - name: Run AppSec toolchain proof
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$APPSEC_PROOF_ROOT/runtime/appsec/default"
          APPSEC_BIN="$CARGO_TARGET_DIR/debug/pentest"
          if [ "$RUNNER_OS" = "Windows" ]; then
            APPSEC_BIN="$CARGO_TARGET_DIR/debug/pentest.exe"
          fi
          args=(
            tools
            proof-run
            --state-dir
            "$APPSEC_PROOF_ROOT/runtime/appsec/default"
            --tools-root
            "$APPSEC_PROOF_ROOT/runtime/tools/appsec"
            --profile
            "$APPSEC_PROFILE"
            --install-missing
            --probe-versions
            --smoke-timeout
            "$APPSEC_SMOKE_TIMEOUT_SECONDS"
          )
          if [ "$APPSEC_INCLUDE_DATA_BUNDLES" != "true" ]; then
            args+=(--skip-data)
          fi
          if [ "$APPSEC_ATTEST_NATIVE" = "true" ]; then
            args+=(--attest-current-native --reviewed-by "github-actions:${RUNNER_OS}")
          fi
          "$APPSEC_BIN" "${args[@]}" --json | tee "$APPSEC_PROOF_ROOT/proof-run-output.json"
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const out = path.join(process.env.APPSEC_PROOF_ROOT, 'proof-run-output.json');
          const payload = JSON.parse(fs.readFileSync(out, 'utf8'));
          const proof = payload.proof_run || {};
          if (payload.ok !== true || proof.ready !== true) {
            console.error('AppSec toolchain proof is not ready.');
            console.error(JSON.stringify({
              ok: payload.ok,
              ready: proof.ready,
              summary: proof.summary || null,
            }, null, 2));
            process.exit(1);
          }
          NODE

      - name: Prove CTOX web-stack browser runtime
        shell: bash
        run: |
          set -euo pipefail
          WEB_BIN="$CARGO_TARGET_DIR/debug/ctox-web-stack"
          if [ "$RUNNER_OS" = "Windows" ]; then
            WEB_BIN="$CARGO_TARGET_DIR/debug/ctox-web-stack.exe"
          fi
          BROWSER_DIR="$APPSEC_PROOF_ROOT/runtime/browser/reference"
          "$WEB_BIN" --root "$APPSEC_PROOF_ROOT" browser-prepare \
            --dir "$BROWSER_DIR" \
            --install-reference \
            --install-browser \
            | tee "$APPSEC_PROOF_ROOT/browser-prepare.json"
          "$WEB_BIN" --root "$APPSEC_PROOF_ROOT" browser-automation \
            --dir "$BROWSER_DIR" \
            --script-file src/tools/appsec-pentest/fixtures/platform-browser-smoke.js \
            | tee "$APPSEC_PROOF_ROOT/browser-automation.json"
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = process.env.APPSEC_PROOF_ROOT;
          const prepare = JSON.parse(fs.readFileSync(path.join(root, 'browser-prepare.json'), 'utf8'));
          const automation = JSON.parse(fs.readFileSync(path.join(root, 'browser-automation.json'), 'utf8'));
          if (prepare?.doctor?.automation_ready !== true || prepare?.doctor?.smoke?.ok !== true) {
            throw new Error('CTOX web-stack browser doctor or smoke is not ready');
          }
          if (automation?.ok !== true || automation?.result?.ok !== true) {
            throw new Error('CTOX web-stack browser automation did not return a passing result');
          }
          NODE

      - name: Run retained deployment audit assessment
        shell: bash
        run: |
          set -euo pipefail
          APPSEC_BIN="$CARGO_TARGET_DIR/debug/pentest"
          if [ "$RUNNER_OS" = "Windows" ]; then
            APPSEC_BIN="$CARGO_TARGET_DIR/debug/pentest.exe"
          fi
          STATE_DIR="$APPSEC_PROOF_ROOT/runtime/appsec/platform-assessment"
          LAB_DIR="$APPSEC_PROOF_ROOT/lab"
          RETAINED_DIR="$APPSEC_PROOF_ROOT/retained-assessment"
          "$APPSEC_BIN" --state-dir "$STATE_DIR" \
            --tools-root "$APPSEC_PROOF_ROOT/runtime/tools/appsec" \
            lab create --out "$LAB_DIR" --json \
            | tee "$APPSEC_PROOF_ROOT/lab-create.json"
          python "$LAB_DIR/ctox-vulnerable-webapp.py" --host 127.0.0.1 --port 8766 \
            >"$APPSEC_PROOF_ROOT/lab-server.log" 2>&1 &
          LAB_PID=$!
          cleanup() {
            kill "$LAB_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          node -e "const http=require('http');let n=0;const ping=()=>http.get('http://127.0.0.1:8766/',r=>{r.resume();process.exit(0)}).on('error',()=>{if(++n>50)process.exit(1);setTimeout(ping,200)});ping()"
          "$APPSEC_BIN" --state-dir "$STATE_DIR" \
            --tools-root "$APPSEC_PROOF_ROOT/runtime/tools/appsec" lab run \
            --url http://127.0.0.1:8766 --profile full --json \
            | tee "$APPSEC_PROOF_ROOT/lab-run.json"
          "$APPSEC_BIN" --state-dir "$STATE_DIR" \
            --tools-root "$APPSEC_PROOF_ROOT/runtime/tools/appsec" artifact audit --json \
            | tee "$APPSEC_PROOF_ROOT/artifact-audit.json"
          "$APPSEC_BIN" --state-dir "$STATE_DIR" \
            --tools-root "$APPSEC_PROOF_ROOT/runtime/tools/appsec" report --format json \
            --out "$STATE_DIR/reports/deployment-audit-report.json" --json \
            | tee "$APPSEC_PROOF_ROOT/report.json"
          "$APPSEC_BIN" --state-dir "$STATE_DIR" \
            --tools-root "$APPSEC_PROOF_ROOT/runtime/tools/appsec" artifact export \
            --out "$RETAINED_DIR" --json \
            | tee "$APPSEC_PROOF_ROOT/export.json"
          "$APPSEC_BIN" --state-dir "$STATE_DIR" \
            --tools-root "$APPSEC_PROOF_ROOT/runtime/tools/appsec" artifact verify-export \
            --dir "$RETAINED_DIR" --json \
            | tee "$APPSEC_PROOF_ROOT/verify-export.json"

      - name: Validate platform acceptance contract
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = process.env.APPSEC_PROOF_ROOT;
          const read = name => JSON.parse(fs.readFileSync(path.join(root, name), 'utf8'));
          const proof = read('proof-run-output.json');
          const browserPrepare = read('browser-prepare.json');
          const browserAutomation = read('browser-automation.json');
          const lab = read('lab-run.json');
          const audit = read('artifact-audit.json');
          const report = read('report.json');
          const exported = read('export.json');
          const verified = read('verify-export.json');
          const inventoryPath = path.join(root, 'runtime', 'appsec', 'default', 'tool-inventory.json');
          const inventory = JSON.parse(fs.readFileSync(inventoryPath, 'utf8'));
          const requiredTools = (inventory.tools || []).filter(tool =>
            ['httpx', 'katana', 'nuclei'].includes(tool.name));
          const zap = (inventory.tools || []).find(tool => tool.name === 'zaproxy');
          const requiredDataBundles = (inventory.data_bundles || []).filter(bundle =>
            bundle.profile === 'minimal');
          const acceptance = {
            version: 'ctox.deployment_audit.platform_acceptance.v1',
            generated_at: new Date().toISOString(),
            platform: process.env.APPSEC_PLATFORM,
            runner_os: process.env.RUNNER_OS,
            profile: process.env.APPSEC_PROFILE,
            gates: {
              install_doctor_smoke: proof?.ok === true && proof?.proof_run?.ready === true,
              browser_doctor: browserPrepare?.doctor?.automation_ready === true && browserPrepare?.doctor?.smoke?.ok === true,
              browser_automation: browserAutomation?.ok === true && browserAutomation?.result?.ok === true,
              assessment: lab?.ok === true && lab?.scan_completed === true,
              artifact_audit: audit?.ok === true,
              report: report?.ok === true && report?.report_complete === true,
              retained_export: exported?.ok === true && verified?.ok === true,
              zap_nonblocking: zap?.default_enabled === false,
            },
            required_tools: requiredTools.map(tool => ({
              name: tool.name,
              available: tool.available,
              detected_version: tool.detected_version,
              pinned_version: tool.pinned_version,
              license: tool.license,
              checksum: tool.checksum,
              provenance: tool.provenance,
            })),
            required_data_bundles: requiredDataBundles,
          };
          acceptance.ok = Object.values(acceptance.gates).every(Boolean)
            && acceptance.required_tools.length === 3
            && acceptance.required_tools.every(tool =>
              tool.available === true
              && typeof tool.detected_version === 'string'
              && tool.detected_version.length > 0
              && typeof tool.pinned_version === 'string'
              && tool.pinned_version.length > 0
              && typeof tool.license === 'string'
              && tool.license.length > 0
              && tool.checksum?.algorithm === 'sha256'
              && /^[a-f0-9]{64}$/.test(tool.checksum?.value || ''))
            && acceptance.required_data_bundles.length > 0
            && acceptance.required_data_bundles.every(bundle => bundle.available === true);
          fs.writeFileSync(path.join(root, 'platform-acceptance.json'), `${JSON.stringify(acceptance, null, 2)}\n`);
          if (!acceptance.ok) {
            console.error(JSON.stringify(acceptance, null, 2));
            process.exit(1);
          }
          NODE

      - name: Summarize AppSec proof
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = process.env.APPSEC_PROOF_ROOT;
          const out = path.join(root, 'proof-run-output.json');
          const proofPath = path.join(root, 'runtime/tools/appsec/toolchain-proof-run.json');
          let payload = null;
          for (const candidate of [proofPath, out]) {
            if (!fs.existsSync(candidate)) continue;
            try {
              const parsed = JSON.parse(fs.readFileSync(candidate, 'utf8'));
              payload = parsed.proof_run || parsed;
              break;
            } catch (_) {}
          }
          const summary = payload?.summary || {};
          const lines = [
            `# Deployment audit platform proof`,
            ``,
            `ready: ${payload?.ready ?? 'unknown'}`,
            `profile: ${payload?.profile ?? process.env.APPSEC_PROFILE}`,
            `platform: ${payload?.platform?.os ?? process.platform}/${payload?.platform?.arch ?? process.arch}`,
            ``,
            `| Field | Value |`,
            `| --- | --- |`,
            `| required_tools | ${summary.required_tools ?? 'n/a'} |`,
            `| available_required_tools | ${summary.available_required_tools ?? 'n/a'} |`,
            `| missing_required_tools | ${summary.missing_required_tools ?? 'n/a'} |`,
            `| unverified_required_tools | ${summary.unverified_required_tools ?? 'n/a'} |`,
            `| missing_required_data_bundles | ${summary.missing_required_data_bundles ?? 'n/a'} |`,
            `| smoke_failed_or_unavailable | ${summary.smoke_failed_or_unavailable ?? 'n/a'} |`,
            ``,
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n'));
          NODE

      - name: Upload AppSec proof evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: appsec-toolchain-proof-${{ runner.os }}-${{ matrix.os }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            ${{ runner.temp }}/ctox-appsec-proof/proof-run-output.json
            ${{ runner.temp }}/ctox-appsec-proof/platform-acceptance.json
            ${{ runner.temp }}/ctox-appsec-proof/browser-prepare.json
            ${{ runner.temp }}/ctox-appsec-proof/browser-automation.json
            ${{ runner.temp }}/ctox-appsec-proof/lab-*.json
            ${{ runner.temp }}/ctox-appsec-proof/artifact-audit.json
            ${{ runner.temp }}/ctox-appsec-proof/report.json
            ${{ runner.temp }}/ctox-appsec-proof/export.json
            ${{ runner.temp }}/ctox-appsec-proof/verify-export.json
            ${{ runner.temp }}/ctox-appsec-proof/runtime/appsec/**/*.json
            ${{ runner.temp }}/ctox-appsec-proof/runtime/tools/appsec/*.json
            ${{ runner.temp }}/ctox-appsec-proof/runtime/tools/appsec/install-logs/**
            ${{ runner.temp }}/ctox-appsec-proof/runtime/tools/appsec/templates/**/.ctox-data-bundle.json
            ${{ runner.temp }}/ctox-appsec-proof/runtime/tools/appsec/wordlists/**/.ctox-data-bundle.json
            ${{ runner.temp }}/ctox-appsec-proof/runtime/tools/appsec/trivy-cache/.ctox-data-bundle.json
            ${{ runner.temp }}/ctox-appsec-proof/retained-assessment/**
