name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  check-business-os-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-22.04
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}
    name: Business OS Desktop E2E (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/apps/business-os-desktop/package-lock.json

      - name: Install Linux Electron dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libnss3 libxss1 libasound2 libgbm1 \
            libnotify4 libxtst6 xdg-utils xvfb dbus-x11 \
            gnome-keyring libsecret-tools

      - name: Install dependencies
        working-directory: src/apps/business-os-desktop
        run: npm ci

      - name: Unit tests
        working-directory: src/apps/business-os-desktop
        run: npm test

      - name: Syntax checks
        working-directory: src/apps/business-os-desktop
        run: npm run check

      - name: Release config check
        working-directory: src/apps/business-os-desktop
        run: npm run release:check

      - name: Packaged bundled helper smoke
        if: runner.os == 'macOS'
        working-directory: src/apps/business-os-desktop
        run: npm run pack:dir:bundled-runtime-smoke

      - name: Electron smokes
        if: runner.os != 'Linux'
        working-directory: src/apps/business-os-desktop
        run: npm run test:electron-smoke

      - name: Electron smokes (Linux)
        if: runner.os == 'Linux'
        working-directory: src/apps/business-os-desktop
        run: xvfb-run -a npm run test:electron-smoke

      - name: Platform keychain runtime smoke
        if: runner.os != 'Linux'
        working-directory: src/apps/business-os-desktop
        run: npm run smoke:keychain-runtime

      - name: Platform keychain runtime smoke (Linux)
        if: runner.os == 'Linux'
        working-directory: src/apps/business-os-desktop
        run: |
          dbus-run-session -- bash -lc '
            eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets)"
            export GNOME_KEYRING_CONTROL SSH_AUTH_SOCK
            npm run smoke:keychain-runtime
          '

  check-desktop:
    runs-on: ubuntu-22.04
    name: Desktop extra check (linux)

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/apps/desktop -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libfontconfig1-dev pkg-config

      - name: Check
        working-directory: src/apps/desktop
        run: cargo check --locked

      - name: Business OS WebRTC pairing tests
        working-directory: src/apps/desktop
        run: |
          cargo test --locked desktop_web_deploy_url
          cargo test --locked business_os_peer_status

  check-ctox:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: CTOX CLI check (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          components: rustfmt
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        with:
          node-version: "22"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libfontconfig1-dev pkg-config libdbus-1-dev

      - name: Business OS JS dependency bootstrap
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          npm ci --ignore-scripts --prefix src/apps/business-os
          npm audit --audit-level=low --prefix src/apps/business-os
          npm --prefix src/apps/business-os test
          npm --prefix src/apps/business-os run test:module-bundles

      - name: Format check
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo fmt --check

      - name: Business OS RxDB-only contract
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          node --check src/apps/business-os/scripts/assert-rxdb-only.mjs
          node --check src/core/rxdb/tools/browser_rust_smoke.js
          node --check src/core/rxdb/tools/browser_rust_smoke_matrix.js
          node --check src/core/rxdb/tools/browser_rust_soak.js
          node --check src/core/rxdb/tools/business_os_production_smoke_registry.js
          node --check src/core/rxdb/tools/print_soak_summary.js
          node --check src/core/rxdb/tools/assert_rxdb_soak_workflow.js
          node --check src/core/rxdb/tools/assert_js_fork_release_evidence.js
          node --check src/core/rxdb/tools/assert_js_no_package_manager.js
          node --check src/core/rxdb/tools/business_os_connection_modes_smoke.js
          node --check src/apps/business-os/scripts/assert-sync-error-classification.mjs
          node --check src/apps/business-os/scripts/assert-file-viewer-integrity.mjs
          node --check src/apps/business-os/scripts/assert-business-chat-layout.mjs
          node --check src/apps/business-os/scripts/assert-business-chat-behavior.mjs
          node --check src/apps/business-os/scripts/assert-module-conformance.mjs
          node --check src/apps/business-os/scripts/assert-production-release-docs.mjs
          node --check src/apps/business-os/scripts/assert-security-privacy-signoff.mjs
          node src/apps/business-os/scripts/assert-rxdb-only.mjs
          node src/apps/business-os/scripts/assert-module-conformance.mjs
          node src/apps/business-os/scripts/assert-production-release-docs.mjs
          node src/apps/business-os/scripts/assert-security-privacy-signoff.mjs --self-test
          node src/apps/business-os/scripts/assert-security-privacy-signoff.mjs
          node src/apps/business-os/scripts/assert-sync-error-classification.mjs
          node src/apps/business-os/scripts/assert-file-viewer-integrity.mjs
          node src/apps/business-os/scripts/assert-business-chat-layout.mjs
          node src/core/rxdb/tools/assert_rxdb_soak_workflow.js
          node src/core/rxdb/tools/assert_js_fork_release_evidence.js
          node src/core/rxdb/tools/assert_js_no_package_manager.js
          SMOKE_MATRIX_SELF_TEST=1 node src/core/rxdb/tools/browser_rust_smoke_matrix.js
          node src/apps/business-os/rxdb/tests/no-package-manager-import-smoke.mjs
          node src/apps/business-os/rxdb/tests/query-api-smoke.mjs
          node src/apps/business-os/rxdb/tests/storage-index-smoke.mjs
          node src/core/rxdb/tools/build_business_os_schema_contract.mjs
          # Full ctox-rxdb smoke + guard suite (auto-discovers every
          # *-smoke.mjs, incl. contract-drift, bundle-reproducibility and the
          # data-plane ratchet guards). The three explicit smoke invocations
          # above stay for the release-evidence contract.
          node src/apps/business-os/rxdb/tests/run-all.mjs

      - name: rxdb-rs crate tests
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        # The ctox-rxdb crate is NOT a cargo workspace member: the root
        # cargo test/check never compiles or runs its 230+ unit tests. This
        # is the only CI coverage the WebRTC data plane's Rust side has.
        run: cargo test --manifest-path src/core/rxdb/Cargo.toml --quiet

      - name: ctox-rxdb-js bundle provenance
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          node --check src/core/rxdb/tools/assert_js_fork_dependency_audit.js
          node src/core/rxdb/tools/assert_js_fork_dependency_audit.js
          node src/scripts/vendor-builds/build-ctox-rxdb-js.mjs --artifact-dir runtime/build/ctox-rxdb-js --write-provenance

      - name: Upload ctox-rxdb-js bundle evidence
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v7
        with:
          name: ctox-rxdb-js-bundle-evidence
          path: |
            runtime/build/ctox-rxdb-js/ctox-rxdb-js.mjs
            runtime/build/ctox-rxdb-js/ctox-rxdb-js.provenance.json
            src/apps/business-os/rxdb/manifest.json
            src/apps/business-os/rxdb/README.md
            src/apps/business-os/rxdb/dist/ctox-rxdb-js.mjs
            src/apps/business-os/rxdb/src/event-target.mjs
            src/apps/business-os/rxdb/src/index.mjs
            src/apps/business-os/rxdb/src/observable.mjs
            src/apps/business-os/rxdb/src/replication-webrtc.mjs
            src/apps/business-os/rxdb/src/rx-database.mjs
            src/apps/business-os/rxdb/src/schema.mjs
            src/apps/business-os/rxdb/src/storage-indexeddb.mjs
            src/apps/business-os/rxdb/src/webrtc-native.mjs
            src/apps/business-os/rxdb/tests/no-package-manager-import-smoke.mjs
            src/apps/business-os/rxdb/tests/query-api-smoke.mjs
            src/apps/business-os/rxdb/tests/storage-index-smoke.mjs
          if-no-files-found: error

      - name: Business OS command idempotency
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --locked --bin ctox native_peer_consumes_pending_business_command

      - name: Business OS schema hash parity
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --locked --bin ctox native_all_schema_hashes_match_browser_contract_fixture

      - name: Business OS file sync policy
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --locked --bin ctox sync_desktop_file_from_path_indexes_large_file_lazily_until_materialized

      - name: Business OS file chunk generations
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --locked --bin ctox sync_desktop_file_from_path_records_new_chunk_generation_after_update

      - name: Business OS file chunk retention
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --locked --bin ctox sync_desktop_file_from_path_prunes_stale_chunk_generations

      - name: Business OS file tombstones
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --locked --bin ctox sync_desktop_files_from_workspace_root_tombstones_renamed_files

      - name: Business OS production browser gate
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          npm --prefix src/apps/business-os exec playwright install --with-deps chromium
          cargo build --locked --bin ctox --no-default-features --target-dir runtime/build/core-rxdb-integration-target
          SMOKE_MODES="$(node -e "const { businessOsProductionSmokeModes } = require('./src/core/rxdb/tools/business_os_production_smoke_registry'); process.stdout.write(businessOsProductionSmokeModes.join(','));")"
          SMOKE_MODES="$SMOKE_MODES" \
          SMOKE_MATRIX_ATTEMPTS=2 \
          SMOKE_PAGE_PATH=/index.html \
          SMOKE_MODE_TIMEOUT_MS=300000 \
          SMOKE_BROWSER_WARNING_BUDGET=0 \
          SMOKE_BROWSER_REQUEST_FAILURE_BUDGET=0 \
          BUSINESS_PORT=61701 \
          SIGNALING_PORT=61702 \
          node src/core/rxdb/tools/browser_rust_smoke_matrix.js

      - name: Upload Business OS production smoke evidence
        if: matrix.target == 'x86_64-unknown-linux-gnu' && always()
        uses: actions/upload-artifact@v7
        with:
          name: business-os-production-smoke-evidence
          path: runtime/build/business-os-smoke-matrix-summary.json
          if-no-files-found: error

      - name: Check
        run: cargo check --locked --target ${{ matrix.target }}

      - name: Harness core tests
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --locked --manifest-path src/core/harness/Cargo.toml -p ctox-core compact_controller --quiet

      - name: Harness spawn liveness proof
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo test --locked --manifest-path src/core/harness/Cargo.toml -p ctox-core harness_subagent_spawn_model_is_bounded_and_leaf_only --quiet
          cargo run --locked -- process-mining spawn-liveness
