name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-desktop:
    runs-on: ubuntu-22.04
    name: Desktop extra check (linux)

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libfontconfig1-dev pkg-config

      - name: Check
        working-directory: desktop
        run: cargo check --locked

  check-ctox:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    name: CTOX CLI check (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          components: rustfmt
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libfontconfig1-dev pkg-config libdbus-1-dev

      - name: Format check
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo fmt --check

      - name: Check
        run: cargo check --locked --target ${{ matrix.target }}

      - name: Harness core tests
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --locked --manifest-path src/harness/Cargo.toml -p ctox-core compact_controller --quiet

      - name: Harness spawn liveness proof
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo test --locked --manifest-path src/harness/Cargo.toml -p ctox-core harness_subagent_spawn_model_is_bounded_and_leaf_only --quiet
          cargo run --locked -- process-mining spawn-liveness
