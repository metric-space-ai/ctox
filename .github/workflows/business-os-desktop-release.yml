name: Business OS Desktop Release

on:
  push:
    tags:
      - "business-os-desktop-v*"

permissions:
  attestations: write
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: target
  CTOX_BUILD_VERSION: ${{ github.ref_name }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            builderPlatform: mac
            arch: arm64
            artifact: ctox-business-os-desktop-macos-arm64
          - os: macos-15-intel
            builderPlatform: mac
            arch: x64
            artifact: ctox-business-os-desktop-macos-x64
          - os: ubuntu-22.04
            builderPlatform: linux
            arch: x64
            artifact: ctox-business-os-desktop-linux-x64
          - os: windows-latest
            builderPlatform: win
            arch: x64
            artifact: ctox-business-os-desktop-windows-x64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.93.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          key: business-os-desktop-release-${{ runner.os }}-${{ matrix.arch }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/apps/business-os-desktop/package-lock.json

      - name: Install Linux Electron dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libnss3 libxss1 libasound2 libgbm1 \
            libnotify4 libxtst6 xdg-utils xvfb fakeroot rpm \
            dbus-x11 gnome-keyring libsecret-tools \
            libssl-dev libfontconfig1-dev pkg-config libdbus-1-dev libcap-dev

      - name: Install dependencies
        working-directory: src/apps/business-os-desktop
        run: npm ci

      - name: Unit, syntax and release checks
        working-directory: src/apps/business-os-desktop
        run: |
          npm test
          npm run check
          npm run release:check

      - name: Electron smokes
        if: runner.os != 'Linux'
        working-directory: src/apps/business-os-desktop
        run: npm run test:electron-smoke

      - name: Electron smokes (Linux)
        if: runner.os == 'Linux'
        working-directory: src/apps/business-os-desktop
        run: xvfb-run -a npm run test:electron-smoke

      - name: Platform keychain runtime smoke
        if: runner.os != 'Linux'
        working-directory: src/apps/business-os-desktop
        run: npm run smoke:keychain-runtime

      - name: Platform keychain runtime smoke (Linux)
        if: runner.os == 'Linux'
        working-directory: src/apps/business-os-desktop
        run: |
          dbus-run-session -- bash -lc '
            eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets)"
            export GNOME_KEYRING_CONTROL SSH_AUTH_SOCK
            npm run smoke:keychain-runtime
          '

      - name: Build bundled CTOX helper
        shell: bash
        run: |
          cargo build --locked --release
          mkdir -p src/apps/business-os-desktop/resources/ctox
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/ctox.exe src/apps/business-os-desktop/resources/ctox/ctox.exe
            CTOX_HELPER=src/apps/business-os-desktop/resources/ctox/ctox.exe
          else
            cp target/release/ctox src/apps/business-os-desktop/resources/ctox/ctox
            chmod 755 src/apps/business-os-desktop/resources/ctox/ctox
            CTOX_HELPER=src/apps/business-os-desktop/resources/ctox/ctox
          fi
          CTOX_ROOT="$RUNNER_TEMP/ctox-desktop-helper-contract" "$CTOX_HELPER" business-os desktop invite --format json --display-name "Desktop Release Helper Smoke" --ttl-hours 1 > "$RUNNER_TEMP/desktop-invite.json"
          node -e "const fs=require('node:fs'); const invite=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); if(invite.type!=='ctox-business-os-invite'||invite.version!==1||invite.transport!=='webrtc'||invite.data_plane!=='rxdb-webrtc'||invite.http_bridge_available!==false||invite.secret_value_in_payload!==true||!String(invite.desktop_link||'').startsWith('ctox-business-os-desktop://pair?payload=')){throw new Error('bundled ctox helper desktop invite contract failed');}" "$RUNNER_TEMP/desktop-invite.json"

      - name: Verify macOS signing secrets
        if: matrix.builderPlatform == 'mac'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CTOX_BUSINESS_OS_DESKTOP_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CTOX_BUSINESS_OS_DESKTOP_CSC_KEY_PASSWORD }}
        run: |
          missing=0
          for variable in APPLE_ID APPLE_ID_PASSWORD APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            if [ -z "${!variable}" ]; then
              echo "::error::${variable} is required for signed/notarized macOS releases"
              missing=1
            fi
          done
          exit "$missing"

      - name: Build packaged app
        working-directory: src/apps/business-os-desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CTOX_BUSINESS_OS_DESKTOP_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CTOX_BUSINESS_OS_DESKTOP_CSC_KEY_PASSWORD }}
          CTOX_WINDOWS_STORE_RELEASE: ${{ matrix.builderPlatform == 'win' && '1' || '0' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --${{ matrix.builderPlatform }} --${{ matrix.arch }} --publish never

      - name: Release artifact smoke
        working-directory: src/apps/business-os-desktop
        run: npm run smoke:signed-artifacts -- --platform ${{ matrix.builderPlatform }} --evidence-json release/artifact-smoke-${{ matrix.builderPlatform }}-${{ matrix.arch }}.json

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact }}
          path: |
            src/apps/business-os-desktop/release/*.AppImage
            src/apps/business-os-desktop/release/*.appx
            src/apps/business-os-desktop/release/*.blockmap
            src/apps/business-os-desktop/release/*.deb
            src/apps/business-os-desktop/release/*.dmg
            src/apps/business-os-desktop/release/*.json
            src/apps/business-os-desktop/release/*.yml
            src/apps/business-os-desktop/release/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Publish Business OS Desktop release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release checksums
        working-directory: artifacts
        run: find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Sign release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/**/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          name: CTOX Business OS Desktop ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: true
          files: artifacts/*
