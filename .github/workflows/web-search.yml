name: web-search

# E2E coverage for the `ctox web search` provider cascade.
#
# Quick mode (push/PR, ~30s with build cache): shape-check via mock plus
# one auto-cascade probe against the live web. Validates that the
# canonical search envelope still serializes correctly and that the
# router returns usable hits without an explicit provider pin.
#
# Full mode (workflow_dispatch): also probes each HTTP-only provider
# individually (brave, duckduckgo, bing). Use when changing
# src/tools/web-stack/src/web_search.rs near the provider cascade,
# quality gate, or per-provider scrape logic.

on:
  push:
    branches: [main]
    paths:
      - 'src/tools/web-stack/src/web_search.rs'
      - 'src/tools/web-stack/src/surface.rs'
      - 'src/tools/web-stack/src/sources/**'
      - 'src/tools/web-stack/scripts/test_web_search_e2e.sh'
      - '.github/workflows/web-search.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/tools/web-stack/src/web_search.rs'
      - 'src/tools/web-stack/src/surface.rs'
      - 'src/tools/web-stack/src/sources/**'
      - 'src/tools/web-stack/scripts/test_web_search_e2e.sh'
      - '.github/workflows/web-search.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which mode to run'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - full

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  search-e2e:
    runs-on: ubuntu-22.04
    name: ctox web search E2E (${{ github.event.inputs.mode || 'quick' }})

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          key: web-search

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libfontconfig1-dev pkg-config libdbus-1-dev \
            jq sqlite3

      - name: Build ctox
        run: cargo build --locked -p ctox

      - name: Run search E2E
        env:
          CTOX_SKIP_NETWORK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full' && '0' || '1' }}
          WEB_SEARCH_MODE: ${{ github.event.inputs.mode || 'quick' }}
        run: |
          if [[ "$WEB_SEARCH_MODE" == "full" ]]; then
            src/tools/web-stack/scripts/test_web_search_e2e.sh
          else
            src/tools/web-stack/scripts/test_web_search_e2e.sh --quick
          fi
