name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: target
  CTOX_BUILD_VERSION: ${{ github.ref_name }}

jobs:
  business-os-production-gate:
    runs-on: ubuntu-22.04
    name: Business OS production gate

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          components: rustfmt

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/apps/business-os/package-lock.json

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: business-os-production-gate

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libfontconfig1-dev pkg-config libdbus-1-dev libcap-dev

      - name: Business OS JS dependency bootstrap
        run: |
          npm ci --ignore-scripts --prefix src/apps/business-os
          npm audit --audit-level=low --prefix src/apps/business-os
          npm --prefix src/apps/business-os test
          npm --prefix src/apps/business-os run test:module-bundles

      - name: Business OS production contract checks
        run: |
          node --check src/apps/business-os/scripts/assert-rxdb-only.mjs
          node --check src/core/rxdb/tools/browser_rust_smoke.js
          node --check src/core/rxdb/tools/browser_rust_smoke_matrix.js
          node --check src/core/rxdb/tools/business_os_production_smoke_registry.js
          node --check src/apps/business-os/scripts/assert-module-conformance.mjs
          node --check src/apps/business-os/scripts/assert-production-release-docs.mjs
          node --check src/apps/business-os/scripts/assert-security-privacy-signoff.mjs
          node src/apps/business-os/scripts/assert-rxdb-only.mjs
          node src/apps/business-os/scripts/assert-module-conformance.mjs
          node src/apps/business-os/scripts/assert-production-release-docs.mjs
          node src/apps/business-os/scripts/assert-security-privacy-signoff.mjs --self-test
          node src/apps/business-os/scripts/assert-security-privacy-signoff.mjs
          SMOKE_MATRIX_SELF_TEST=1 node src/core/rxdb/tools/browser_rust_smoke_matrix.js
          node src/apps/business-os/rxdb/tests/run-all.mjs
          cargo test --locked --bin ctox business_os --quiet
          cargo test --locked --manifest-path src/core/rxdb/Cargo.toml --quiet

      - name: Business OS production browser gate
        run: |
          npm --prefix src/apps/business-os exec playwright install --with-deps chromium
          cargo build --locked --bin ctox --no-default-features --target-dir runtime/build/core-rxdb-integration-target
          SMOKE_MODES="$(node -e "const { businessOsProductionSmokeModes } = require('./src/core/rxdb/tools/business_os_production_smoke_registry'); process.stdout.write(businessOsProductionSmokeModes.join(','));")"
          SMOKE_MODES="$SMOKE_MODES" \
          SMOKE_MATRIX_ATTEMPTS=2 \
          SMOKE_PAGE_PATH=/index.html \
          SMOKE_MODE_TIMEOUT_MS=600000 \
          SMOKE_BROWSER_WARNING_BUDGET=0 \
          SMOKE_BROWSER_REQUEST_FAILURE_BUDGET=0 \
          BUSINESS_PORT=61721 \
          SIGNALING_PORT=61722 \
          node src/core/rxdb/tools/browser_rust_smoke_matrix.js

      - name: Business OS release docs dry-run evidence
        if: always()
        run: node src/apps/business-os/scripts/assert-production-release-docs.mjs

      - name: Business OS security/privacy release signoff
        if: always()
        run: node src/apps/business-os/scripts/assert-security-privacy-signoff.mjs --require-signed-off

      - name: Upload Business OS production smoke evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: business-os-release-production-smoke-evidence
          path: |
            runtime/build/business-os-smoke-matrix-summary.json
            runtime/build/business-os-release-docs-dry-run.json
            runtime/build/business-os-security-privacy-signoff-validation.json
            docs/business-os-security-privacy-signoff.json
            docs/business-os-production-release-signoff.md
            docs/business-os-app-access-and-roles-guide.md
            docs/business-os-roles-permissions-operator-guide.md
          if-no-files-found: error

  build-desktop-macos:
    needs: business-os-production-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ctox-desktop-macos-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: ctox-desktop-macos-x64

    runs-on: ${{ matrix.os }}
    name: Desktop .dmg — ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/apps/desktop -> target
          key: desktop-${{ matrix.target }}

      - name: Build desktop app
        working-directory: src/apps/desktop
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Create .app bundle and .dmg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="CTOX Desktop.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # Copy binary
          cp src/apps/desktop/target/${{ matrix.target }}/release/ctox-desktop "$APP/Contents/MacOS/"

          # Copy Info.plist
          cp src/apps/desktop/packaging/macos/Info.plist "$APP/Contents/"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$APP/Contents/Info.plist"

          # Create .icns from PNG
          ICONSET="AppIcon.iconset"
          mkdir -p "$ICONSET"
          sips -z 16 16     src/apps/desktop/CTOX_app_icon.png --out "$ICONSET/icon_16x16.png"
          sips -z 32 32     src/apps/desktop/CTOX_app_icon.png --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32     src/apps/desktop/CTOX_app_icon.png --out "$ICONSET/icon_32x32.png"
          sips -z 64 64     src/apps/desktop/CTOX_app_icon.png --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128   src/apps/desktop/CTOX_app_icon.png --out "$ICONSET/icon_128x128.png"
          sips -z 256 256   src/apps/desktop/CTOX_app_icon.png --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256   src/apps/desktop/CTOX_app_icon.png --out "$ICONSET/icon_256x256.png"
          sips -z 512 512   src/apps/desktop/CTOX_app_icon.png --out "$ICONSET/icon_256x256@2x.png"
          sips -z 512 512   src/apps/desktop/CTOX_app_icon.png --out "$ICONSET/icon_512x512.png"
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"

          # Create .dmg
          hdiutil create -volname "CTOX Desktop" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "${{ matrix.artifact }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.dmg

  build-desktop-linux:
    needs: business-os-production-gate
    runs-on: ubuntu-22.04
    name: Desktop .AppImage — linux-x64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/apps/desktop -> target
          key: desktop-x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libfontconfig1-dev pkg-config \
            fuse libfuse2 imagemagick

      - name: Build desktop app
        working-directory: src/apps/desktop
        run: cargo build --locked --release

      - name: Create AppImage
        run: |
          # Download linuxdeploy
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage

          # Build AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp src/apps/desktop/target/release/ctox-desktop AppDir/usr/bin/
          cp src/apps/desktop/packaging/linux/ctox-desktop.desktop AppDir/usr/share/applications/
          convert src/apps/desktop/CTOX_app_icon.png -resize 256x256 ctox-desktop.png
          cp ctox-desktop.png AppDir/usr/share/icons/hicolor/256x256/apps/ctox-desktop.png

          # Create AppImage
          export OUTPUT="ctox-desktop-linux-x64.AppImage"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file src/apps/desktop/packaging/linux/ctox-desktop.desktop \
            --icon-file ctox-desktop.png \
            --output appimage

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ctox-desktop-linux-x64
          path: ctox-desktop-linux-x64.AppImage

  build-desktop-windows:
    needs: business-os-production-gate
    runs-on: windows-latest
    name: Desktop .msi — windows-x64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/apps/desktop -> target
          key: desktop-x86_64-pc-windows-msvc

      - name: Build desktop app
        working-directory: src/apps/desktop
        run: cargo build --locked --release --target x86_64-pc-windows-msvc

      - name: Create .ico from PNG
        shell: pwsh
        run: |
          magick src/apps/desktop/CTOX_app_icon.png -define icon:auto-resize=256,128,64,48,32,16 src/apps/desktop/packaging/windows/ctox-desktop.ico

      - name: Build .msi with WiX
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')

          # Copy binary and icon to WiX source directory
          Copy-Item "src\apps\desktop\target\x86_64-pc-windows-msvc\release\ctox-desktop.exe" "src\apps\desktop\packaging\windows\"
          (Get-Content "src\apps\desktop\packaging\windows\main.wxs" -Raw) `
            -creplace '(?m)^        Version="[^"]+">$', "        Version=""$version"">" `
            | Set-Content "src\apps\desktop\packaging\windows\main.release.wxs" -Encoding ascii

          # WiX v3 is pre-installed on windows-latest runners
          & "C:\Program Files (x86)\WiX Toolset v3.14\bin\candle.exe" `
            -arch x64 `
            -ext WixUIExtension `
            -out src\apps\desktop\packaging\windows\main.wixobj `
            src\apps\desktop\packaging\windows\main.release.wxs

          & "C:\Program Files (x86)\WiX Toolset v3.14\bin\light.exe" `
            -ext WixUIExtension `
            -out ctox-desktop-windows-x64.msi `
            src\apps\desktop\packaging\windows\main.wixobj

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ctox-desktop-windows-x64
          path: ctox-desktop-windows-x64.msi

  build-business-os-desktop:
    needs: business-os-production-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            builderPlatform: mac
            arch: arm64
            artifact: ctox-business-os-desktop-macos-arm64
          - os: macos-15-intel
            builderPlatform: mac
            arch: x64
            artifact: ctox-business-os-desktop-macos-x64
          - os: ubuntu-22.04
            builderPlatform: linux
            arch: x64
            artifact: ctox-business-os-desktop-linux-x64
          - os: windows-latest
            builderPlatform: win
            arch: x64
            artifact: ctox-business-os-desktop-windows-x64

    runs-on: ${{ matrix.os }}
    name: Business OS Desktop — ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: business-os-desktop-helper-${{ runner.os }}-${{ matrix.arch }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/apps/business-os-desktop/package-lock.json

      - name: Install Linux Electron dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libnss3 libxss1 libasound2 libgbm1 \
            libnotify4 libxtst6 xdg-utils xvfb fakeroot rpm \
            dbus-x11 gnome-keyring libsecret-tools \
            libssl-dev libfontconfig1-dev pkg-config libdbus-1-dev libcap-dev

      - name: Install dependencies
        working-directory: src/apps/business-os-desktop
        run: npm ci

      - name: Unit and syntax checks
        working-directory: src/apps/business-os-desktop
        run: |
          npm test
          npm run check
          npm run release:check

      - name: Electron smokes
        if: runner.os != 'Linux'
        working-directory: src/apps/business-os-desktop
        run: npm run test:electron-smoke

      - name: Electron smokes (Linux)
        if: runner.os == 'Linux'
        working-directory: src/apps/business-os-desktop
        run: xvfb-run -a npm run test:electron-smoke

      - name: Platform keychain runtime smoke
        if: runner.os != 'Linux'
        working-directory: src/apps/business-os-desktop
        run: npm run smoke:keychain-runtime

      - name: Platform keychain runtime smoke (Linux)
        if: runner.os == 'Linux'
        working-directory: src/apps/business-os-desktop
        run: |
          dbus-run-session -- bash -lc '
            eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets)"
            export GNOME_KEYRING_CONTROL SSH_AUTH_SOCK
            npm run smoke:keychain-runtime
          '

      - name: Build bundled CTOX helper
        shell: bash
        run: |
          cargo build --locked --release
          mkdir -p src/apps/business-os-desktop/resources/ctox
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/ctox.exe src/apps/business-os-desktop/resources/ctox/ctox.exe
            CTOX_HELPER=src/apps/business-os-desktop/resources/ctox/ctox.exe
          else
            cp target/release/ctox src/apps/business-os-desktop/resources/ctox/ctox
            chmod 755 src/apps/business-os-desktop/resources/ctox/ctox
            CTOX_HELPER=src/apps/business-os-desktop/resources/ctox/ctox
          fi
          CTOX_ROOT="$RUNNER_TEMP/ctox-desktop-helper-contract" "$CTOX_HELPER" business-os desktop invite --format json --display-name "Desktop Release Helper Smoke" --ttl-hours 1 > "$RUNNER_TEMP/desktop-invite.json"
          node -e "const fs=require('node:fs'); const invite=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); if(invite.type!=='ctox-business-os-invite'||invite.version!==1||invite.transport!=='webrtc'||invite.data_plane!=='rxdb-webrtc'||invite.http_bridge_available!==false||invite.secret_value_in_payload!==true||!String(invite.desktop_link||'').startsWith('ctox-business-os-desktop://pair?payload=')){throw new Error('bundled ctox helper desktop invite contract failed');}" "$RUNNER_TEMP/desktop-invite.json"

      - name: Verify macOS signing secrets
        if: matrix.builderPlatform == 'mac'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CTOX_BUSINESS_OS_DESKTOP_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CTOX_BUSINESS_OS_DESKTOP_CSC_KEY_PASSWORD }}
        run: |
          missing=0
          for variable in APPLE_ID APPLE_ID_PASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            if [ -z "${!variable}" ]; then
              echo "::error::${variable} is required for signed/notarized macOS Business OS Desktop releases"
              missing=1
            fi
          done
          exit "$missing"

      - name: Build packaged app
        working-directory: src/apps/business-os-desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CTOX_BUSINESS_OS_DESKTOP_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CTOX_BUSINESS_OS_DESKTOP_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --${{ matrix.builderPlatform }} --${{ matrix.arch }} --publish never

      - name: Release artifact smoke
        working-directory: src/apps/business-os-desktop
        run: npm run smoke:signed-artifacts -- --platform ${{ matrix.builderPlatform }} --evidence-json release/artifact-smoke-${{ matrix.builderPlatform }}-${{ matrix.arch }}.json

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: src/apps/business-os-desktop/release/*
          if-no-files-found: error

  build-ctox:
    needs: business-os-production-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: ctox-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: ctox-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ctox-macos-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: ctox-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ctox-windows-x64

    runs-on: ${{ matrix.os }}
    name: CTOX CLI — ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ctox-${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libfontconfig1-dev pkg-config libdbus-1-dev libcap-dev

      - name: Build CTOX
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Release harness spawn liveness proof (Unix)
        if: runner.os != 'Windows'
        run: target/${{ matrix.target }}/release/ctox process-mining spawn-liveness

      - name: Release harness spawn liveness proof (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: target\${{ matrix.target }}\release\ctox.exe process-mining spawn-liveness

      - name: Package runtime bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p bundle/target/release
          cp target/${{ matrix.target }}/release/ctox bundle/target/release/
          cp -r src/skills bundle/skills
          mkdir -p bundle/rxdb-js
          mkdir -p bundle/rxdb-js/app-local/dist
          mkdir -p bundle/rxdb-js/app-local/src
          mkdir -p bundle/rxdb-js/app-local/tests
          cp src/apps/business-os/rxdb/manifest.json bundle/rxdb-js/app-local/
          cp src/apps/business-os/rxdb/README.md bundle/rxdb-js/app-local/
          cp src/apps/business-os/rxdb/dist/ctox-rxdb-js.mjs bundle/rxdb-js/app-local/dist/
          cp src/apps/business-os/rxdb/src/*.mjs bundle/rxdb-js/app-local/src/
          cp src/apps/business-os/rxdb/tests/*.mjs bundle/rxdb-js/app-local/tests/
          cp install.sh bundle/
          cp LICENSE bundle/
          cp docs/legal/NOTICE bundle/NOTICE
          cd bundle && tar czf ../${{ matrix.artifact }}.tar.gz .
          cd .. && shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package runtime bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bundle\target\release | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\ctox.exe" "bundle\target\release\"
          Copy-Item -Path "src\skills" -Destination "bundle\skills" -Recurse
          New-Item -ItemType Directory -Force bundle\rxdb-js | Out-Null
          New-Item -ItemType Directory -Force bundle\rxdb-js\app-local\dist | Out-Null
          New-Item -ItemType Directory -Force bundle\rxdb-js\app-local\src | Out-Null
          New-Item -ItemType Directory -Force bundle\rxdb-js\app-local\tests | Out-Null
          Copy-Item -Path "src\apps\business-os\rxdb\manifest.json" -Destination "bundle\rxdb-js\app-local\"
          Copy-Item -Path "src\apps\business-os\rxdb\README.md" -Destination "bundle\rxdb-js\app-local\"
          Copy-Item -Path "src\apps\business-os\rxdb\dist\ctox-rxdb-js.mjs" -Destination "bundle\rxdb-js\app-local\dist\"
          Copy-Item -Path "src\apps\business-os\rxdb\src\*.mjs" -Destination "bundle\rxdb-js\app-local\src\"
          Copy-Item -Path "src\apps\business-os\rxdb\tests\*.mjs" -Destination "bundle\rxdb-js\app-local\tests\"
          Copy-Item -Path "install.sh", "LICENSE" -Destination "bundle\"
          Copy-Item -Path "docs\legal\NOTICE" -Destination "bundle\NOTICE"
          Compress-Archive -Path "bundle\*" -DestinationPath "${{ matrix.artifact }}.zip" -Force
          $hash = (Get-FileHash "${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${{ matrix.artifact }}.zip" | Set-Content "${{ matrix.artifact }}.zip.sha256" -NoNewline

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256
          if-no-files-found: error

  release:
    needs: [business-os-production-gate, build-desktop-macos, build-desktop-linux, build-desktop-windows, build-business-os-desktop, build-ctox]
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
