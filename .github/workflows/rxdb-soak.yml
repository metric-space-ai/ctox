name: RxDB WebRTC Soak

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_call:
    inputs:
      cycles:
        type: string
        default: "3"
      modes:
        type: string
        default: "browser-to-rust,command-browser-to-rust,tickets-browser-to-rust,business-os-app-release-ui,business-os-app-audience-ui,migration-version-browser-to-rust,command-burst-browser-to-rust,command-reload-browser-to-rust,workspace-rust-to-browser,workspace-agent-artifacts-rust-to-browser,workspace-agent-artifacts-stress-rust-to-browser,workspace-agent-artifacts-churn-rust-to-browser,workspace-agent-artifacts-background-rust-to-browser,workspace-update-rust-to-browser,workspace-large-materialize-rust-to-browser,workspace-large-file-viewer-rust-to-browser,workspace-large-file-viewer-restart-rust-to-browser,restart-browser-to-rust,restart-signaling-browser-to-rust,rollover-native-peer-browser-to-rust,tab-freeze-browser-to-rust,network-flap-browser-to-rust,command-midflight-restart-browser-to-rust,signaling-error-browser-status,peer-lifecycle-browser-status,checkpoint-error-browser-status,rxdb-protocol-error-browser-status,schema-error-browser-status,replication-error-browser-status,replication-push-contract-error-browser-status,file-chunk-metadata-error-browser-status,file-chunk-tombstone-error-browser-status,file-chunk-stale-generation-error-browser-status"
      fail_on_retry:
        type: string
        default: "true"
      require_release_coverage:
        type: string
        default: "true"
  workflow_dispatch:
    inputs:
      cycles:
        description: "Number of soak cycles"
        required: true
        default: "3"
      modes:
        description: "Comma-separated smoke modes"
        required: true
        default: "browser-to-rust,command-browser-to-rust,tickets-browser-to-rust,business-os-app-release-ui,business-os-app-audience-ui,migration-version-browser-to-rust,command-burst-browser-to-rust,command-reload-browser-to-rust,workspace-rust-to-browser,workspace-agent-artifacts-rust-to-browser,workspace-agent-artifacts-stress-rust-to-browser,workspace-agent-artifacts-churn-rust-to-browser,workspace-agent-artifacts-background-rust-to-browser,workspace-update-rust-to-browser,workspace-large-materialize-rust-to-browser,workspace-large-file-viewer-rust-to-browser,workspace-large-file-viewer-restart-rust-to-browser,restart-browser-to-rust,restart-signaling-browser-to-rust,rollover-native-peer-browser-to-rust,tab-freeze-browser-to-rust,network-flap-browser-to-rust,command-midflight-restart-browser-to-rust,signaling-error-browser-status,peer-lifecycle-browser-status,checkpoint-error-browser-status,rxdb-protocol-error-browser-status,schema-error-browser-status,replication-error-browser-status,replication-push-contract-error-browser-status,file-chunk-metadata-error-browser-status,file-chunk-tombstone-error-browser-status,file-chunk-stale-generation-error-browser-status"
      fail_on_retry:
        description: "Fail when a smoke mode needed a retry"
        required: true
        default: "true"
      require_release_coverage:
        description: "Fail unless all release smoke modes are included"
        required: true
        default: "true"

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target
  PLAYWRIGHT_MODULE_PATH: /tmp/ctox-pw-smoke/node_modules/playwright

jobs:
  rxdb-webrtc-soak:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.93.0"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          key: rxdb-soak

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev libfontconfig1-dev pkg-config libdbus-1-dev

      - name: Install Playwright runtime
        run: |
          mkdir -p /tmp/ctox-pw-smoke
          npm --prefix /tmp/ctox-pw-smoke init -y
          npm --prefix /tmp/ctox-pw-smoke install playwright@1.57.0
          npm --prefix /tmp/ctox-pw-smoke exec playwright install --with-deps chromium

      - name: Build CTOX smoke binary
        run: cargo build --locked --bin ctox --no-default-features --target-dir runtime/build/core-rxdb-integration-target

      - name: Run CTOX Documents restart gate
        env:
          SMOKE_MODES: office-document-midflight-restart-browser-to-rust
          SMOKE_MATRIX_ATTEMPTS: "1"
          SMOKE_PAGE_PATH: /index.html
          BUSINESS_PORT: "8980"
          SIGNALING_PORT: "18980"
          SMOKE_MATRIX_RESULT_PATH: runtime/build/office-document-restart-matrix.json
        run: node src/core/rxdb/tools/browser_rust_smoke_matrix.js

      - name: Run CTOX Spreadsheets restart gate
        env:
          SMOKE_MODES: office-spreadsheet-midflight-restart-browser-to-rust
          SMOKE_MATRIX_ATTEMPTS: "1"
          SMOKE_PAGE_PATH: /index.html
          BUSINESS_PORT: "8981"
          SIGNALING_PORT: "18981"
          SMOKE_MATRIX_RESULT_PATH: runtime/build/office-spreadsheet-restart-matrix.json
        run: node src/core/rxdb/tools/browser_rust_smoke_matrix.js

      - name: Run RxDB WebRTC soak
        env:
          SOAK_CYCLES: ${{ inputs.cycles || (github.event_name == 'schedule' && '9' || '3') }}
          SOAK_MIN_CYCLES: ${{ (github.event_name == 'schedule' || inputs.require_release_coverage == 'true') && '3' || '' }}
          SOAK_MODES: ${{ inputs.modes || 'browser-to-rust,command-browser-to-rust,tickets-browser-to-rust,business-os-app-release-ui,business-os-app-audience-ui,migration-version-browser-to-rust,command-burst-browser-to-rust,command-reload-browser-to-rust,workspace-rust-to-browser,workspace-agent-artifacts-rust-to-browser,workspace-agent-artifacts-stress-rust-to-browser,workspace-agent-artifacts-churn-rust-to-browser,workspace-agent-artifacts-background-rust-to-browser,workspace-update-rust-to-browser,workspace-large-materialize-rust-to-browser,workspace-large-file-viewer-rust-to-browser,workspace-large-file-viewer-restart-rust-to-browser,restart-browser-to-rust,restart-signaling-browser-to-rust,rollover-native-peer-browser-to-rust,tab-freeze-browser-to-rust,network-flap-browser-to-rust,command-midflight-restart-browser-to-rust,signaling-error-browser-status,peer-lifecycle-browser-status,checkpoint-error-browser-status,rxdb-protocol-error-browser-status,schema-error-browser-status,replication-error-browser-status,replication-push-contract-error-browser-status,file-chunk-metadata-error-browser-status,file-chunk-tombstone-error-browser-status,file-chunk-stale-generation-error-browser-status' }}
          SOAK_REQUIRED_MODES: ${{ (github.event_name == 'schedule' || inputs.require_release_coverage == 'true') && 'browser-to-rust,command-browser-to-rust,tickets-browser-to-rust,business-os-app-release-ui,business-os-app-audience-ui,migration-version-browser-to-rust,command-burst-browser-to-rust,command-reload-browser-to-rust,workspace-rust-to-browser,workspace-agent-artifacts-rust-to-browser,workspace-agent-artifacts-stress-rust-to-browser,workspace-agent-artifacts-churn-rust-to-browser,workspace-agent-artifacts-background-rust-to-browser,workspace-update-rust-to-browser,workspace-large-materialize-rust-to-browser,workspace-large-file-viewer-rust-to-browser,workspace-large-file-viewer-restart-rust-to-browser,restart-browser-to-rust,restart-signaling-browser-to-rust,rollover-native-peer-browser-to-rust,tab-freeze-browser-to-rust,network-flap-browser-to-rust,command-midflight-restart-browser-to-rust,signaling-error-browser-status,peer-lifecycle-browser-status,checkpoint-error-browser-status,rxdb-protocol-error-browser-status,schema-error-browser-status,replication-error-browser-status,replication-push-contract-error-browser-status,file-chunk-metadata-error-browser-status,file-chunk-tombstone-error-browser-status,file-chunk-stale-generation-error-browser-status' || '' }}
          SOAK_FAIL_ON_RETRY: ${{ (github.event_name == 'schedule' || inputs.require_release_coverage == 'true' || inputs.fail_on_retry == 'true') && '1' || '0' }}
          SOAK_RESULT_PATH: ${{ github.event_name == 'schedule' && 'runtime/build/ctox-sync-production-readiness-95-nightly-soak.json' || 'rxdb-soak-summary.json' }}
          SMOKE_PAGE_PATH: /index.html
          BUSINESS_PORT: "9000"
          SIGNALING_PORT: "19000"
        run: node src/core/rxdb/tools/browser_rust_soak.js

      - name: Print soak evidence summary
        if: always()
        run: node src/core/rxdb/tools/print_soak_summary.js "${{ github.event_name == 'schedule' && 'runtime/build/ctox-sync-production-readiness-95-nightly-soak.json' || 'rxdb-soak-summary.json' }}"

      - name: Upload soak summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rxdb-soak-summary
          path: |
            rxdb-soak-summary.json
            runtime/build/ctox-sync-production-readiness-95-nightly-soak.json
            runtime/build/office-document-restart-matrix.json
            runtime/build/office-spreadsheet-restart-matrix.json
          if-no-files-found: ignore
