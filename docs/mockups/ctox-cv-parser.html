<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CTOX CV Print Builder</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2ef;
      --surface: #fbfcfb;
      --surface-2: #e6ece8;
      --line: #ccd6cf;
      --line-strong: #93aaa1;
      --text: #18231d;
      --muted: #657269;
      --accent: #407f78;
      --accent-soft: #dcefeb;
      --ok: #2f7a51;
      --ok-soft: #e1f1e7;
      --warn: #966a22;
      --warn-soft: #f7ead3;
      --danger: #a54b43;
      --paper: #fefefe;
      --shadow: 0 10px 24px rgba(24, 35, 29, 0.12);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      --font-serif: Georgia, "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.38 var(--font-sans);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      height: 100svh;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      min-width: 0;
      min-height: 0;
    }

    .shell {
      display: grid;
      grid-template-columns: 304px minmax(0, 1fr);
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .left {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 72%, var(--surface-2));
      padding: 8px;
    }

    .left-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 7px;
      padding: 0 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .candidate-card {
      border: 1px solid color-mix(in srgb, var(--accent) 42%, var(--line));
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 5px 14px rgba(24, 35, 29, 0.08);
      overflow: hidden;
    }

    .candidate-main {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 8px;
      padding: 7px;
      border-bottom: 1px solid var(--line);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--accent) 20%, #f6faf7), #f8fbf8);
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 15px;
      font-weight: 950;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .candidate-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
      align-content: start;
    }

    .name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .candidate-name {
      min-width: 0;
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #101811;
      font-size: 16px;
      line-height: 1.1;
      font-weight: 950;
    }

    .candidate-role,
    .candidate-file {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .candidate-facts {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 11px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .pill.uploaded {
      color: var(--warn);
      border-color: color-mix(in srgb, var(--warn) 34%, var(--line));
      background: var(--warn-soft);
    }

    .pill.review {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
      background: var(--accent-soft);
    }

    .pill.approved {
      color: var(--ok);
      border-color: color-mix(in srgb, var(--ok) 38%, var(--line));
      background: var(--ok-soft);
    }

    .controls {
      display: grid;
      gap: 5px;
      padding: 6px 7px 7px;
    }

    .flow-row,
    .action-strip,
    .view-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-width: 0;
    }

    .flow-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
    }

    .action-strip {
      align-items: center;
    }

    .view-strip {
      display: grid;
      grid-template-columns: repeat(var(--view-count, 3), minmax(0, 1fr));
    }

    .output-row {
      display: grid;
      gap: 5px;
      min-width: 0;
      grid-template-columns: minmax(0, 1fr) 30px 30px 30px;
    }

    .btn,
    .seg,
    .select,
    .icon-btn {
      min-width: 0;
      min-height: 28px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-weight: 850;
    }

    .btn,
    .seg,
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 8px;
    }

    .select {
      width: 100%;
      padding: 0 8px;
      appearance: auto;
      font-size: 11px;
      font-weight: 850;
    }

    .icon-btn {
      width: 28px;
      flex: 0 0 28px;
      padding: 0;
      color: var(--accent);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-btn.primary {
      color: #f8fcfa;
      border-color: var(--accent);
      background: var(--accent);
    }

    .icon-btn.good {
      color: #f8fcfa;
      border-color: var(--ok);
      background: var(--ok);
    }

    .btn:disabled,
    .seg:disabled,
    .icon-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .seg.active,
    .icon-btn.active {
      color: #10201b;
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .icon-btn.good.active {
      color: #f8fcfa;
      border-color: var(--ok);
      background: var(--ok);
    }

    .meta-line {
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hidden-input {
      display: none;
    }

    .new-cv-slot {
      width: 100%;
      min-height: 34px;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 7px;
      margin-top: 7px;
      padding: 5px 7px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface) 72%, transparent);
      color: var(--muted);
      text-align: left;
    }

    .new-cv-slot:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .new-cv-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--accent);
    }

    .new-cv-icon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .new-cv-copy {
      min-width: 0;
    }

    .new-cv-copy strong,
    .new-cv-copy span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .new-cv-copy strong {
      color: var(--text);
      font-size: 11px;
      line-height: 1.15;
    }

    .new-cv-copy span {
      margin-top: 1px;
      color: var(--muted);
      font-size: 10px;
    }

    .mini-list {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .mini-card {
      width: 100%;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 7px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      text-align: left;
      color: var(--text);
    }

    .mini-card.active {
      border-color: var(--line);
      background: var(--surface);
    }

    .mini-avatar {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--surface-2);
      color: var(--accent);
      font-weight: 900;
      font-size: 12px;
    }

    .mini-copy {
      min-width: 0;
    }

    .mini-copy strong,
    .mini-copy span {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-copy strong {
      font-size: 12px;
      color: #101811;
    }

    .mini-copy span {
      color: var(--muted);
      font-size: 11px;
    }

    .stage {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      padding: 8px;
    }

    .stage-grid {
      height: 100%;
      min-width: 0;
      min-height: 0;
      display: grid;
      gap: 8px;
    }

    .stage-grid[data-view="original"],
    .stage-grid[data-view="print"] {
      grid-template-columns: minmax(0, 1fr);
    }

    .stage-grid[data-view="split"] {
      grid-template-columns: minmax(320px, 0.94fr) minmax(360px, 1.06fr);
    }

    .viewer {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 34px minmax(0, 1fr);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(24, 35, 29, 0.08);
    }

    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 10px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      color: #101811;
      font-size: 13px;
      font-weight: 900;
    }

    .viewer-head small {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
    }

    .viewer-body {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: auto;
      background: #dfe6e1;
    }

    .source-scroll,
    .print-scroll {
      min-width: 0;
      min-height: 0;
      padding: 12px;
      overflow: auto;
    }

    .pdf-object {
      width: 100%;
      height: 100%;
      min-height: 600px;
      border: 0;
      display: block;
      background: var(--paper);
    }

    .source-page {
      width: min(760px, 100%);
      min-height: 980px;
      margin: 0 auto;
      padding: 38px 44px;
      border: 1px solid #d0d8d2;
      background: var(--paper);
      color: #202923;
      box-shadow: var(--shadow);
      font-family: Arial, Helvetica, sans-serif;
    }

    .source-page h2 {
      margin: 0;
      font-size: 25px;
      color: #111711;
    }

    .source-role {
      margin: 4px 0 14px;
      color: #49544c;
      font-weight: 750;
    }

    .source-contact {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      padding: 8px 0 12px;
      border-top: 2px solid #18231d;
      border-bottom: 1px solid #d2d9d4;
      color: #354139;
      font-size: 12px;
    }

    .source-section {
      padding-top: 15px;
    }

    .source-section h3 {
      margin: 0 0 7px;
      color: #111711;
      font-size: 13px;
      text-transform: uppercase;
    }

    .source-page p,
    .source-page li,
    .source-item span {
      color: #354139;
      font-size: 13px;
    }

    .source-item {
      margin: 0 0 11px;
      padding-left: 11px;
      border-left: 2px solid #c5cec8;
    }

    .source-item strong {
      display: block;
      color: #111711;
    }

    .source-page ul {
      margin: 7px 0 0;
      padding-left: 17px;
    }

    .parse-mask {
      position: absolute;
      inset: 34px 0 0;
      display: grid;
      place-items: center;
      background: rgba(238, 242, 239, 0.72);
      pointer-events: none;
    }

    .parse-box {
      display: grid;
      gap: 8px;
      width: 250px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
      color: #101811;
      font-weight: 850;
    }

    .progress {
      height: 5px;
      border-radius: 999px;
      background: var(--surface-2);
      overflow: hidden;
    }

    .progress::after {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      background: var(--accent);
      animation: slide 1s ease-in-out infinite;
    }

    @keyframes slide {
      from { transform: translateX(-120%); }
      to { transform: translateX(280%); }
    }

    .print-paper {
      width: min(794px, 100%);
      min-height: 1123px;
      margin: 0 auto;
      padding: 50px 56px 38px;
      border: 1px solid #cfd8d1;
      background: var(--paper);
      box-shadow: var(--shadow);
      color: #101811;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 22px;
      --tpl-accent: #407f78;
      --tpl-muted: #5f6d64;
    }

    .print-paper * {
      overflow-wrap: anywhere;
    }

    .print-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }

    .print-title {
      margin: 0;
      font-size: 27px;
      line-height: 1.08;
      color: #101811;
      text-transform: uppercase;
    }

    .print-rule {
      width: 220px;
      height: 3px;
      margin-top: 12px;
      background: var(--tpl-accent);
    }

    .print-logo {
      min-width: 86px;
      min-height: 34px;
      display: grid;
      place-items: center;
      padding: 6px 10px;
      border: 1px solid color-mix(in srgb, var(--tpl-accent) 40%, #c9d2cc);
      color: var(--tpl-accent);
      background: #fefefe;
      font-weight: 950;
    }

    .print-logo img {
      max-width: 128px;
      max-height: 44px;
      object-fit: contain;
      display: block;
    }

    .print-body {
      display: grid;
      align-content: start;
      gap: 20px;
    }

    .profile-block {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(230px, 0.92fr);
      gap: 26px;
      align-items: start;
    }

    .print-name {
      margin: 0 0 5px;
      font-size: 23px;
      line-height: 1.15;
      color: #101811;
    }

    .print-role {
      margin: 0 0 14px;
      color: var(--tpl-muted);
      font-weight: 800;
    }

    .summary {
      margin: 0;
      color: #243029;
      font-size: 14px;
    }

    .facts {
      display: grid;
      gap: 6px;
      margin: 0;
    }

    .fact {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #dbe2dd;
    }

    .fact dt {
      margin: 0;
      color: var(--tpl-muted);
      font-size: 12px;
      font-weight: 900;
    }

    .fact dd {
      margin: 0;
      font-weight: 800;
    }

    .section-title {
      margin: 0 0 8px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--tpl-accent);
      color: #101811;
      font-size: 13px;
      text-transform: uppercase;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .skills li {
      padding: 5px 8px;
      border: 1px solid #d4ddd7;
      border-radius: 999px;
      background: #f6faf7;
      font-size: 12px;
      font-weight: 800;
    }

    .timeline {
      display: grid;
      gap: 15px;
    }

    .entry {
      display: grid;
      grid-template-columns: 118px minmax(0, 1fr);
      gap: 18px;
    }

    .period {
      color: var(--tpl-muted);
      font-size: 12px;
      font-weight: 900;
    }

    .entry-title {
      margin: 0 0 2px;
      color: #101811;
      font-weight: 950;
    }

    .entry-company {
      margin: 0 0 6px;
      color: #435049;
      font-weight: 800;
    }

    .entry ul {
      margin: 0;
      padding-left: 18px;
      color: #243029;
    }

    .entry li {
      margin: 2px 0;
    }

    .print-foot {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding-top: 12px;
      border-top: 1px solid #d5ded8;
      color: #647068;
      font-size: 11px;
    }

    .tpl-classic {
      --tpl-accent: #a0a727;
      --tpl-muted: #4b503e;
      padding: 56px 62px 42px;
      font-family: var(--font-serif);
    }

    .tpl-classic .print-title {
      font: 950 25px/1.08 var(--font-sans);
    }

    .tpl-classic .print-rule {
      width: 100%;
      height: 1px;
      background: #101811;
    }

    .tpl-classic .print-logo {
      color: #101811;
      border-radius: 0;
      border-color: #b9bfb9;
      font-family: var(--font-sans);
    }

    .tpl-classic .profile-block {
      grid-template-columns: minmax(0, 1fr);
    }

    .tpl-classic .section-title {
      padding: 8px 10px;
      border: 0;
      background: var(--tpl-accent);
      font-family: var(--font-sans);
    }

    .tpl-classic .skills li {
      border-radius: 0;
      background: #fefefe;
    }

    .tpl-neutral {
      --tpl-accent: #5d675f;
      --tpl-muted: #5b665f;
      padding: 44px 52px 38px;
    }

    .tpl-neutral .print-head {
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid #cbd5ce;
    }

    .tpl-neutral .print-title {
      font-size: 22px;
      text-transform: none;
    }

    .tpl-neutral .print-rule {
      display: none;
    }

    .tpl-neutral .print-logo {
      color: #f8fcfa;
      border-color: var(--tpl-accent);
      border-radius: 8px;
      background: var(--tpl-accent);
    }

    .tpl-neutral .profile-block {
      grid-template-columns: minmax(0, 1fr);
      padding: 13px;
      border: 1px solid #d4ddd7;
      border-radius: 8px;
      background: #f7faf8;
    }

    .editable {
      outline: 1px dashed color-mix(in srgb, var(--accent) 58%, transparent);
      outline-offset: 2px;
      border-radius: 3px;
      background: color-mix(in srgb, var(--accent-soft) 48%, transparent);
    }

    .editable:focus {
      outline: 2px solid var(--accent);
      background: #fefefe;
    }

    @media (max-width: 1040px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100svh;
      }

      .shell {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: auto minmax(680px, 1fr);
        overflow: visible;
      }

      .left {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        overflow: visible;
      }

      .candidate-card {
        max-width: none;
      }

      .stage {
        min-height: 720px;
      }

      .stage-grid[data-view="split"] {
        grid-template-columns: minmax(0, 1fr);
        grid-auto-rows: minmax(520px, 1fr);
      }
    }

    @media (max-width: 560px) {
      .shell {
        grid-template-rows: auto minmax(620px, 1fr);
      }

      .left,
      .stage {
        padding: 6px;
      }

      .candidate-name {
        font-size: 16px;
      }

      .output-row {
        grid-template-columns: minmax(0, 1fr) 28px 28px 28px;
      }

      .source-scroll,
      .print-scroll {
        padding: 8px;
      }

      .source-page,
      .print-paper {
        padding: 28px 22px;
      }

      .profile-block,
      .entry,
      .fact {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    @media print {
      @page {
        size: A4;
        margin: 0;
      }

      body {
        overflow: visible;
        background: #fefefe;
      }

      .left,
      .viewer-head,
      .original-view {
        display: none !important;
      }

      .app,
      .shell,
      .stage,
      .stage-grid,
      .viewer,
      .viewer-body,
      .print-scroll {
        display: block !important;
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
        padding: 0 !important;
        border: 0 !important;
        box-shadow: none !important;
        background: #fefefe !important;
      }

      .print-paper {
        width: 210mm;
        min-height: 297mm;
        margin: 0;
        border: 0;
        box-shadow: none;
      }

      .editable {
        outline: none;
        background: transparent;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <aside class="left">
        <div class="left-title">
          <span>ctox · CV Print</span>
          <span id="countLabel">1</span>
        </div>

        <section class="candidate-card" id="candidateShard"></section>
        <div class="mini-list" id="candidateList"></div>
        <button class="new-cv-slot" id="newCvSlot" type="button">
          <span class="new-cv-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
          </span>
          <span class="new-cv-copy">
            <strong>Neuer CV</strong>
            <span>PDF als neuen Kandidaten anlegen</span>
          </span>
        </button>
      </aside>

      <main class="stage" id="stage" aria-live="polite"></main>
    </div>
  </div>

  <input class="hidden-input" id="pdfInput" type="file" accept="application/pdf" />
  <input class="hidden-input" id="logoInput" type="file" accept="image/*" />
  <input class="hidden-input" id="photoInput" type="file" accept="image/*" />

  <script>
    const templates = {
      modern: {
        label: "CTOX Modern",
        className: "tpl-modern",
        accent: "#407f78",
        logoText: "ctox",
        title: "QUALIFIKATIONSPROFIL",
        note: "Akzentlinie, kompakte Fakten, Kompetenz-Chips"
      },
      classic: {
        label: "Classic Profil",
        className: "tpl-classic",
        accent: "#a0a727",
        logoText: "Logo",
        title: "QUALIFIKATIONSPROFIL",
        note: "Abschnittsbalken, klassische Typografie"
      },
      neutral: {
        label: "Client Neutral",
        className: "tpl-neutral",
        accent: "#5d675f",
        logoText: "Client",
        title: "Kandidatenprofil",
        note: "Kundenversion, sachlich und ohne Schmuck"
      }
    };

    const sampleProfile = {
      name: "Anna Keller",
      role: "Senior HR Operations Manager",
      location: "Köln / remote",
      availability: "ab 01.09.2026",
      degree: "M.A. Business Administration",
      languages: "Deutsch C2, Englisch C1",
      summary: "HR Operations Managerin mit Schwerpunkt Prozessstandardisierung, HRIS-Einführung und Schnittstellenarbeit zwischen Recruiting, Payroll und Führungskräften.",
      skills: ["HRIS", "Workday", "Payroll-Schnittstellen", "Projektsteuerung", "Onboarding", "Arbeitsrecht Grundlagen"],
      experiences: [
        {
          period: "2022 - heute",
          title: "Senior HR Operations Manager",
          company: "RheinTech Services GmbH",
          bullets: [
            "Standardisierung des Onboarding-Prozesses für 450 Mitarbeitende.",
            "Einführung eines HRIS-Workflows für Vertragsänderungen und Genehmigungen.",
            "Koordination von Payroll, Recruiting und Fachbereichen."
          ]
        },
        {
          period: "2018 - 2022",
          title: "HR Generalist",
          company: "Meyer & Partner Industrie",
          bullets: [
            "Betreuung von Recruiting, Personalakten und Reporting.",
            "Aufbau von Auswertungen zu Fluktuation, Besetzung und Probezeit."
          ]
        }
      ],
      education: [
        {
          period: "2015 - 2018",
          title: "M.A. Business Administration",
          company: "TH Köln",
          bullets: ["Schwerpunkt Personalmanagement und Organisationsentwicklung."]
        },
        {
          period: "2011 - 2014",
          title: "B.A. Betriebswirtschaft",
          company: "Hochschule Bonn-Rhein-Sieg",
          bullets: ["Praxisprojekt Recruiting-Prozessanalyse."]
        }
      ]
    };

    const state = {
      selectedId: "demo-anna-keller",
      view: "original",
      correction: false,
      candidates: [
        {
          id: "demo-anna-keller",
          phase: "uploaded",
          fileName: "anna-keller-cv.pdf",
          fileUrl: "",
          photoUrl: "",
          profile: structuredClone(sampleProfile),
          settings: {
            template: "modern",
            anonymize: false,
            showLogo: true,
            logoUrl: ""
          }
        }
      ]
    };

    const els = {
      shard: document.getElementById("candidateShard"),
      list: document.getElementById("candidateList"),
      stage: document.getElementById("stage"),
      pdfInput: document.getElementById("pdfInput"),
      logoInput: document.getElementById("logoInput"),
      photoInput: document.getElementById("photoInput"),
      count: document.getElementById("countLabel"),
      newCvSlot: document.getElementById("newCvSlot")
    };

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function icon(name) {
      const icons = {
        upload: '<path d="M12 16V4"></path><path d="m7 9 5-5 5 5"></path><path d="M5 20h14"></path>',
        play: '<path d="M8 5v14l11-7Z"></path>',
        refresh: '<path d="M20 11a8 8 0 0 0-14.5-4.5L4 8"></path><path d="M4 4v4h4"></path><path d="M4 13a8 8 0 0 0 14.5 4.5L20 16"></path><path d="M20 20v-4h-4"></path>',
        pencil: '<path d="m15 5 4 4"></path><path d="M4 20l4.5-1 9.5-9.5-3.5-3.5L5 15.5Z"></path>',
        check: '<path d="m5 12 4 4L19 6"></path>',
        lock: '<rect x="6" y="10" width="12" height="10" rx="2"></rect><path d="M8 10V8a4 4 0 0 1 8 0v2"></path>',
        printer: '<path d="M7 8V4h10v4"></path><path d="M7 18h10v2H7z"></path><rect x="5" y="8" width="14" height="10" rx="2"></rect>',
        eyeOff: '<path d="m3 3 18 18"></path><path d="M10.6 10.6A2 2 0 0 0 13.4 13.4"></path><path d="M9.9 4.2A10.8 10.8 0 0 1 12 4c5 0 8.5 4 10 8a15 15 0 0 1-2.1 3.6"></path><path d="M6.5 6.7A14.8 14.8 0 0 0 2 12c1.5 4 5 8 10 8a10.7 10.7 0 0 0 4.2-.9"></path>',
        image: '<rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="m7 15 3-3 2 2 3-4 2 5"></path><circle cx="9" cy="9" r="1"></circle>',
        imagePlus: '<rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="m7 15 3-3 2 2 3-4 2 5"></path><path d="M17 7v4"></path><path d="M15 9h4"></path>',
        x: '<path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>'
      };
      return `<svg viewBox="0 0 24 24" aria-hidden="true">${icons[name] || icons.check}</svg>`;
    }

    function current() {
      return state.candidates.find((candidate) => candidate.id === state.selectedId) || state.candidates[0];
    }

    function initials(name) {
      return String(name || "K")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0].toUpperCase())
        .join("") || "K";
    }

    function phaseText(phase) {
      if (phase === "approved") return "freigegeben";
      if (phase === "review") return "Korrektur";
      if (phase === "parsing") return "Parsing";
      return "PDF";
    }

    function phaseClass(phase) {
      if (phase === "approved") return "approved";
      if (phase === "review" || phase === "parsing") return "review";
      return "uploaded";
    }

    function allowedViews(candidate) {
      if (candidate.phase === "approved") return ["print"];
      if (candidate.phase === "review") return ["original", "split", "print"];
      return ["original"];
    }

    function normalizeView(candidate) {
      const allowed = allowedViews(candidate);
      if (!allowed.includes(state.view)) state.view = allowed[0];
    }

    function selectedTemplate(candidate) {
      return templates[candidate.settings.template] || templates.modern;
    }

    function anonymizedName(name) {
      const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "Kandidat";
      if (parts.length === 1) return `${parts[0][0].toUpperCase()}.`;
      return `${parts[0][0].toUpperCase()}. ${parts[parts.length - 1][0].toUpperCase()}.`;
    }

    function printName(candidate) {
      return candidate.settings.anonymize ? anonymizedName(candidate.profile.name) : candidate.profile.name;
    }

    function canEdit() {
      const candidate = current();
      return candidate.phase === "review" && state.correction;
    }

    function edit(path, value, tag = "span", className = "") {
      const safeTag = ["span", "p", "h2", "h3", "div"].includes(tag) ? tag : "span";
      const classes = [className, canEdit() ? "editable" : ""].filter(Boolean).join(" ");
      const attrs = canEdit()
        ? ` class="${esc(classes)}" contenteditable="true" spellcheck="false" data-edit="${esc(path)}"`
        : ` class="${esc(classes)}"`;
      return `<${safeTag}${attrs}>${esc(value)}</${safeTag}>`;
    }

    function renderShard(candidate) {
      const allowed = allowedViews(candidate);
      const template = selectedTemplate(candidate);
      const avatar = candidate.photoUrl
        ? `<img src="${esc(candidate.photoUrl)}" alt="" />`
        : esc(initials(candidate.profile.name));
      const viewButtons = allowed.map((view) => {
        const labels = { original: "Original", split: "Beide", print: "Print" };
        return `<button class="seg ${state.view === view ? "active" : ""}" type="button" data-view="${view}">${labels[view]}</button>`;
      }).join("");

      let actionButtons = "";
      if (candidate.phase === "uploaded") {
        actionButtons = `
          <button class="icon-btn primary" type="button" data-action="parse" title="Parsing starten" aria-label="Parsing starten">${icon("play")}</button>
        `;
      } else if (candidate.phase === "parsing") {
        actionButtons = `
          <button class="icon-btn primary" type="button" disabled title="Parsing läuft" aria-label="Parsing läuft">${icon("refresh")}</button>
        `;
      } else if (candidate.phase === "review") {
        actionButtons = `
          <button class="icon-btn ${state.correction ? "active" : ""}" type="button" data-action="toggleCorrection" title="Korrekturmodus" aria-label="Korrekturmodus">${icon("pencil")}</button>
          <button class="icon-btn good" type="button" data-action="approve" title="Print freigeben" aria-label="Print freigeben">${icon("check")}</button>
        `;
      } else {
        actionButtons = `
          <button class="icon-btn" type="button" data-action="reopen" title="Zurück in Korrektur" aria-label="Zurück in Korrektur">${icon("pencil")}</button>
          <button class="icon-btn good" type="button" data-action="print" title="Drucken" aria-label="Drucken">${icon("printer")}</button>
        `;
      }

      const outputControls = candidate.phase === "review" || candidate.phase === "approved"
        ? `
          <div class="output-row" aria-label="Drucktemplate">
            <select class="select" data-setting="template" aria-label="Template">
              ${Object.entries(templates).map(([key, item]) => `
                <option value="${esc(key)}" ${candidate.settings.template === key ? "selected" : ""}>${esc(item.label)}</option>
              `).join("")}
            </select>
            <button class="icon-btn ${candidate.settings.anonymize ? "active" : ""}" type="button" data-action="toggleAnonymize" title="Anonymisierung" aria-label="Anonymisierung">${icon("eyeOff")}</button>
            <button class="icon-btn ${candidate.settings.showLogo ? "active" : ""}" type="button" data-action="toggleLogo" title="Logo anzeigen" aria-label="Logo anzeigen">${icon("image")}</button>
            <button class="icon-btn" type="button" data-action="pickLogo" title="Logo wählen" aria-label="Logo wählen">${icon("imagePlus")}</button>
          </div>
          <div class="meta-line">${esc(template.note)}</div>
        `
        : `<div class="meta-line">${candidate.phase === "parsing" ? "Parsing läuft. Die Druckansicht wird vorbereitet." : "PDF geladen. Als Nächstes Parsing starten."}</div>`;

      els.shard.innerHTML = `
        <div class="candidate-main">
          <button class="avatar" type="button" data-action="pickPhoto" title="Foto wählen">${avatar}</button>
          <div class="candidate-copy">
            <div class="name-row">
              <h1 class="candidate-name">${esc(candidate.profile.name)}</h1>
              <span class="pill ${phaseClass(candidate.phase)}">${esc(phaseText(candidate.phase))}</span>
            </div>
            <div class="candidate-role">${esc(candidate.profile.role)}</div>
            <div class="candidate-file">${esc(candidate.fileName)}</div>
            <div class="candidate-facts">${esc(candidate.profile.location)} · ${esc(candidate.profile.availability)}</div>
          </div>
        </div>

        <div class="controls">
          <div class="flow-row">
            <div class="action-strip" aria-label="Workflow">
              ${actionButtons}
            </div>
            <div class="view-strip" aria-label="Ansicht" style="--view-count:${allowed.length}">
              ${viewButtons}
            </div>
          </div>

          ${outputControls}
        </div>
      `;
    }

    function renderList() {
      const selected = current();
      els.count.textContent = String(state.candidates.length);
      if (state.candidates.length <= 1) {
        els.list.innerHTML = "";
        return;
      }
      els.list.innerHTML = state.candidates.map((candidate) => `
        <button class="mini-card ${candidate.id === selected.id ? "active" : ""}" type="button" data-candidate="${esc(candidate.id)}">
          <span class="mini-avatar">${esc(initials(candidate.profile.name))}</span>
          <span class="mini-copy">
            <strong>${esc(candidate.profile.name)}</strong>
            <span>${esc(candidate.fileName)}</span>
          </span>
          <span class="pill ${phaseClass(candidate.phase)}">${esc(phaseText(candidate.phase))}</span>
        </button>
      `).join("");
    }

    function renderSourcePage(candidate) {
      const profile = candidate.profile;
      return `
        <article class="source-page">
          <h2>${esc(profile.name)}</h2>
          <div class="source-role">${esc(profile.role)}</div>
          <div class="source-contact">
            <span>${esc(profile.location)}</span>
            <span>${esc(profile.availability)}</span>
            <span>${esc(profile.degree)}</span>
            <span>${esc(profile.languages)}</span>
          </div>
          <section class="source-section">
            <h3>Profil</h3>
            <p>${esc(profile.summary)}</p>
          </section>
          <section class="source-section">
            <h3>Berufserfahrung</h3>
            ${profile.experiences.map((item) => `
              <div class="source-item">
                <strong>${esc(item.period)} · ${esc(item.title)}</strong>
                <span>${esc(item.company)}</span>
                <ul>${item.bullets.map((bullet) => `<li>${esc(bullet)}</li>`).join("")}</ul>
              </div>
            `).join("")}
          </section>
          <section class="source-section">
            <h3>Ausbildung</h3>
            ${profile.education.map((item) => `
              <div class="source-item">
                <strong>${esc(item.period)} · ${esc(item.title)}</strong>
                <span>${esc(item.company)}</span>
              </div>
            `).join("")}
          </section>
          <section class="source-section">
            <h3>Skills</h3>
            <p>${esc(profile.skills.join(", "))}</p>
          </section>
        </article>
      `;
    }

    function renderOriginal(candidate) {
      const body = candidate.fileUrl
        ? `<object class="pdf-object" data="${esc(candidate.fileUrl)}" type="application/pdf"><div class="source-scroll">${renderSourcePage(candidate)}</div></object>`
        : `<div class="source-scroll">${renderSourcePage(candidate)}</div>`;
      return `
        <section class="viewer original-view">
          <div class="viewer-head"><span>Original</span><small>${esc(candidate.fileName)}</small></div>
          <div class="viewer-body">
            ${body}
            ${candidate.phase === "parsing" ? `<div class="parse-mask"><div class="parse-box">Parsing<div class="progress"></div></div></div>` : ""}
          </div>
        </section>
      `;
    }

    function renderLogo(candidate, template) {
      if (!candidate.settings.showLogo) return "";
      if (candidate.settings.logoUrl) {
        return `<div class="print-logo"><img src="${esc(candidate.settings.logoUrl)}" alt="Logo" /></div>`;
      }
      return `<div class="print-logo">${esc(template.logoText)}</div>`;
    }

    function renderFacts(candidate) {
      const profile = candidate.profile;
      const rows = [
        ["Rolle", profile.role],
        ["Standort", profile.location],
        ["Verfügbar", profile.availability],
        ["Abschluss", profile.degree],
        ["Sprachen", profile.languages]
      ];
      return `<dl class="facts">${rows.map(([label, value]) => `
        <div class="fact"><dt>${esc(label)}</dt><dd>${esc(value)}</dd></div>
      `).join("")}</dl>`;
    }

    function renderEntries(items, path) {
      return `<div class="timeline">${items.map((item, index) => `
        <article class="entry">
          ${edit(`${path}.${index}.period`, item.period, "div", "period")}
          <div>
            ${edit(`${path}.${index}.title`, item.title, "p", "entry-title")}
            ${edit(`${path}.${index}.company`, item.company, "p", "entry-company")}
            <ul>${item.bullets.map((bullet, bulletIndex) => `
              <li>${edit(`${path}.${index}.bullets.${bulletIndex}`, bullet)}</li>
            `).join("")}</ul>
          </div>
        </article>
      `).join("")}</div>`;
    }

    function renderPrintPaper(candidate) {
      const profile = candidate.profile;
      const template = selectedTemplate(candidate);
      const name = printName(candidate);
      return `
        <article class="print-paper ${esc(template.className)}" style="--tpl-accent:${esc(template.accent)}">
          <header class="print-head">
            <div>
              <h2 class="print-title">${esc(template.title)}</h2>
              <div class="print-rule"></div>
            </div>
            ${renderLogo(candidate, template)}
          </header>
          <main class="print-body">
            <section class="profile-block">
              <div>
                ${edit("name", name, "h3", "print-name")}
                ${edit("role", profile.role, "p", "print-role")}
                ${edit("summary", profile.summary, "p", "summary")}
              </div>
              ${renderFacts(candidate)}
            </section>
            <section>
              <h3 class="section-title">Methoden-, Systemkompetenz und Sprachen</h3>
              <ul class="skills">${profile.skills.map((skill) => `<li>${esc(skill)}</li>`).join("")}</ul>
            </section>
            <section>
              <h3 class="section-title">Beruflicher Werdegang</h3>
              ${renderEntries(profile.experiences, "experiences")}
            </section>
            <section>
              <h3 class="section-title">Ausbildung</h3>
              ${renderEntries(profile.education, "education")}
            </section>
          </main>
          <footer class="print-foot">
            <span>CTOX Business OS · CV Print</span>
            <span>${candidate.settings.anonymize ? "anonymisiert" : "vollständig"} · ${esc(template.label)}</span>
          </footer>
        </article>
      `;
    }

    function renderPrint(candidate) {
      return `
        <section class="viewer print-view">
          <div class="viewer-head">
            <span>Druckansicht</span>
            <small>${esc(selectedTemplate(candidate).label)}${canEdit() ? " · Korrektur" : ""}</small>
          </div>
          <div class="viewer-body">
            <div class="print-scroll">${renderPrintPaper(candidate)}</div>
          </div>
        </section>
      `;
    }

    function renderStage(candidate) {
      const parts = state.view === "split"
        ? [renderOriginal(candidate), renderPrint(candidate)]
        : state.view === "print"
          ? [renderPrint(candidate)]
          : [renderOriginal(candidate)];
      els.stage.innerHTML = `<div class="stage-grid" data-view="${esc(state.view)}">${parts.join("")}</div>`;
    }

    function render() {
      const candidate = current();
      normalizeView(candidate);
      candidate.profile.name = candidate.profile.name || candidate.fileName.replace(/\\.pdf$/i, "");
      renderShard(candidate);
      renderList();
      renderStage(candidate);
    }

    function setNestedValue(root, path, value) {
      const parts = path.split(".");
      let cursor = root;
      for (let index = 0; index < parts.length - 1; index += 1) {
        cursor = cursor[parts[index]];
        if (!cursor) return;
      }
      cursor[parts[parts.length - 1]] = value;
    }

    function parseCandidate() {
      const candidate = current();
      if (candidate.phase !== "uploaded") return;
      candidate.phase = "parsing";
      state.view = "original";
      state.correction = false;
      render();
      window.setTimeout(() => {
        candidate.phase = "review";
        state.view = "split";
        state.correction = true;
        render();
      }, 700);
    }

    function addPdf(file) {
      if (!file) return;
      const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name);
      if (!isPdf) return;
      const profile = structuredClone(sampleProfile);
      profile.name = file.name.replace(/\.pdf$/i, "").replace(/[-_]+/g, " ").replace(/\b\w/g, (letter) => letter.toUpperCase());
      const candidate = {
        id: `candidate-${Date.now()}`,
        phase: "uploaded",
        fileName: file.name,
        fileUrl: URL.createObjectURL(file),
        photoUrl: "",
        profile,
        settings: {
          template: "modern",
          anonymize: false,
          showLogo: true,
          logoUrl: ""
        }
      };
      state.candidates.unshift(candidate);
      state.selectedId = candidate.id;
      state.view = "original";
      state.correction = false;
      render();
    }

    function readImage(file, callback) {
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener("load", () => callback(String(reader.result || "")));
      reader.readAsDataURL(file);
    }

    els.shard.addEventListener("click", (event) => {
      const action = event.target.closest("[data-action]")?.dataset.action;
      if (!action) return;
      const candidate = current();
      if (action === "pickPdf") els.pdfInput.click();
      if (action === "pickLogo") els.logoInput.click();
      if (action === "pickPhoto") els.photoInput.click();
      if (action === "resetLogo") {
        candidate.settings.logoUrl = "";
        render();
      }
      if (action === "toggleAnonymize") {
        candidate.settings.anonymize = !candidate.settings.anonymize;
        render();
      }
      if (action === "toggleLogo") {
        candidate.settings.showLogo = !candidate.settings.showLogo;
        render();
      }
      if (action === "parse") parseCandidate();
      if (action === "reparse") {
        candidate.phase = "uploaded";
        state.view = "original";
        state.correction = false;
        render();
      }
      if (action === "toggleCorrection") {
        state.correction = !state.correction;
        render();
      }
      if (action === "approve") {
        candidate.phase = "approved";
        state.view = "print";
        state.correction = false;
        render();
      }
      if (action === "reopen") {
        candidate.phase = "review";
        state.view = "split";
        state.correction = true;
        render();
      }
      if (action === "print") {
        state.view = "print";
        render();
        window.setTimeout(() => window.print(), 60);
      }
    });

    els.shard.addEventListener("click", (event) => {
      const view = event.target.closest("[data-view]")?.dataset.view;
      if (!view) return;
      const candidate = current();
      if (!allowedViews(candidate).includes(view)) return;
      state.view = view;
      render();
    });

    els.shard.addEventListener("change", (event) => {
      const target = event.target;
      const key = target.dataset.setting;
      if (!key) return;
      const candidate = current();
      if (key === "template") candidate.settings.template = target.value;
      render();
    });

    els.list.addEventListener("click", (event) => {
      const id = event.target.closest("[data-candidate]")?.dataset.candidate;
      if (!id) return;
      state.selectedId = id;
      const candidate = current();
      state.correction = candidate.phase === "review";
      normalizeView(candidate);
      render();
    });

    els.newCvSlot.addEventListener("click", () => {
      els.pdfInput.click();
    });

    els.pdfInput.addEventListener("change", () => {
      addPdf(els.pdfInput.files && els.pdfInput.files[0]);
      els.pdfInput.value = "";
    });

    els.logoInput.addEventListener("change", () => {
      readImage(els.logoInput.files && els.logoInput.files[0], (url) => {
        const candidate = current();
        candidate.settings.logoUrl = url;
        candidate.settings.showLogo = true;
        render();
      });
      els.logoInput.value = "";
    });

    els.photoInput.addEventListener("change", () => {
      readImage(els.photoInput.files && els.photoInput.files[0], (url) => {
        current().photoUrl = url;
        render();
      });
      els.photoInput.value = "";
    });

    els.stage.addEventListener("focusout", (event) => {
      const target = event.target.closest("[data-edit]");
      if (!target || !canEdit()) return;
      const candidate = current();
      const path = target.dataset.edit;
      if (path === "name" && candidate.settings.anonymize) {
        render();
        return;
      }
      setNestedValue(candidate.profile, path, target.textContent.trim());
      render();
    });

    render();
  </script>
</body>
</html>
