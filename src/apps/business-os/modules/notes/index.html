<main class="ctox-workspace notes-module" data-notes-root data-resize-frame>
  <!-- 0. App-Wide Client Pin Lock Screen (Zero-Knowledge Overlay) -->
  <div class="nn-pin-overlay" data-client-lock-screen hidden>
    <div class="nn-pin-container">
      <div class="nn-shield-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          <rect x="9" y="11" width="6" height="5" rx="1"></rect>
          <path d="M12 11V9a2 2 0 1 1 4 0v2"></path>
        </svg>
      </div>
      <h2>Notesnook Secured</h2>
      <p>App is encrypted. Enter PIN to unlock.</p>

      <div class="nn-pin-display">
        <div class="nn-pin-dot"></div>
        <div class="nn-pin-dot"></div>
        <div class="nn-pin-dot"></div>
        <div class="nn-pin-dot"></div>
      </div>

      <div class="nn-pin-pad">
        <button type="button" data-pin="1">1</button>
        <button type="button" data-pin="2">2</button>
        <button type="button" data-pin="3">3</button>
        <button type="button" data-pin="4">4</button>
        <button type="button" data-pin="5">5</button>
        <button type="button" data-pin="6">6</button>
        <button type="button" data-pin="7">7</button>
        <button type="button" data-pin="8">8</button>
        <button type="button" data-pin="9">9</button>
        <button type="button" data-action="pin-clear">C</button>
        <button type="button" data-pin="0">0</button>
        <button type="button" data-action="pin-ok">OK</button>
      </div>

      <div class="nn-pin-hint">Standard PIN: <strong>1234</strong></div>
    </div>
  </div>

  <!-- LEFT: books/tags nav + note list — ONE canonical column grammar column.
       Categories (Notizen/Favoriten/Papierkorb) are the counted view band; the
       book + tag scopes and the sort live in the collapsed filter tray. All
       chrome behaviour (search / view-toggle / tray / reset / active-dot /
       counted band / footer) is SHELL-wired from the data-pg-* attributes; this
       module writes NO chrome JS/CSS. Header collects the standing Neu / Neues
       Notizbuch / Neuer Tag / Import / Export / Sperren icon actions. -->
  <aside class="ctox-pane notes-left" aria-label="Notizen" data-left-content>
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="nn-logo-container" aria-hidden="true">
            <svg class="nn-logo-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              <polyline points="9 11 11 13 15 9"></polyline>
            </svg>
          </span>
          <div class="ctox-pane-titles">
            <span class="ctox-pane-kicker" data-t-kicker>Notesnook</span>
            <h2 class="ctox-pane-title" data-t-list-title>Notizen</h2>
          </div>
        </div>
        <div class="ctox-pane-actions">
          <button class="ctox-pane-icon is-primary" type="button" data-action="create-note" title="Neue Notiz" aria-label="Neue Notiz"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
          <button class="ctox-pane-icon" type="button" data-action="create-notebook" title="Neues Notizbuch" aria-label="Neues Notizbuch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.5 3H20v18H6.5A2.5 2.5 0 0 1 4 18.5v-13A2.5 2.5 0 0 1 6.5 3z"/><path d="M14 3v18"/></svg></button>
          <button class="ctox-pane-icon" type="button" data-action="create-tag" title="Neuer Tag" aria-label="Neuer Tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h7l9 9-7 7-9-9V4Z"/><circle cx="8.5" cy="8.5" r="1.2" fill="currentColor" stroke="none"/></svg></button>
          <button class="ctox-pane-icon" type="button" data-action="import" title="Importieren" aria-label="Importieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12M12 15l-4-4M12 15l4-4M5 21h14"/></svg></button>
          <button class="ctox-pane-icon" type="button" data-action="export" title="Exportieren" aria-label="Exportieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 21V9M12 9l-4 4M12 9l4 4M5 3h14"/></svg></button>
          <button class="ctox-pane-icon" type="button" data-action="lock-app" title="Sperren" aria-label="Sperren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></button>
        </div>
      </div>
      <div class="ctox-filterbar">
        <input class="ctox-pane-search" type="search" data-pg-search placeholder="Notizen durchsuchen..." aria-label="Notizen durchsuchen" />
        <div class="ctox-view-toggle" role="group" aria-label="Darstellung">
          <button type="button" class="ctox-pane-icon" data-pg-view="cards" aria-pressed="true" aria-label="Shard-Ansicht" title="Shard-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="14" width="16" height="7" rx="1.5"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-pg-view="list" aria-pressed="false" aria-label="Listen-Ansicht" title="Listen-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
        </div>
        <button type="button" class="ctox-pane-icon ctox-filter-toggle" data-pg-tray-toggle aria-expanded="false" aria-label="Filter" title="Filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.4" fill="var(--surface-2)"/><circle cx="15" cy="12" r="2.4" fill="var(--surface-2)"/><circle cx="8" cy="17" r="2.4" fill="var(--surface-2)"/></svg></button>
      </div>
      <div class="ctox-filter-tray" data-pg-tray hidden>
        <div class="ctox-filter-row">
          <select class="ctox-select" data-pg-filter data-pg-name="notebook" data-pg-default="all" aria-label="Notizbuch filtern" data-notebook-filter>
            <option value="all">Alle Notizbücher</option>
          </select>
          <select class="ctox-select" data-pg-filter data-pg-name="tag" data-pg-default="all" aria-label="Tag filtern" data-tag-filter>
            <option value="all">Alle Tags</option>
          </select>
        </div>
        <div class="ctox-filter-row">
          <select class="ctox-select" data-pg-filter data-pg-name="sort" data-pg-default="updated" aria-label="Sortierung">
            <option value="updated">Zuletzt aktualisiert</option>
            <option value="created">Erstellungsdatum</option>
            <option value="title">Alphabetisch (Titel)</option>
          </select>
          <button type="button" class="ctox-sort-dir" data-pg-reset aria-label="Filter zurücksetzen" title="Filter zurücksetzen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10a8 8 0 1 1 2 7"/><path d="M4 5v5h5"/></svg></button>
        </div>
      </div>
    </header>
    <nav class="ctox-view-switch" aria-label="Ansichten">
      <div class="ctox-pane-tabs">
        <button type="button" class="ctox-pane-tab is-active" role="tab" data-pg-band="notes" aria-selected="true"><span data-t-band-notes>Notizen</span><span class="view-count" data-pg-count="notes"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="favorites" aria-selected="false"><span data-t-band-favorites>Favoriten</span><span class="view-count" data-pg-count="favorites"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="trash" aria-selected="false"><span data-t-band-trash>Papierkorb</span><span class="view-count" data-pg-count="trash"></span></button>
      </div>
    </nav>
    <div class="ctox-pane-body ctox-well">
      <div class="ctox-list nn-cards-scroll" data-notes-list>
        <!-- Dynamische Notizkarten -->
      </div>
    </div>
    <footer class="ctox-pane-footer"><span data-pg-footer></span></footer>
  </aside>

  <!-- Resizer Links (shell-owned) -->
  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="220" data-resizer-max="420" aria-label="Spaltenbreite anpassen"></button>

  <!-- MAIN: the rich-text editor — the unique work surface. Editor engine and
       save path are unchanged; the header keeps the note's meta controls. -->
  <section class="ctox-pane notes-center" aria-label="Note Editor" data-right-content>
    <!-- Editor Header: Notesnook Meta-Kopfzeile -->
    <header class="ctox-pane-header ctox-pane-band nn-editor-head">
      <div class="nn-note-meta-left">
        <!-- Back to list (mobile return path when the editor owns the stack) -->
        <button class="ctox-pane-icon nn-back-to-list" type="button" data-action="back-to-list" title="Zurück zur Liste" aria-label="Zurück zur Liste">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 6l-6 6 6 6"></path></svg>
        </button>

        <!-- Notizbuch Zuweisung -->
        <div class="nn-meta-select-wrap">
          <button class="ctox-button ctox-button--sm nn-meta-btn nn-notebook-select-btn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
            <span data-note-notebook-label>Kein Notizbuch</span>
            <svg class="nn-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
          </button>
          <div class="nn-dropdown-menu" data-notebook-dropdown hidden>
            <!-- Dynamische Auswahl von Notebooks -->
          </div>
        </div>

        <!-- Tags Zuweisung -->
        <div class="nn-meta-select-wrap">
          <button class="ctox-button ctox-button--sm nn-meta-btn nn-tags-select-btn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 4h7l9 9-7 7-9-9V4ZM8.5 8.5h.01"></path></svg>
            <span>Tags verwalten</span>
            <svg class="nn-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"></path></svg>
          </button>
          <div class="nn-dropdown-menu nn-tags-dropdown" data-tags-dropdown hidden>
            <!-- Dynamische Checkboxen für Tags -->
          </div>
        </div>
      </div>

      <div class="ctox-pane-actions nn-editor-controls">
        <button class="ctox-pane-icon" type="button" data-action="star-note" title="Favorit umschalten" aria-label="Favorit umschalten">
          <svg class="nn-star-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 4l2.35 4.9 5.4.7-4 3.75 1 5.35L12 16.1l-4.75 2.6 1-5.35-4-3.75 5.4-.7L12 4Z"></path>
          </svg>
        </button>

        <div class="nn-meta-select-wrap">
          <button class="ctox-pane-icon" type="button" data-action="toggle-note-meta" title="Weitere Aktionen" aria-label="Weitere Aktionen" aria-haspopup="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="5" r="1.4"></circle>
              <circle cx="12" cy="12" r="1.4"></circle>
              <circle cx="12" cy="19" r="1.4"></circle>
            </svg>
          </button>
          <div class="nn-dropdown-menu" data-note-meta-menu hidden>
            <button class="nn-dropdown-item" type="button" data-action="lock-note" title="Notiz verschlüsseln">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <span>Notiz verschlüsseln</span>
            </button>
            <button class="nn-dropdown-item is-danger" type="button" data-action="delete-note" title="Notiz löschen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 7h14M10 7V5h4v2M8 7l1 13h6l1-13M10.5 11v5M13.5 11v5"></path></svg>
              <span>Notiz löschen</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Editor Workbench -->
    <div class="nn-editor-workspace">
      <!-- 1. Passcode Locked Note Decryption Pad (Overlay inside Sheet) -->
      <div class="nn-note-lock-overlay" data-note-lock-screen hidden>
        <div class="nn-note-lock-pad">
          <div class="nn-lock-icon-huge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              <rect x="9" y="11" width="6" height="5" rx="1"></rect>
              <path d="M12 11V9a2 2 0 1 1 4 0v2"></path>
            </svg>
          </div>
          <h3>Notiz ist verschlüsselt</h3>
          <p>Diese Notiz ist mit einem Zero-Knowledge-Passwort gesichert.</p>
          <div class="nn-decrypt-row">
            <input class="ctox-input nn-decrypt-input" type="password" data-note-passcode-input placeholder="Passwort eingeben..." />
            <button class="ctox-button is-primary" type="button" data-action="decrypt-note">Entschlüsseln</button>
          </div>
          <span class="nn-lock-hint">Standard-Passwort: <strong>1234</strong></span>
        </div>
      </div>

      <!-- Das edle Schreibblatt (Paper Sheet) -->
      <div class="nn-paper-sheet" data-paper-sheet-pane>
        <!-- Tag Badges am Notizenanfang -->
        <div class="nn-note-badges" data-note-badges-container></div>

        <!-- Notiz-Datum -->
        <div class="notes-note-date" data-note-date></div>

        <!-- WYSIWYG Editor Container -->
        <div class="notes-tab-panel">
          <div class="nn-wysiwyg-editor-host">
            <div class="nn-wysiwyg-editor"
                 data-notes-editor
                 contenteditable="true"
                 placeholder="Schreib etwas…"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Notesnook Rich Text Editor Control Toolbar -->
    <div class="nn-floating-toolbar-wrapper">
      <div class="nn-editor-toolbar">
        <!-- 1. Textstiltypen Dropdown -->
        <div class="nn-format-wrapper">
          <button class="ctox-pane-icon" type="button" aria-label="Formatvorlage" title="Formatvorlage" data-action="format-text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4 7 4 4 20 4 20 7"></polyline>
              <line x1="9" y1="20" x2="15" y2="20"></line>
              <line x1="12" y1="4" x2="12" y2="20"></line>
            </svg>
          </button>
          <!-- Headers Dropdown -->
          <div class="nn-toolbar-dropdown" data-headers-dropdown data-format-dropdown hidden>
            <button class="nn-dropdown-item" type="button" data-format-cmd="formatBlock" data-val="h1" style="font-weight: 700; font-size: 16px;">Titel (H1)</button>
            <button class="nn-dropdown-item" type="button" data-format-cmd="formatBlock" data-val="h2" style="font-weight: 600; font-size: 14px;">Überschrift (H2)</button>
            <button class="nn-dropdown-item" type="button" data-format-cmd="formatBlock" data-val="h3" style="font-weight: 500; font-size: 13px;">Unterüberschrift (H3)</button>
            <button class="nn-dropdown-item" type="button" data-format-cmd="formatBlock" data-val="p" style="font-size: 13px;">Standardtext (Paragraph)</button>
          </div>
        </div>

        <div class="toolbar-separator"></div>

        <!-- 2. Textauszeichnungen (Inline Commands) -->
        <button class="ctox-pane-icon" type="button" title="Fett" data-format-cmd="bold">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
        </button>
        <button class="ctox-pane-icon" type="button" title="Kursiv" data-format-cmd="italic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
        </button>
        <button class="ctox-pane-icon" type="button" title="Unterstreichen" data-format-cmd="underline">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v7a6 6 0 0 0 12 0V3"></path><line x1="4" y1="21" x2="20" y2="21"></line></svg>
        </button>
        <button class="ctox-pane-icon" type="button" title="Durchgestrichen" data-format-cmd="strikeThrough">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><path d="M16 4H9a4 4 0 0 0-4 4 4 4 0 0 0 4 4h6a4 4 0 0 1 4 4 4 4 0 0 1-4 4H7"></path></svg>
        </button>
        <button class="ctox-pane-icon" type="button" title="Inline Code" data-format-cmd="insertHTML" data-val="<code class='nn-inline-code'>Code</code>">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
        </button>
        <button class="ctox-pane-icon" type="button" title="Textmarker (Highlight)" data-format-cmd="hiliteColor" data-val="#00883733">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"></path><path d="M12 8V16"></path><path d="M8 12H16"></path></svg>
        </button>

        <div class="toolbar-separator"></div>

        <!-- 3. Ausrichtungen -->
        <button class="ctox-pane-icon" type="button" title="Linksbündig" data-format-cmd="justifyLeft">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>
        </button>
        <button class="ctox-pane-icon" type="button" title="Zentriert" data-format-cmd="justifyCenter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="10" x2="6" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="18" y1="18" x2="6" y2="18"></line></svg>
        </button>

        <div class="toolbar-separator"></div>

        <!-- 4. Listen & Aufzählungen -->
        <button class="ctox-pane-icon" type="button" title="Checkliste" data-action="insert-checklist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"></polyline>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
          </svg>
        </button>
        <button class="ctox-pane-icon" type="button" title="Aufzählungsliste" data-format-cmd="insertUnorderedList">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        </button>

        <div class="toolbar-separator"></div>

        <!-- 5. Inserter für komplexe Blöcke -->
        <button class="ctox-pane-icon" type="button" title="Tabelle einfügen" data-action="insert-table">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3h18v18H3z"></path>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="3" y1="15" x2="21" y2="15"></line>
            <line x1="12" y1="3" x2="12" y2="21"></line>
          </svg>
        </button>

        <!-- Code Block -->
        <button class="ctox-pane-icon" type="button" title="Code-Block einfügen" data-action="insert-codeblock">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="8 6 2 12 8 18"></polyline>
            <polyline points="16 18 22 12 16 6"></polyline>
            <line x1="10" y1="21" x2="14" y2="3"></line>
          </svg>
        </button>

        <!-- Callout Block Wrapper -->
        <div class="nn-format-wrapper">
          <button class="ctox-pane-icon" type="button" aria-label="Callout-Block einfügen" title="Callout-Block einfügen" data-action="format-callouts">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="9" x2="15" y2="9"></line>
              <line x1="9" y1="13" x2="15" y2="13"></line>
              <line x1="9" y1="17" x2="13" y2="17"></line>
            </svg>
          </button>
          <!-- Callout Options Dropdown -->
          <div class="nn-toolbar-dropdown" data-callouts-dropdown hidden>
            <button class="nn-dropdown-item" type="button" data-callout-type="info">💡 Info-Box (Blau)</button>
            <button class="nn-dropdown-item" type="button" data-callout-type="warning">⚠️ Warnungs-Box (Orange)</button>
            <button class="nn-dropdown-item" type="button" data-callout-type="tip">❇️ Tipp-Box (Grün)</button>
            <button class="nn-dropdown-item" type="button" data-callout-type="danger">🚨 Gefahr-Box (Rot)</button>
          </div>
        </div>

        <button class="ctox-pane-icon" type="button" title="Trennlinie" data-format-cmd="insertHorizontalRule">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button class="ctox-pane-icon" type="button" title="Zeitstempel" data-action="insert-timestamp">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <!-- Notesnook Editor Statusleiste -->
    <footer class="nn-editor-footer">
      <div>
        <!-- Reaktive Sync-Cloud -->
        <div class="nn-sync-indicator">
          <svg class="nn-sync-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17.5 19A3.5 3.5 0 0 0 21 15.5c0-2.79-2.54-4.5-5-4.5-.42-1.04-1.21-1.92-2.18-2.5A6 6 0 0 0 2 13.5c0 2.2 1.4 3.9 3.5 4.5"></path>
          </svg>
          <span data-notes-status>Synchronisiert</span>
        </div>
      </div>

      <!-- Lesezeit Berechner -->
      <span class="ctox-badge" data-notes-read-time>1 Min. Lesezeit</span>

      <div>
        <span class="nn-stats" data-notes-words>0 Wörter</span>
        <span class="nn-stats" data-notes-chars>0 Zeichen</span>
      </div>
    </footer>
  </section>
</main>
