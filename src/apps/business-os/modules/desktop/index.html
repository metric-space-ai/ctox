<section class="desktop-module no-ctox-context" data-desktop-root>
  <main class="desktop-surface" data-desktop-surface>
    <div class="desktop-icons" data-desktop-icons aria-label="Desktop icons"></div>

    <div class="desktop-widget-container">
      <div class="desktop-hero-widget">
        <div class="widget-time" data-widget-time aria-live="off"></div>
        <div class="widget-date" data-widget-date></div>
        <div class="widget-status">
          <span class="status-pulse"></span>
          <span class="status-text" data-widget-status></span>
        </div>
        <div class="widget-sync" data-widget-sync data-state="idle" role="status" aria-live="polite" hidden>
          <div class="widget-sync-head">
            <span class="widget-sync-title" data-widget-sync-title></span>
            <span class="widget-sync-count" data-widget-sync-count></span>
          </div>
          <div class="widget-sync-detail" data-widget-sync-detail></div>
          <div class="widget-sync-bar" aria-hidden="true"><i data-widget-sync-fill></i></div>
        </div>
      </div>
    </div>
  </main>
</section>
