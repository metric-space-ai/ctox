<main class="ctox-workspace ctox-workspace--two-pane coding-agents-module" data-coding-agents-root data-resize-frame>

  <!-- Column 1: Left Pane (App/Module Picker) -->
  <section class="ctox-pane coding-agents-left" aria-label="Apps">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-ca-left-kicker>pi Coding Agent</span>
          <h2 class="ctox-pane-title" data-ca-left-title>Apps</h2>
        </div>
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon" id="ca-refresh-apps" title="Aktualisieren" aria-label="Aktualisieren">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.3-5.6M20 4v4h-4"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Installed Business OS apps the pi agent can target -->
    <div class="ctox-pane-body">
      <div class="ctox-list" id="ca-app-list">
        <div class="ctox-empty"><strong>Apps werden geladen…</strong></div>
      </div>
    </div>
  </section>

  <!-- Left Resizer Handle (shell-owned declarative resizer) -->
  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="240" data-resizer-max="420" aria-label="App-Spalte anpassen"></button>

  <!-- Column 2: Center Pane (Delegation Workbench) -->
  <section class="ctox-pane coding-agents-center" aria-label="pi-Coding Workbench">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" id="ca-active-app-kicker">pi Coding Agent</span>
          <h2 class="ctox-pane-title" id="ca-active-app-title">Workbench</h2>
        </div>
        <div class="ctox-pane-actions">
          <span class="ctox-badge" id="ca-model-badge">CTOX (Standard)</span>
        </div>
      </div>
    </header>

    <div class="ctox-pane-scroll coding-agents-workbench">

      <!-- Task delegation form -->
      <form class="ctox-card coding-agents-turn-card" id="ca-turn-form">
        <header><span data-ca-form-title>Neuer Coding-Turn</span></header>
        <div class="ctox-card-body coding-agents-turn-body">
          <div>
            <label class="ctox-field-label" for="ca-task-input" data-ca-task-label>Aufgabe</label>
            <textarea id="ca-task-input" class="ctox-textarea" rows="5" placeholder="Beschreibe, was der pi-Agent an dieser App ändern soll…" required disabled></textarea>
          </div>
          <div class="coding-agents-turn-controls">
            <label class="ctox-field-label" for="ca-model-select" data-ca-model-label>Modell</label>
            <select id="ca-model-select" class="ctox-pane-filter"></select>
            <button type="submit" class="ctox-run-control" id="ca-run" disabled><span aria-hidden="true">▶</span> <span data-ca-run-label>Delegieren</span></button>
          </div>
          <p class="coding-agents-hint" id="ca-hint" aria-live="polite"></p>
        </div>
      </form>

      <!-- Last turn result -->
      <section class="ctox-card coding-agents-result-card" id="ca-result" hidden>
        <header>
          <span data-ca-result-title>Letzter Turn</span>
          <span class="ctox-badge" id="ca-result-badge"></span>
        </header>
        <div class="ctox-card-body" id="ca-result-body"></div>
      </section>

      <!-- Recent turns from the command log -->
      <section class="coding-agents-recent">
        <h3 class="ctox-field-label coding-agents-recent-title" data-ca-recent-title>Letzte Turns</h3>
        <div class="ctox-list coding-agents-recent-list" id="ca-recent-list"></div>
      </section>

    </div>
  </section>

</main>
