<main class="ctox-workspace ctox-workspace--two-pane credentials-module" data-credentials-root data-resize-frame>
  <!-- LEFT: credential list — canonical column grammar. All chrome behaviour
       (search / view-toggle / tray / reset / active-dot / band) is SHELL-wired
       from the data-pg-* attributes; this module writes no chrome JS/CSS. Pane
       grid rows: auto [band] minmax(0,1fr) [well] auto [footer]. The list is
       reactive (subscribes to business_commands) — no refresh button. -->
  <aside class="ctox-pane credentials-rail" aria-label="Zugangsdaten" data-left-content>
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-i18n="kicker">CTOX</span>
          <h2 class="ctox-pane-title" data-i18n="listTitle">Zugangsdaten</h2>
        </div>
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon is-primary" data-action="new" data-i18n-title="newAction" aria-label="Neue Zugangsdaten" title="Neue Zugangsdaten"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-action="import" data-i18n-title="importAction" aria-label="Importieren" title="Importieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12M12 15l-4-4M12 15l4-4M5 21h14"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-action="export" data-i18n-title="exportAction" aria-label="Exportieren" title="Exportieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 21V9M12 9l-4 4M12 9l4 4M5 3h14"/></svg></button>
        </div>
      </div>
      <div class="ctox-filterbar">
        <input class="ctox-pane-search" type="search" data-pg-search placeholder="Suchen..." data-i18n-placeholder="searchPlaceholder" aria-label="Zugangsdaten suchen" />
        <div class="ctox-view-toggle" role="group" aria-label="Darstellung">
          <button type="button" class="ctox-pane-icon" data-pg-view="cards" aria-pressed="true" aria-label="Shard-Ansicht" title="Shard-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="14" width="16" height="7" rx="1.5"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-pg-view="list" aria-pressed="false" aria-label="Listen-Ansicht" title="Listen-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
        </div>
        <button type="button" class="ctox-pane-icon ctox-filter-toggle" data-pg-tray-toggle aria-expanded="false" aria-label="Filter" title="Filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.4" fill="var(--surface-2)"/><circle cx="15" cy="12" r="2.4" fill="var(--surface-2)"/><circle cx="8" cy="17" r="2.4" fill="var(--surface-2)"/></svg></button>
      </div>
      <div class="ctox-filter-tray" data-pg-tray hidden>
        <div class="ctox-filter-row">
          <select class="ctox-select" data-pg-filter data-pg-name="source" data-pg-default="all" aria-label="Quelle filtern">
            <option value="all" data-i18n="sourceAll">Alle Quellen</option>
            <option value="catalog" data-i18n="sourceCatalog">Katalog</option>
            <option value="extra" data-i18n="sourceExtra">Eigene</option>
          </select>
          <button type="button" class="ctox-sort-dir" data-pg-reset aria-label="Filter zurücksetzen" title="Filter zurücksetzen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10a8 8 0 1 1 2 7"/><path d="M4 5v5h5"/></svg></button>
        </div>
      </div>
    </header>
    <nav class="ctox-view-switch" aria-label="Ansichten">
      <div class="ctox-pane-tabs">
        <button type="button" class="ctox-pane-tab is-active" role="tab" data-pg-band="all" aria-selected="true"><span data-i18n="bandAll">Alle</span><span class="view-count" data-pg-count="all"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="set" aria-selected="false"><span data-i18n="bandSet">Gesetzt</span><span class="view-count" data-pg-count="set"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="open" aria-selected="false"><span data-i18n="bandOpen">Offen</span><span class="view-count" data-pg-count="open"></span></button>
      </div>
    </nav>
    <div class="ctox-pane-body ctox-well">
      <div class="ctox-record-list" data-cred-list></div>
    </div>
    <footer class="ctox-pane-footer"><span data-pg-footer></span></footer>
  </aside>

  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="260" data-resizer-max="480" aria-label="Spaltenbreite anpassen"></button>

  <!-- MAIN: write-only workbench. Selecting a credential auto-reveals a
       read-only metadata card (visible = hasSelection && !userCollapsed) and
       locks the key field to that credential; the value field is ALWAYS empty
       (write-only — stored values are never returned). "Neu" clears to a fresh
       create form. All ctox.secret.* command flows are unchanged. -->
  <section class="ctox-pane credentials-main" aria-label="Zugangsdaten verwalten" data-cred-main>
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-cred-mode></span>
          <h1 class="ctox-pane-title" data-cred-title>Neue Zugangsdaten</h1>
        </div>
        <div class="ctox-pane-actions"></div>
      </div>
    </header>
    <div class="ctox-pane-scroll credentials-workbench">
      <div class="ctox-callout is-warning cred-writeonly" data-i18n="subtitle" data-cred-writeonly role="note">Write-only: Werte werden verschlüsselt im CTOX-Secret-Store abgelegt und nie an den Browser zurückgegeben.</div>

      <article class="ctox-card cred-detail" data-cred-detail hidden></article>

      <form class="ctox-compact-form" data-cred-form autocomplete="off">
        <div class="ctox-compact-form__fields">
          <label class="ctox-compact-field"><span data-i18n="keyLabel">Schlüssel</span><input type="text" class="ctox-input cred-key" name="name" data-cred-key placeholder="CUSTOM_KEY" spellcheck="false" autocomplete="off" /></label>
          <label class="ctox-compact-field"><span data-i18n="valueLabel">Wert</span><input type="password" class="ctox-input" name="value" data-cred-value placeholder="Wert eingeben" autocomplete="new-password" /></label>
        </div>
        <p class="cred-value-hint" data-i18n="valueHint" data-cred-value-hint>Das Wertfeld bleibt immer leer — gespeicherte Werte werden nie zurückgegeben.</p>
        <div class="ctox-compact-form__actions"><button type="submit" class="ctox-button is-primary" data-cred-submit data-i18n="add_btn">Hinzufügen</button></div>
      </form>

      <div class="ctox-callout" data-cred-gate hidden></div>
    </div>
  </section>
</main>
