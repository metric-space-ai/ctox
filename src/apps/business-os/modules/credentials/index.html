<main class="ctox-workspace ctox-workspace--single credentials-module" data-credentials-root>
  <section class="ctox-pane" aria-label="Zugangsdaten">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker">CTOX</span>
          <h2 class="ctox-pane-title" data-cred-title>Zugangsdaten</h2>
        </div>
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon" data-action="refresh" data-cred-refresh-label aria-label="Aktualisieren" title="Aktualisieren">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.3-5.6M20 4v4h-4"/></svg>
          </button>
        </div>
      </div>
      <p class="cred-subtitle" data-cred-subtitle>
        Write-only: Werte werden verschlüsselt im CTOX-Secret-Store abgelegt und nie an den Browser zurückgegeben.
      </p>
    </header>
    <div class="ctox-pane-scroll cred-body">
      <div class="cred-notice" data-cred-notice hidden></div>

      <section class="cred-section" data-cred-known-section>
        <h3 class="cred-section-title" data-cred-known-title>Bekannte Zugangsdaten</h3>
        <div class="cred-list" data-cred-list>
          <div class="cred-row cred-skeleton"><div class="cred-meta"><span class="sk sk-name"></span><span class="sk sk-desc"></span></div><div class="cred-actions"><span class="sk sk-input"></span><span class="sk sk-btn"></span></div></div>
          <div class="cred-row cred-skeleton"><div class="cred-meta"><span class="sk sk-name"></span><span class="sk sk-desc"></span></div><div class="cred-actions"><span class="sk sk-input"></span><span class="sk sk-btn"></span></div></div>
          <div class="cred-row cred-skeleton"><div class="cred-meta"><span class="sk sk-name"></span><span class="sk sk-desc"></span></div><div class="cred-actions"><span class="sk sk-input"></span><span class="sk sk-btn"></span></div></div>
        </div>
      </section>

      <section class="cred-section" data-cred-extra-section hidden>
        <h3 class="cred-section-title" data-cred-extra-title>Weitere Zugangsdaten</h3>
        <div class="cred-list" data-cred-extra-list></div>
      </section>

      <section class="cred-section cred-add-section" data-cred-add-section>
        <h3 class="cred-section-title" data-cred-add-title>Eigene Zugangsdaten hinzufügen</h3>
        <form class="cred-add" data-cred-add autocomplete="off">
          <input type="text" class="ctox-input cred-add-key" data-add-key placeholder="CUSTOM_KEY" spellcheck="false" autocomplete="off" />
          <input type="password" class="ctox-input cred-add-value" data-add-value placeholder="Wert" autocomplete="new-password" />
          <button type="submit" class="ctox-button is-primary" data-action="add" data-cred-add-btn>Hinzufügen</button>
        </form>
        <p class="cred-add-hint" data-cred-add-hint>Schlüssel im Format UPPER_SNAKE_CASE (A–Z, 0–9, _).</p>
      </section>
    </div>
  </section>
</main>
