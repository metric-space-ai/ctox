<main class="ctox-workspace ctox-workspace--single credentials-module is-add-hidden" data-credentials-root>
  <section class="ctox-pane ctox-record-workbench" aria-label="Zugangsdaten">
    <header class="ctox-pane-header ctox-pane-band ctox-record-workbench__header">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker">CTOX</span>
          <h2 class="ctox-pane-title" data-cred-title>Zugangsdaten</h2>
        </div>
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon" data-toggle-add aria-pressed="false" aria-label="Eigene Zugangsdaten hinzufügen" title="Eigene Zugangsdaten hinzufügen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <button type="button" class="ctox-pane-icon" data-action="refresh" data-cred-refresh-label aria-label="Aktualisieren" title="Aktualisieren">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.3-5.6M20 4v4h-4"/></svg>
          </button>
        </div>
      </div>
      <p class="ctox-record-workbench__subtitle" data-cred-subtitle>
        Write-only: Werte werden verschlüsselt im CTOX-Secret-Store abgelegt und nie an den Browser zurückgegeben.
      </p>
    </header>
    <div class="ctox-record-workbench__body">
      <div class="ctox-callout" data-cred-notice hidden></div>

      <section class="cred-section" data-cred-known-section>
        <div class="ctox-record-list" data-cred-list>
          <div class="cred-row cred-skeleton"><div class="cred-meta"><span class="sk sk-name"></span><span class="sk sk-desc"></span></div><div class="cred-actions"><span class="sk sk-input"></span><span class="sk sk-btn"></span></div></div>
          <div class="cred-row cred-skeleton"><div class="cred-meta"><span class="sk sk-name"></span><span class="sk sk-desc"></span></div><div class="cred-actions"><span class="sk sk-input"></span><span class="sk sk-btn"></span></div></div>
          <div class="cred-row cred-skeleton"><div class="cred-meta"><span class="sk sk-name"></span><span class="sk sk-desc"></span></div><div class="cred-actions"><span class="sk sk-input"></span><span class="sk sk-btn"></span></div></div>
        </div>
      </section>

      <section class="cred-section" data-cred-extra-section hidden>
        <h3 class="ctox-field-label cred-section-title" data-cred-extra-title>Weitere Zugangsdaten</h3>
        <div class="ctox-record-list" data-cred-extra-list></div>
      </section>

      <section class="cred-section" data-cred-add-section>
        <h3 class="ctox-field-label cred-section-title" data-cred-add-title>Eigene Zugangsdaten hinzufügen</h3>
        <form class="ctox-compact-form" data-cred-add autocomplete="off">
          <div class="ctox-compact-form__fields">
            <label class="ctox-compact-field"><span data-cred-key-label>Schlüssel</span><input type="text" class="ctox-input cred-add-key" data-add-key placeholder="CUSTOM_KEY" spellcheck="false" autocomplete="off" /></label>
            <label class="ctox-compact-field"><span data-cred-value-label>Wert</span><input type="password" class="ctox-input" data-add-value placeholder="Wert" autocomplete="new-password" /></label>
          </div>
          <div class="ctox-compact-form__actions"><button type="submit" class="ctox-button is-primary" data-action="add" data-cred-add-btn>Hinzufügen</button></div>
        </form>
      </section>
    </div>
  </section>
</main>
