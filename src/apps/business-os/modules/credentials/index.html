<main class="credentials-module" data-credentials-root>
  <header class="cred-header">
    <div class="cred-header-text">
      <h1 data-cred-title>Zugangsdaten</h1>
      <p class="cred-subtitle" data-cred-subtitle>
        Write-only: Werte werden verschlüsselt im CTOX-Secret-Store abgelegt und nie an den Browser zurückgegeben.
      </p>
    </div>
    <button type="button" class="cred-refresh" data-action="refresh" data-cred-refresh-label>Aktualisieren</button>
  </header>

  <div class="cred-notice" data-cred-notice hidden></div>

  <section class="cred-section" data-cred-known-section>
    <h2 class="cred-section-title" data-cred-known-title>Bekannte Zugangsdaten</h2>
    <div class="cred-list" data-cred-list>
      <div class="cred-row cred-skeleton"><div class="cred-meta"><span class="sk sk-name"></span><span class="sk sk-desc"></span></div><div class="cred-actions"><span class="sk sk-input"></span><span class="sk sk-btn"></span></div></div>
      <div class="cred-row cred-skeleton"><div class="cred-meta"><span class="sk sk-name"></span><span class="sk sk-desc"></span></div><div class="cred-actions"><span class="sk sk-input"></span><span class="sk sk-btn"></span></div></div>
      <div class="cred-row cred-skeleton"><div class="cred-meta"><span class="sk sk-name"></span><span class="sk sk-desc"></span></div><div class="cred-actions"><span class="sk sk-input"></span><span class="sk sk-btn"></span></div></div>
    </div>
  </section>

  <section class="cred-section" data-cred-extra-section hidden>
    <h2 class="cred-section-title" data-cred-extra-title>Weitere Zugangsdaten</h2>
    <div class="cred-list" data-cred-extra-list></div>
  </section>

  <section class="cred-section cred-add-section" data-cred-add-section>
    <h2 class="cred-section-title" data-cred-add-title>Eigene Zugangsdaten hinzufügen</h2>
    <form class="cred-add" data-cred-add autocomplete="off">
      <input type="text" class="cred-add-key" data-add-key placeholder="CUSTOM_KEY" spellcheck="false" autocomplete="off" />
      <input type="password" class="cred-add-value" data-add-value placeholder="Wert" autocomplete="new-password" />
      <button type="submit" class="cred-add-btn" data-action="add" data-cred-add-btn>Hinzufügen</button>
    </form>
    <p class="cred-add-hint" data-cred-add-hint>Schlüssel im Format UPPER_SNAKE_CASE (A–Z, 0–9, _).</p>
  </section>

  <div class="cred-toast" data-cred-toast hidden></div>
</main>
