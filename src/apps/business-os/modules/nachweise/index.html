<main class="ctox-workspace ctox-workspace--two-pane nachweise-module is-actions-hidden" data-ats-root data-resize-frame>
  <!-- LEFT: credential record list — canonical column grammar. All chrome
       behaviour (search / view-toggle / tray / reset / active-dot / band) is
       SHELL-wired from the data-pg-* attributes; this module writes no chrome
       JS/CSS. Pane grid rows: auto auto minmax(0,1fr) auto. -->
  <aside class="ctox-pane nachweise-rail" aria-label="Nachweise" data-left-content>
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-i18n="kicker">ATS</span>
          <h2 class="ctox-pane-title" data-i18n="listTitle">Nachweise</h2>
        </div>
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon is-primary" data-action="new" data-i18n-title="newAction" aria-label="Neuer Nachweis" title="Neuer Nachweis"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-action="import" data-i18n-title="importAction" aria-label="Importieren" title="Importieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12M12 15l-4-4M12 15l4-4M5 21h14"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-action="export" data-i18n-title="exportAction" aria-label="Exportieren" title="Exportieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 21V9M12 9l-4 4M12 9l4 4M5 3h14"/></svg></button>
        </div>
      </div>
      <div class="ctox-filterbar">
        <input class="ctox-pane-search" type="search" data-pg-search placeholder="Suchen..." data-i18n-placeholder="searchPlaceholder" aria-label="Nachweise suchen" />
        <div class="ctox-view-toggle" role="group" aria-label="Darstellung">
          <button type="button" class="ctox-pane-icon" data-pg-view="cards" aria-pressed="true" aria-label="Shard-Ansicht" title="Shard-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="14" width="16" height="7" rx="1.5"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-pg-view="list" aria-pressed="false" aria-label="Listen-Ansicht" title="Listen-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
        </div>
        <button type="button" class="ctox-pane-icon ctox-filter-toggle" data-pg-tray-toggle aria-expanded="false" aria-label="Filter" title="Filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.4" fill="var(--surface-2)"/><circle cx="15" cy="12" r="2.4" fill="var(--surface-2)"/><circle cx="8" cy="17" r="2.4" fill="var(--surface-2)"/></svg></button>
      </div>
      <div class="ctox-filter-tray" data-pg-tray hidden>
        <div class="ctox-filter-row">
          <select class="ctox-select" data-pg-filter data-pg-name="status" data-pg-default="all" aria-label="Status filtern">
            <option value="all" data-i18n="statusAll">Alle Status</option>
            <option value="valid" data-i18n="statusValid">gültig</option>
            <option value="expiring" data-i18n="statusExpiring">läuft ab</option>
            <option value="expired" data-i18n="statusExpired">abgelaufen</option>
            <option value="not_yet_valid" data-i18n="statusNotYetValid">noch nicht gültig</option>
            <option value="unverified" data-i18n="statusUnverified">nicht verifiziert</option>
          </select>
          <button type="button" class="ctox-sort-dir" data-pg-reset aria-label="Filter zurücksetzen" title="Filter zurücksetzen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10a8 8 0 1 1 2 7"/><path d="M4 5v5h5"/></svg></button>
        </div>
      </div>
    </header>
    <nav class="ctox-view-switch" aria-label="Ansichten">
      <div class="ctox-pane-tabs">
        <button type="button" class="ctox-pane-tab is-active" role="tab" data-pg-band="all" aria-selected="true"><span data-i18n="bandAll">Alle</span><span class="view-count" data-pg-count="all"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="valid" aria-selected="false"><span data-i18n="bandValid">Gültig</span><span class="view-count" data-pg-count="valid"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="expiring" aria-selected="false"><span data-i18n="bandExpiring">Ablaufend</span><span class="view-count" data-pg-count="expiring"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="critical" aria-selected="false"><span data-i18n="bandCritical">Kritisch</span><span class="view-count" data-pg-count="critical"></span></button>
      </div>
    </nav>
    <div class="ctox-pane-body ctox-well">
      <div class="ctox-list" data-ats-list></div>
    </div>
    <footer class="ctox-pane-footer"><span data-pg-footer></span></footer>
  </aside>

  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="260" data-resizer-max="480" aria-label="Spaltenbreite anpassen"></button>

  <!-- MAIN: capture workbench, record-bound. Selecting a credential fills the
       form and auto-reveals a read-only detail card
       (visible = hasSelection && !userCollapsed). "Neu" clears to create-mode.
       The Einsatz-Gate and Entleiher-Sign-off command forms stay EXACTLY as
       they were, hidden behind the header toggle. -->
  <section class="ctox-pane nachweise-main" aria-label="Nachweis-Erfassung" data-ats-main>
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-i18n="kicker">ATS</span>
          <h1 class="ctox-pane-title" data-ats-title>Nachweise</h1>
        </div>
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon" data-toggle-actions data-i18n-title="actionsLabel" title="Prüfung &amp; Sign-off" aria-label="Prüfung &amp; Sign-off" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg>
          </button>
        </div>
      </div>
      <p class="nachweise-sub" data-ats-sub></p>
    </header>
    <div class="ctox-pane-scroll nachweise-workbench">
      <article class="ctox-card nachweise-detail" data-ats-detail hidden></article>

      <form class="ctox-compact-form" data-ats-form>
        <div class="ctox-compact-form__fields">
          <label class="ctox-compact-field"><span data-i18n="subjectLabel">Subjekt</span><input class="ctox-input" type="text" name="subject_id" placeholder="Subjekt-ID (Kandidat/Mitarbeiter)" data-i18n-placeholder="subjectPlaceholder" required data-f /></label>
          <label class="ctox-compact-field"><span data-i18n="credentialTypeLabel">Nachweistyp</span><select class="ctox-select" name="credential_type" data-credential-type data-f></select></label>
          <label class="ctox-compact-field"><span data-i18n="issuer">Aussteller</span><input class="ctox-input" type="text" name="issuer" placeholder="Aussteller" data-i18n-placeholder="issuerPlaceholder" data-f /></label>
          <label class="ctox-compact-field"><span data-i18n="validUntilLabel">Gültig bis</span><input class="ctox-input" type="date" name="valid_until" data-f /></label>
        </div>
        <div class="ctox-compact-form__actions"><button type="submit" class="ctox-button is-primary" data-i18n="addCredential">Nachweis hinzufügen</button></div>
      </form>

      <div data-ats-advanced>
      <form class="ctox-compact-form" data-ats-gate-form>
        <div class="ctox-compact-form__fields">
          <label class="ctox-compact-field"><span data-i18n="deploymentSubjectLabel">Einsatz-Subjekt</span><input class="ctox-input" type="text" name="subject_id" placeholder="Subjekt-ID für Einsatz-Prüfung" data-i18n-placeholder="deploymentSubjectPlaceholder" required data-f /></label>
          <label class="ctox-compact-field"><span data-i18n="requiredTypesLabel">Pflicht-Typen</span><input class="ctox-input" type="text" name="required_types" placeholder="Pflicht-Typen (kommagetrennt)" data-i18n-placeholder="requiredTypesPlaceholder" data-f /></label>
        </div>
        <div class="ctox-compact-form__actions"><button type="submit" class="ctox-button" data-i18n="checkReadiness">Einsatzbereitschaft prüfen</button></div>
      </form>

      <form class="ctox-compact-form" data-ats-signoff-form>
        <div class="ctox-compact-form__fields">
          <label class="ctox-compact-field"><span data-i18n="recordLabel">Leistungsnachweis</span><input class="ctox-input" type="text" name="record_id" placeholder="Leistungsnachweis-ID (Sign-off)" data-i18n-placeholder="recordPlaceholder" required data-f /></label>
          <label class="ctox-compact-field"><span data-i18n="rateLabel">Verrechnungssatz</span><input class="ctox-input" type="number" name="charge_rate" step="0.01" min="0" placeholder="Verrechnungssatz €/h (Pflicht für Abrechnung)" data-i18n-placeholder="ratePlaceholder" data-f /></label>
          <label class="ctox-compact-field"><span data-i18n="clientLabel">Entleiher</span><input class="ctox-input" type="text" name="entleiher_account_id" placeholder="Entleiher-Account-ID (Rechnungsempfänger)" data-i18n-placeholder="clientAccountPlaceholder" data-f /></label>
          <label class="ctox-compact-field"><span data-i18n="signatureLabel">Signatur-Anfrage</span><input class="ctox-input" type="text" name="signature_request_id" placeholder="Signatur-Anfrage-ID (falls Entleiher-Signatur erzwungen)" data-i18n-placeholder="signaturePlaceholder" data-f /></label>
          <label class="ctox-compact-field"><span data-i18n="collectionLabel">Collection</span><input class="ctox-input" type="text" name="collection" placeholder="Collection (optional, Standard: planning_time_records)" data-i18n-placeholder="collectionPlaceholder" data-f /></label>
        </div>
        <div class="ctox-compact-form__actions"><button type="submit" class="ctox-button" data-i18n="releaseBilling">Entleiher-Sign-off → Abrechnung freigeben</button></div>
      </form>
      </div>

      <div class="ctox-callout" data-ats-gate hidden></div>
    </div>
  </section>
</main>
