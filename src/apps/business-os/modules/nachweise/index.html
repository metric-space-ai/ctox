<section class="credentials-module" data-credentials-root>
  <header class="credentials-head">
    <h1>Nachweise</h1>
    <p class="credentials-sub">Ablaufende, verifizierte Nachweise je Subjekt mit Einsatz-Gate.</p>
  </header>
  <form class="credentials-form" data-credentials-form>
    <input type="text" name="subject_id" placeholder="Subjekt-ID (Kandidat/Mitarbeiter)" required />
    <select name="credential_type" data-credential-type></select>
    <input type="text" name="issuer" placeholder="Aussteller" />
    <input type="date" name="valid_until" />
    <button type="submit">Nachweis hinzufügen</button>
  </form>
  <form class="credentials-gate-form" data-credentials-gate-form>
    <input type="text" name="subject_id" placeholder="Subjekt-ID für Einsatz-Prüfung" required />
    <input type="text" name="required_types" placeholder="Pflicht-Typen (kommagetrennt)" />
    <button type="submit">Einsatzbereitschaft prüfen</button>
    <span class="credentials-gate-result" data-credentials-gate-result></span>
  </form>
  <div class="credentials-list" data-credentials-list></div>
</section>
