<!-- This file is a SHELL FRAGMENT: styles and mount(ctx) come from the
     Business OS shell. Opened directly (file://) it renders unstyled — that is
     by design, not a defect. Run it at http://localhost:8765/business-os/ -->
<p class="ctox-standalone-note">Dieses Modul-Fragment läuft nur innerhalb der CTOX Business-OS-Shell. Öffne die App unter <strong>http://localhost:8765/business-os/#threads</strong>.</p>
<main class="ctox-workspace threads-module is-actions-hidden" data-threads-root data-resize-frame>
  <aside class="ctox-pane threads-left" aria-label="Threads Navigation">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-label="hubKicker">Business OS</span>
          <h2 class="ctox-pane-title" data-label="threadsTitle">Threads</h2>
        </div>
        <!-- Standing actions: new note (opens the action workbench, focuses
             the note form) + JSON export of the filtered thread list. No
             manual refresh: the module keeps itself current (bounded poll +
             command receipts). Reactive data needs no reload button. -->
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon" data-action="create-note" aria-label="Neue Notiz anlegen" title="Neue Notiz anlegen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-action="export-threads" aria-label="Gefilterte Threads als JSON exportieren" title="Gefilterte Threads als JSON exportieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v11M12 3 8 7M12 3l4 4M5 12v7h14v-7"/></svg></button>
        </div>
      </div>
      <!-- Row 2: filter section — search + view toggle + filter tray toggle.
           Canonical data-pg-* grammar: the SHELL wires search / view / tray /
           reset / band / counts / footer (autoWirePaneGrammar); the module
           only renders lists and listens to ctox-pane-grammar-change. The old
           permanent 12-chip wall lived here; secondary filters now sit in the
           collapsed tray, primary views in the switcher band below. -->
      <div class="threads-filterbar">
        <input class="ctox-pane-search" type="search" data-pg-search placeholder="Threads suchen" aria-label="Threads suchen">
        <div class="threads-view-toggle" role="group" aria-label="Darstellung">
          <button type="button" class="ctox-pane-icon" data-pg-view="cards" aria-pressed="true" aria-label="Shard-Ansicht" title="Shard-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="14" width="16" height="7" rx="1.5"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-pg-view="list" aria-pressed="false" aria-label="Listen-Ansicht" title="Listen-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
        </div>
        <button type="button" class="ctox-pane-icon threads-filter-toggle" data-pg-tray-toggle aria-expanded="false" aria-label="Filter" title="Filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.4" fill="var(--surface-2)"/><circle cx="15" cy="12" r="2.4" fill="var(--surface-2)"/><circle cx="8" cy="17" r="2.4" fill="var(--surface-2)"/></svg></button>
      </div>
      <div class="threads-filter-advanced" data-pg-tray hidden>
        <div class="threads-filter-row">
          <!-- Secondary views only: the four primary queues live in the counted
               band below; the neutral value means "band governs". -->
          <select class="ctox-select threads-select" data-pg-filter data-pg-name="view" data-pg-default="" aria-label="Sekundäre Ansicht">
            <option value="">Sekundäransicht aus</option>
            <option value="delegated">Wartet auf andere</option>
            <option value="snoozed">Später</option>
            <option value="team">Team Queue</option>
            <option value="mentions">Erwähnungen</option>
            <option value="approvals">Freigaben</option>
            <option value="failed">Blockiert</option>
            <option value="all">Alle</option>
            <option value="system">CTOX-Tasks (System)</option>
          </select>
          <button type="button" class="threads-filter-reset" data-pg-reset aria-label="Filter zurücksetzen" title="Filter zurücksetzen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10a8 8 0 1 1 2 7"/><path d="M4 5v5h5"/></svg></button>
        </div>
      </div>
    </header>
    <!-- Row 3: counted view band — the four everyday queues, ALL counted
         (zeros rendered, never hidden). -->
    <nav class="threads-view-switch" aria-label="Thread Ansichten">
      <div class="ctox-pane-tabs">
        <button type="button" class="ctox-pane-tab is-active" role="tab" data-pg-band="inbox" aria-selected="true">Handeln<span class="view-count" data-pg-count="inbox"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="waiting" aria-selected="false">Wartet<span class="view-count" data-pg-count="waiting"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="running" aria-selected="false">AI<span class="view-count" data-pg-count="running"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="archived" aria-selected="false">Erledigt<span class="view-count" data-pg-count="archived"></span></button>
      </div>
    </nav>
    <div class="ctox-pane-body threads-well">
      <div class="ctox-list threads-list" data-thread-list tabindex="-1"></div>
    </div>
    <footer class="threads-footer"><span data-pg-footer></span></footer>
  </aside>

  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="240" data-resizer-max="480" aria-label="Linke Spaltenbreite anpassen"></button>

  <section class="ctox-pane threads-center" aria-label="Thread Timeline">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <button type="button" class="ctox-pane-icon threads-mobile-back" data-mobile-back aria-label="Zur Inbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-thread-source>Kontext</span>
          <h2 class="ctox-pane-title" data-thread-title>Kein Thread ausgewählt</h2>
        </div>
        <div class="ctox-pane-actions">
          <!-- View toggle for the timeline (cards vs. compact list) — shell-wired
               pane grammar (data-pg-view) like the left rail. -->
          <div class="threads-view-toggle" role="group" aria-label="Timeline-Darstellung">
            <button type="button" class="ctox-pane-icon" data-pg-view="cards" aria-pressed="true" aria-label="Karten-Ansicht" title="Karten-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="14" width="16" height="7" rx="1.5"/></svg></button>
            <button type="button" class="ctox-pane-icon" data-pg-view="list" aria-pressed="false" aria-label="Listen-Ansicht" title="Listen-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
          </div>
          <button type="button" class="ctox-pane-icon" data-thread-delegate title="An Teammitglied übergeben" aria-label="An Teammitglied übergeben">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7ZM3.5 19.5a5.5 5.5 0 0 1 11 0"/><path d="M16 8h5M18.5 5.5 21 8l-2.5 2.5"/></svg>
          </button>
          <button type="button" class="ctox-pane-icon" data-thread-watch title="Watch" aria-label="Watch">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6ZM12 9.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"/></svg>
          </button>
          <button type="button" class="ctox-pane-icon" data-thread-snooze title="Snooze" aria-label="Snooze">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4.5a7.5 7.5 0 1 1 0 15 7.5 7.5 0 0 1 0-15ZM12 8v4.5l3 2"/></svg>
          </button>
          <button type="button" class="ctox-pane-icon" data-thread-archive title="Archivieren" aria-label="Archivieren">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5h16v4H4zM6 9v10h12V9M10 13h4"/></svg>
          </button>
          <button type="button" class="ctox-pane-icon threads-toggle-actions" data-toggle-actions title="Aktionen & Aufmerksamkeit" aria-label="Aktionen & Aufmerksamkeit einblenden" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg>
          </button>
        </div>
      </div>
    </header>
    <div class="threads-timeline" data-thread-timeline></div>
    <form class="threads-composer" data-message-form>
      <div class="threads-mention-popup" data-mention-popup hidden></div>
      <textarea class="ctox-textarea" data-message-body rows="3" placeholder="Antwort oder Notiz in diesen Thread schreiben"></textarea>
      <button type="submit" class="ctox-button is-primary">Senden</button>
    </form>
    <nav class="threads-mobile-actions" aria-label="Thread Aktionen">
      <button type="button" data-mobile-reply>Antworten</button>
      <button type="button" data-thread-claim>Übernehmen</button>
      <button type="button" data-mobile-snooze>Später</button>
      <button type="button" data-mobile-more>Mehr</button>
    </nav>
  </section>

  <button class="ctox-column-resizer" type="button" data-resizer="right" data-resizer-var="--ctox-right-width" data-resizer-min="280" data-resizer-max="520" aria-label="Rechte Spaltenbreite anpassen"></button>

  <aside class="ctox-pane threads-right" aria-label="Thread Actions">
    <div class="ctox-pane-scroll threads-right-scroll">
      <section class="ctox-card threads-panel">
        <header><h3>Aufmerksamkeit</h3></header>
        <div class="ctox-card-body">
          <form data-notification-preferences-form class="threads-form">
            <label><span class="ctox-field-label">Mindestpriorität</span><input class="ctox-input" type="number" min="0" max="100" step="10" value="20" data-notification-threshold></label>
            <label><span class="ctox-field-label">Ruhezeit von</span><input class="ctox-input" type="time" data-quiet-start></label>
            <label><span class="ctox-field-label">Ruhezeit bis</span><input class="ctox-input" type="time" data-quiet-end></label>
            <label class="ctox-choice"><input type="checkbox" checked data-notification-approvals> Freigaben</label>
            <label class="ctox-choice"><input type="checkbox" checked data-notification-mentions> Erwähnungen</label>
            <label class="ctox-choice"><input type="checkbox" checked data-notification-escalations> Eskalationen und Fehler</label>
            <button type="submit" class="ctox-button">Speichern</button>
          </form>
        </div>
      </section>

      <section class="ctox-card threads-panel">
        <header><h3>Übergabe</h3></header>
        <div class="ctox-card-body">
          <form data-handoff-form class="threads-form">
            <label><span class="ctox-field-label">An</span><select class="ctox-select" data-handoff-target data-roster-select required></select></label>
            <label><span class="ctox-field-label">Erwartung</span><textarea class="ctox-textarea" data-handoff-body rows="3" required></textarea></label>
            <label><span class="ctox-field-label">Frist</span><input class="ctox-input" type="datetime-local" data-handoff-due></label>
            <label><span class="ctox-field-label">Rückgabe wenn</span><input class="ctox-input" data-handoff-return-reason placeholder="z. B. Evidenz fehlt"></label>
            <button type="submit" class="ctox-button">Übergeben</button>
          </form>
        </div>
      </section>

      <section class="ctox-card threads-panel">
        <header><h3>AI beauftragen</h3></header>
        <div class="ctox-card-body">
          <form data-ai-form class="threads-form">
            <label><span class="ctox-field-label">Ziel</span><textarea class="ctox-textarea" data-ai-goal rows="3" required></textarea></label>
            <button type="submit" class="ctox-button is-primary">AI starten</button>
          </form>
        </div>
      </section>

      <section class="ctox-card threads-panel">
        <header><h3>Neue Notiz</h3></header>
        <div class="ctox-card-body">
          <form data-note-form class="threads-form">
            <label>
              <span class="ctox-field-label">An User</span>
              <select class="ctox-select" data-note-target data-roster-select></select>
            </label>
            <label>
              <span class="ctox-field-label">Notiz</span>
              <textarea class="ctox-textarea" data-note-body rows="4" placeholder="Kontext, Hinweis oder Bitte"></textarea>
            </label>
            <button type="submit" class="ctox-button is-primary">Notiz hinterlassen</button>
          </form>
        </div>
      </section>

      <section class="ctox-card threads-panel">
        <header><h3>CTOX Freigabe</h3></header>
        <div class="ctox-card-body">
          <form data-approval-form class="threads-form">
            <label>
              <span class="ctox-field-label">Reviewer</span>
              <select class="ctox-select" data-approval-reviewer data-roster-select></select>
            </label>
            <label>
              <span class="ctox-field-label">Prompt</span>
              <textarea class="ctox-textarea" data-approval-prompt rows="5" placeholder="Was CTOX nach Freigabe tun soll"></textarea>
            </label>
            <button type="submit" class="ctox-button is-primary">Freigabe anfragen</button>
          </form>
        </div>
      </section>

      <section class="ctox-card threads-panel" data-context-panel>
        <header><h3>Kontext</h3></header>
        <div class="ctox-card-body">
          <div class="threads-context" data-thread-context></div>
        </div>
      </section>
    </div>
  </aside>
</main>
