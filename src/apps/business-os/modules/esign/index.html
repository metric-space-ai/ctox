<section class="ats-esign ctox-record-workbench" data-ats-root>
  <header class="ctox-pane-header ctox-pane-band ctox-record-workbench__header">
    <div class="ctox-pane-title-row">
      <div class="ctox-pane-titles">
        <h1 class="ctox-pane-title" data-ats-title></h1>
      </div>
    </div>
  </header>
  <div class="ctox-record-workbench__body">
    <form class="ctox-compact-form" data-ats-form>
      <div class="ctox-compact-form__fields">
        <label class="ctox-compact-field"><span data-copy="document">Dokument-ID</span><input class="ctox-input" type="text" name="document_id" required data-f /></label>
        <label class="ctox-compact-field"><span data-copy="subjectKind">Vertragstyp</span><select class="ctox-select" name="subject_kind" data-f><option value="arbeitsvertrag" data-copy="employment">arbeitsvertrag</option><option value="vermittlungsvertrag" data-copy="placement">vermittlungsvertrag</option><option value="ueberlassungsvertrag" data-copy="staffing">ueberlassungsvertrag</option></select></label>
        <label class="ctox-compact-field"><span data-copy="signers">Unterzeichner</span><input class="ctox-input" type="text" name="signers" data-f /></label>
      </div>
      <div class="ctox-compact-form__actions"><button class="ctox-button is-primary" type="submit" data-copy="create">Anlegen</button></div>
    </form>
    <div class="ctox-callout" data-ats-gate></div>
    <div class="ctox-record-workbench__status" data-ats-count></div>
    <div class="ctox-record-list" data-ats-list></div>
  </div>
</section>
