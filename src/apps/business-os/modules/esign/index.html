<section class="ats-module ats-esign" data-ats-root>

  <form class="ats-form" data-ats-form>
    <input type="text" name="document_id" placeholder="Dokument-ID" required data-f />
    <select name="subject_kind" data-f><option value="arbeitsvertrag">arbeitsvertrag</option><option value="vermittlungsvertrag">vermittlungsvertrag</option><option value="ueberlassungsvertrag">ueberlassungsvertrag</option></select>
    <input type="text" name="signers" placeholder="Unterzeichner-IDs (Komma-getrennt)" data-f />
    <button type="submit">Anlegen</button>
  </form>
  <div class="ats-gate" data-ats-gate></div>
  <div class="ats-count" data-ats-count></div>
  <div class="ats-list" data-ats-list></div>
</section>
