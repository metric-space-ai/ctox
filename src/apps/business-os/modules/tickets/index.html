<main class="ctox-workspace tickets-module" data-tickets-root data-resize-frame>
  <aside class="ctox-pane tickets-pane tickets-left" aria-label="Tickets">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-ticket-kicker>CTOX</span>
          <h2 class="ctox-pane-title" data-ticket-title>Tickets</h2>
        </div>
        <div class="ctox-pane-actions">
          <button class="ctox-pane-icon" type="button" data-ticket-create-local aria-label="Ticket anlegen" title="Ticket anlegen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      </div>
      <div class="ctox-pane-tools">
        <input class="ctox-pane-search" type="search" data-ticket-search placeholder="Suchen..." />
        <select class="ctox-pane-filter" data-ticket-state>
          <option value="all">Alle Status</option>
          <option value="open">Offen</option>
          <option value="pending">Pending</option>
          <option value="blocked">Blockiert</option>
          <option value="closed">Geschlossen</option>
        </select>
      </div>
      <p class="tickets-command-status" data-ticket-command-status hidden></p>
    </header>
    <div class="ctox-pane-body">
      <div class="ctox-list os-scrollbar" data-ticket-list></div>
    </div>
  </aside>
  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="260" data-resizer-max="520" aria-label="Spaltenbreite anpassen"></button>
  <section class="ctox-pane tickets-pane tickets-center" aria-label="Ticket detail" data-ticket-detail></section>
  <button class="ctox-column-resizer" type="button" data-resizer="right" data-resizer-var="--ctox-right-width" data-resizer-min="260" data-resizer-max="560" aria-label="Rechte Spaltenbreite anpassen"></button>
  <aside class="ctox-pane tickets-pane tickets-right" aria-label="Ticket operations context" data-ticket-context></aside>
</main>
