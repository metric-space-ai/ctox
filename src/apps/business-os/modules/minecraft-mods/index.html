<main class="minecraft-mods" data-minecraft-mods-root>
  <section class="mc-pane mc-left" aria-label="Minecraft Mod Projects">
    <header class="mc-pane-head">
      <div>
        <span>Development</span>
        <h2>Minecraft Mods</h2>
      </div>
      <button type="button" class="mc-icon-button" data-action="new-project" title="New mod" aria-label="New mod">+</button>
    </header>
    <div class="mc-tools">
      <input data-search placeholder="Search projects or mod ids" />
      <div class="mc-segmented" role="tablist" aria-label="Loader filter">
        <button type="button" data-loader="all" aria-pressed="true">All</button>
        <button type="button" data-loader="fabric" aria-pressed="false">Fabric</button>
        <button type="button" data-loader="forge" aria-pressed="false">Forge</button>
        <button type="button" data-loader="neoforge" aria-pressed="false">NeoForge</button>
      </div>
    </div>
    <div class="mc-list" data-project-list></div>
  </section>

  <section class="mc-pane mc-center" aria-label="Minecraft Mod Workbench">
    <header class="mc-pane-head mc-center-head">
      <div>
        <span data-active-loader>Fabric</span>
        <h2 data-active-title>Controller Support Pack</h2>
      </div>
      <div class="mc-action-row">
        <button type="button" data-action="build">Build</button>
        <button type="button" data-action="install">Install</button>
        <button type="button" data-action="merge">Merge</button>
      </div>
    </header>
    <div class="mc-status" data-status>Ready</div>
    <div class="mc-grid">
      <section class="mc-work-surface" aria-label="Artifacts">
        <div class="mc-section-head">
          <h3>Artifacts</h3>
          <button type="button" data-action="inspect">Inspect jar</button>
        </div>
        <table class="mc-table">
          <thead><tr><th>Jar</th><th>Mod ID</th><th>Loader</th><th>Version</th><th>Status</th></tr></thead>
          <tbody data-artifact-rows></tbody>
        </table>
      </section>
      <section class="mc-work-surface" aria-label="Merge Planner">
        <div class="mc-section-head">
          <h3>Merge planner</h3>
          <button type="button" data-action="new-merge">New plan</button>
        </div>
        <div class="mc-merge-list" data-merge-list></div>
      </section>
      <section class="mc-work-surface" aria-label="Install Targets">
        <div class="mc-section-head">
          <h3>Install targets</h3>
          <button type="button" data-action="new-install-target">Add target</button>
        </div>
        <div class="mc-install-list" data-install-list></div>
      </section>
    </div>
  </section>

  <aside class="mc-pane mc-right" aria-label="Selected Minecraft Mod">
    <header class="mc-pane-head">
      <div>
        <span>Selected</span>
        <h2 data-detail-title>Mod</h2>
      </div>
    </header>
    <form class="mc-form" data-detail-form>
      <label>Title<input name="title" data-field="title" /></label>
      <label>Package ID<input name="package_id" data-field="package_id" /></label>
      <label>Loader<select name="loader" data-field="loader"><option>fabric</option><option>forge</option><option>neoforge</option><option>quilt</option></select></label>
      <label>Minecraft version<input name="minecraft_version" data-field="minecraft_version" /></label>
      <label>Project path<input name="project_path" data-field="project_path" /></label>
      <label>Notes<textarea name="notes" data-field="notes"></textarea></label>
      <div class="mc-action-row">
        <button type="submit">Save</button>
        <button type="button" data-action="delete-project">Delete</button>
      </div>
    </form>
    <section class="mc-command-log">
      <h3>Commands</h3>
      <div data-command-list></div>
    </section>
  </aside>
</main>
