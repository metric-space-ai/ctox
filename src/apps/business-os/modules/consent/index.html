<main class="ctox-workspace ctox-workspace--single ats-module ats-consent" data-ats-root>
  <section class="ctox-pane">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-ats-sub></span>
          <h2 class="ctox-pane-title" data-ats-title></h2>
        </div>
      </div>
    </header>
    <div class="ctox-pane-scroll ats-body">
      <form class="ats-form" data-ats-form>
        <input class="ctox-input" type="text" name="subject_id" placeholder="Subjekt-ID" required data-f />
        <input class="ctox-input" type="text" name="purpose" placeholder="Zweck (optional — leer = nur Existenz)" data-f />
        <button type="submit" class="ctox-button is-primary">Einwilligung prüfen</button>
      </form>

      <form class="ats-form ats-subject-actions" data-ats-subject-form>
        <input class="ctox-input" type="text" name="subject_id" placeholder="Subjekt-ID für Betroffenenrechte" data-f />
        <button type="submit" class="ctox-button" data-subject-action="ats.subject.export" title="Recht auf Auskunft (DSGVO Art. 15)">Auskunft (Art. 15)</button>
        <button type="submit" class="ctox-button is-danger" data-subject-action="ats.subject.erase" title="Recht auf Löschung (DSGVO Art. 17)">Löschen (Art. 17)</button>
      </form>

      <div class="ats-gate" data-ats-gate></div>
      <div class="ats-count" data-ats-count></div>
      <div class="ats-list" data-ats-list></div>
    </div>
  </section>
</main>
