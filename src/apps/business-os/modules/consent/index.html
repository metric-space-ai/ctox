<section class="ats-module ats-consent" data-ats-root>
  <header class="ats-head"><h1 data-ats-title></h1><p class="ats-sub" data-ats-sub></p></header>
  <form class="ats-form" data-ats-form>
    <input type="text" name="subject_id" placeholder="Subjekt-ID" required data-f />
    <input type="text" name="purpose" placeholder="Zweck" required data-f />
    <select name="legal_basis" data-f><option value="consent">consent</option><option value="contract">contract</option><option value="legitimate_interest">legitimate_interest</option><option value="legal_obligation">legal_obligation</option><option value="special_category_consent">special_category_consent</option></select>
    <button type="submit">Anlegen</button>
  </form>
  <div class="ats-gate" data-ats-gate></div>
  <div class="ats-count" data-ats-count></div>
  <div class="ats-list" data-ats-list></div>
</section>
