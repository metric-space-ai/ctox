<section class="ats-module ats-placements" data-ats-root>
  <header class="ctox-pane-header ctox-pane-band ats-head">
    <div class="ctox-pane-title-row">
      <div class="ctox-pane-titles">
        <span class="ctox-pane-kicker">Vermittlungen</span>
        <h1 class="ctox-pane-title" data-ats-title></h1>
      </div>
    </div>
    <p class="ats-sub" data-ats-sub></p>
  </header>
  <div class="ats-body">
    <form class="ats-form" data-ats-form>
      <input class="ctox-input" type="text" name="candidate_id" placeholder="Kandidat-ID" required data-f />
      <input class="ctox-input" type="text" name="client_account_id" placeholder="Kunden-Account-ID" data-f />
      <select class="ctox-select" name="placement_type" data-f>
        <option value="">Festanstellung (Personalvermittlung)</option>
        <option value="arbeitnehmerueberlassung">Arbeitnehmerüberlassung (Zeitarbeit)</option>
      </select>
      <input class="ctox-input" type="text" name="required_types" placeholder="Pflicht-Qualifikationen (Komma)" data-f />
      <input class="ctox-input" type="number" name="fee" placeholder="Honorar" data-f />
      <input class="ctox-input" type="number" name="guarantee_days" placeholder="Garantie (Tage)" data-f />
      <button class="ctox-button is-primary" type="submit">Anlegen</button>
    </form>
    <div class="ats-gate" data-ats-gate></div>
    <div class="ats-count" data-ats-count></div>
    <div class="ats-list" data-ats-list></div>
  </div>
</section>
