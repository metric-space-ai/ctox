<main class="ctox-workspace app" data-resize-frame>
    <!-- LEFT: Anforderungen -->
    <section class="ctox-pane" id="left">
      <header class="ctox-pane-header ctox-pane-band">
        <div class="ctox-pane-title-row">
          <div class="ctox-pane-titles">
            <span class="ctox-pane-kicker">Matching-Engine</span>
            <h2 class="ctox-pane-title column-title">Anforderungen</h2>
          </div>
          <div class="ctox-pane-actions">
            <button class="ctox-pane-icon" type="button" id="createRequirementBtn" aria-label="Anforderung anlegen" title="Anforderung anlegen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <div class="matching-overflow">
              <button class="ctox-pane-icon" type="button" data-toggle-pane-options="requirements" aria-label="Spaltenoptionen" title="Spaltenoptionen" aria-expanded="false" aria-haspopup="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
              </button>
              <div class="matching-overflow-menu" data-pane-menu="requirements" role="menu" hidden>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="requirements" data-column-action="configure" data-drawer-side="left">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 8.5a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7ZM12 3v2.2M12 18.8V21M21 12h-2.2M5.2 12H3M18.4 5.6l-1.6 1.6M7.2 16.8l-1.6 1.6M18.4 18.4l-1.6-1.6M7.2 7.2 5.6 5.6"/></svg>
                  <span>Konfigurieren</span>
                </button>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="requirements" data-column-action="import" data-drawer-side="left">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4v11M12 15l-4-4M12 15l4-4M5 19h14"/></svg>
                  <span>Importieren</span>
                </button>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="requirements" data-column-action="export" data-drawer-side="left">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V4M12 4 8 8M12 4l4 4M5 19h14"/></svg>
                  <span>Exportieren</span>
                </button>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="requirements" data-column-action="search-sort" data-drawer-side="left">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
                  <span>Suche &amp; Sortierung</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="ctox-pane-tools">
          <input class="ctox-pane-search" id="sourceSearch" type="search" placeholder="Anforderung, Quellen oder Bereich suchen…" aria-label="Anforderungen suchen" />
          <select class="ctox-pane-filter" id="sourceGroupMode" aria-label="Anforderungen gruppieren und sortieren">
            <option value="source">Gruppe: Quellen</option>
            <option value="area">Gruppe: Bereiche</option>
            <option value="recent">Neueste zuerst</option>
          </select>
        </div>
      </header>
      <div class="sources">
        <div class="source-grid" id="sourceGrid"></div>
      </div>
    </section>

    <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="260" data-resizer-max="560" aria-label="Spaltenbreite links anpassen"></button>

    <!-- MIDDLE: Matches -->
    <section class="ctox-pane requirements-wrap" id="center">
      <header class="ctox-pane-header ctox-pane-band">
        <div class="ctox-pane-title-row">
          <div class="ctox-pane-titles">
            <span class="ctox-pane-kicker">Kompilierung</span>
            <h2 class="ctox-pane-title column-title">Matches</h2>
          </div>
          <div class="ctox-pane-actions">
            <div class="ctox-pane-tabs" role="tablist" aria-label="Match-Darstellung">
              <button class="ctox-pane-tab active" type="button" id="tabList" role="tab" aria-selected="true" aria-pressed="true">Liste</button>
              <button class="ctox-pane-tab" type="button" id="tabMap" role="tab" aria-selected="false" aria-pressed="false">Tabelle</button>
            </div>
            <div class="matching-overflow">
              <button class="ctox-pane-icon" type="button" data-toggle-pane-options="matches" aria-label="Spaltenoptionen" title="Spaltenoptionen" aria-expanded="false" aria-haspopup="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
              </button>
              <div class="matching-overflow-menu" data-pane-menu="matches" role="menu" hidden>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="matches" data-column-action="configure" data-drawer-side="bottom">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 8.5a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7ZM12 3v2.2M12 18.8V21M21 12h-2.2M5.2 12H3M18.4 5.6l-1.6 1.6M7.2 16.8l-1.6 1.6M18.4 18.4l-1.6-1.6M7.2 7.2 5.6 5.6"/></svg>
                  <span>Konfigurieren</span>
                </button>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="matches" data-column-action="import" data-drawer-side="bottom">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4v11M12 15l-4-4M12 15l4-4M5 19h14"/></svg>
                  <span>Importieren</span>
                </button>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="matches" data-column-action="export" data-drawer-side="bottom">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V4M12 4 8 8M12 4l4 4M5 19h14"/></svg>
                  <span>Exportieren</span>
                </button>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="matches" data-column-action="search-sort" data-drawer-side="bottom">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
                  <span>Suche &amp; Sortierung</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="ctox-pane-tools" id="listTools">
          <input class="ctox-pane-search" id="requirementSearch" type="search" placeholder="Match, Kriterium oder Quelle suchen…" />
          <select class="ctox-pane-filter" id="requirementFilter">
            <option value="all">Alle Matches</option>
          </select>
          <span class="muted matching-pane-tools-source" id="sourceName">Alle Quellen</span>
        </div>
      </header>
      <div class="requirement-list" id="requirementList"></div>

      <!-- Map Tab Content -->
      <div class="map-wrap" id="mapWrap">
        <div class="map" id="map"></div>
      </div>
    </section>

    <button class="ctox-column-resizer" type="button" data-resizer="right" data-resizer-var="--ctox-right-width" data-resizer-min="260" data-resizer-max="560" aria-label="Spaltenbreite rechts anpassen"></button>

    <!-- RIGHT: Objekte -->
    <section class="ctox-pane object-panel" id="right">
      <header class="ctox-pane-header ctox-pane-band">
        <div class="ctox-pane-title-row">
          <div class="ctox-pane-titles">
            <span class="ctox-pane-kicker">Kandidaten</span>
            <h2 class="ctox-pane-title column-title">Objekte</h2>
          </div>
          <div class="ctox-pane-actions">
            <button class="ctox-pane-icon" type="button" id="objectImportPdfBtn" aria-label="Objekte importieren" title="Objekte importieren" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4v11M12 15l-4-4M12 15l4-4M5 19h14"/></svg>
            </button>
            <div class="matching-overflow">
              <button class="ctox-pane-icon" type="button" data-toggle-pane-options="objects" aria-label="Spaltenoptionen" title="Spaltenoptionen" aria-expanded="false" aria-haspopup="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
              </button>
              <div class="matching-overflow-menu" data-pane-menu="objects" role="menu" hidden>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="objects" data-column-action="configure" data-drawer-side="right">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 8.5a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7ZM12 3v2.2M12 18.8V21M21 12h-2.2M5.2 12H3M18.4 5.6l-1.6 1.6M7.2 16.8l-1.6 1.6M18.4 18.4l-1.6-1.6M7.2 7.2 5.6 5.6"/></svg>
                  <span>Konfigurieren</span>
                </button>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="objects" data-column-action="import" data-drawer-side="right">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4v11M12 15l-4-4M12 15l4-4M5 19h14"/></svg>
                  <span>Importieren</span>
                </button>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="objects" data-column-action="export" data-drawer-side="right">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V4M12 4 8 8M12 4l4 4M5 19h14"/></svg>
                  <span>Exportieren</span>
                </button>
                <button class="matching-overflow-item" type="button" role="menuitem" data-column="objects" data-column-action="search-sort" data-drawer-side="right">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
                  <span>Suche &amp; Sortierung</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="ctox-pane-tools">
          <input class="ctox-pane-search" id="objectSearch" type="search" placeholder="Objekt, Skill, Ort oder Stichwort suchen…" />
          <select class="ctox-pane-filter" id="objectSort">
            <option value="best">Sortieren: Bester Match</option>
            <option value="created_desc">Sortieren: Neueste zuerst</option>
            <option value="created_asc">Sortieren: Älteste zuerst</option>
            <option value="name">Sortieren: Name</option>
            <option value="tax">Sortieren: Taxonomie</option>
          </select>
        </div>
      </header>

      <input type="file" id="objectImportPdfInput" accept="application/pdf,.pdf,image/*,.png,.jpg,.jpeg,.webp,.gif,.bmp,.avif" style="display:none" />

      <div class="object-list" id="objectList"></div>

    </section>

  </main>

  <div class="column-drawer-backdrop" data-column-drawer-backdrop hidden></div>
  <aside class="column-drawer column-drawer-left" data-column-drawer="left" aria-hidden="true"></aside>
  <section class="column-drawer column-drawer-bottom" data-column-drawer="bottom" aria-hidden="true"></section>
  <aside class="column-drawer column-drawer-right" data-column-drawer="right" aria-hidden="true"></aside>

  <!-- Modal: Notizen & Fortschritt (pro Objekt & Anforderung) -->
  <div class="ctox-modal" id="noteModal" hidden role="dialog" aria-modal="true" aria-labelledby="noteTitle" aria-hidden="true">
    <div class="ctox-modal-card">
      <header class="ctox-modal-header">
        <h3 class="ctox-modal-title" id="noteTitle">Notizen</h3>
        <button class="ctox-pane-icon" type="button" data-close-modal aria-label="Schließen" title="Schließen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </header>
      <div class="ctox-modal-body">
        <div class="modal-row">
          <label class="muted" style="min-width:110px">Fortschritt</label>
          <input id="noteProgress" class="range" type="range" min="0" max="100" step="5" />
          <span id="noteProgressVal">0%</span>
        </div>
        <textarea id="noteText" class="ctox-textarea" placeholder="Notizen zum Matchingprozess…"></textarea>
      </div>
      <footer class="ctox-modal-footer">
        <button class="ctox-button is-primary" type="button" id="saveNote" title="Speichern">Speichern</button>
      </footer>
    </div>
  </div>

  <!-- Objekt Slide-over (rechts) -->
  <aside class="object" id="objectPanel" aria-hidden="true">
    <div class="object-header">
      <strong id="objectTitle">Objekt</strong>
      <div class="space"></div>
      <button class="icon-btn ctox-pane-icon" id="objectClose" title="Schließen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="object-body" id="objectBody"></div>
  </aside>
  <!-- Anforderung Slide-over (links) -->
  <aside class="jp" id="requirementPanel" aria-hidden="true">
    <div class="jp-header">
      <button class="icon-btn ctox-pane-icon" id="jpClose" title="Schließen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <strong id="jpTitle" style="margin-left:6px">Anforderung</strong>
      <div class="space"></div>
      <span class="ctox-badge" id="jpMeta"></span>
    </div>
    <div class="jp-body" id="jpBody"></div>
  </aside>

    <!-- Modal: Kontaktstatus (Quelle/Objekt) -->
  <div class="ctox-modal" id="relModal" hidden role="dialog" aria-modal="true" aria-labelledby="relTitle" aria-hidden="true">
    <div class="ctox-modal-card rel-modal-card">
      <header class="ctox-modal-header">
        <h3 class="ctox-modal-title" id="relTitle">Kontaktstatus</h3>
        <button class="ctox-pane-icon" type="button" data-close-rel-modal aria-label="Schließen" title="Schließen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </header>
      <div class="ctox-modal-body">

        <!-- NEU: großer Portrait-Platzhalter -->
        <div id="relPhoto" class="rel-photo"></div>

        <p class="muted" style="font-size:12px;margin:0 0 8px">
          Hier kannst du markieren, ob bereits ein persönlicher Kontakt besteht.
        </p>
        <div class="ctox-choice-group" id="relOptions" role="radiogroup" aria-label="Kontaktstatus">
          <label class="ctox-choice">
            <input type="radio" name="relState" value="1" />
            <span>
              <span class="lg-dot requirement" style="margin-right:6px"></span>
              <span data-rel-label="exists">Kontakt besteht</span>
            </span>
          </label>
          <label class="ctox-choice">
            <input type="radio" name="relState" value="0" />
            <span>
              <span class="lg-dot" style="margin-right:6px; background:var(--none)"></span>
              <span data-rel-label="missing">Noch kein Kontakt</span>
            </span>
          </label>
        </div>
      </div>
      <footer class="ctox-modal-footer">
        <button class="ctox-button is-primary" type="button" id="relSave" title="Kontaktstatus speichern">Speichern</button>
      </footer>
    </div>
  </div>

  <div class="image-lightbox" id="imageLightbox" aria-hidden="true">
    <button class="icon-btn ctox-pane-icon image-lightbox-close" id="imageLightboxClose" title="Schließen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <img id="imageLightboxImg" alt="Bildvorschau" />
  </div>


    <!-- Match-Details Bottom Bar -->
  <aside class="match-bar" id="matchDetailBar" aria-hidden="true">
    <div class="match-bar-inner">
      <header class="match-bar-header">
        <div class="match-bar-titles">
          <div class="match-bar-label">Match-Details</div>
          <div class="match-bar-main">
            <span id="matchBarRequirementLabel">–</span>
            <span class="dot-sep">·</span>
            <span id="matchBarObjectLabel">–</span>
          </div>
        </div>
        <div class="match-bar-score" id="matchBarScore">–</div>
        <button class="icon-btn ctox-pane-icon" id="matchBarClose" title="Details schließen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </header>

      <div class="match-bar-tags" id="matchBarTags"></div>

      <div class="match-bar-content" id="matchBarContent">
        <!-- wird per JS mit einzelnen Match-Items (Nachweisen) gefüllt -->
      </div>
    </div>
  </aside>
