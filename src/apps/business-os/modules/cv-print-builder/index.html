<main class="ctox-workspace ctox-workspace--two-pane cv-print-builder" data-cv-print-builder data-resize-frame>
  <input class="cv-hidden-input" type="file" accept="application/pdf,.pdf" multiple data-cv-upload />
  <input class="cv-hidden-input" type="file" accept="image/*" data-cv-logo-upload />

  <aside class="ctox-pane ctox-pane--glass cv-sidebar" aria-label="Kandidaten">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker">Kandidaten</span>
          <h2 class="ctox-pane-title">CV Print Builder</h2>
        </div>
        <div class="ctox-pane-actions">
          <span class="ctox-badge" data-cv-count>0 CVs</span>
          <button type="button" class="ctox-pane-icon" data-toggle-bulk title="Weitere Aktionen" aria-label="Weitere Aktionen" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="6" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="18" r="1.4"/></svg>
          </button>
        </div>
      </div>
      <div class="ctox-pane-tools cv-tools">
        <input type="search" class="ctox-pane-search" data-cv-search placeholder="Suchen" autocomplete="off" aria-label="Kandidaten suchen" />
        <select class="ctox-pane-filter" data-cv-sort aria-label="Kandidaten sortieren">
          <option value="updated_desc">Neueste</option>
          <option value="name_asc">Name</option>
          <option value="phase_asc">Status</option>
          <option value="template_asc">Template</option>
        </select>
        <!-- Bulk actions are hidden by default (the data-toggle-bulk kebab
             reveals them on demand) — only the primary search/sort live in
             the always-visible tool row. -->
        <div class="cv-tools-extra" data-cv-bulk-actions hidden>
          <button class="ctox-button" type="button" data-cv-reparse-all>Alle reparsen</button>
        </div>
      </div>
    </header>
    <div class="ctox-pane-body">
      <div class="ctox-pane-scroll cv-candidate-list" data-cv-list></div>
    </div>
    <button class="cv-new-card" type="button" data-cv-new>
      <span class="cv-new-icon" aria-hidden="true">+</span>
      <span>
        <strong>Neuer CV</strong>
        <small>PDF als Kandidat anlegen</small>
      </span>
    </button>
  </aside>

  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="260" data-resizer-max="420" aria-label="Kandidatenspalte anpassen"></button>

  <section class="ctox-pane cv-workbench" aria-label="CV Arbeitsbereich">
    <div class="cv-stage" data-cv-stage></div>
  </section>
</main>
