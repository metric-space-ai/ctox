<main class="ctox-workspace ctox-workspace--two-pane cv-print-builder" data-cv-print-builder data-resize-frame>
  <input class="cv-hidden-input" type="file" accept="application/pdf,.pdf" multiple data-cv-upload />
  <input class="cv-hidden-input" type="file" accept="application/json,.json" data-cv-import />
  <input class="cv-hidden-input" type="file" accept="image/*" data-cv-logo-upload />

  <!-- LEFT: candidate list — canonical column grammar. All chrome behaviour
       (search / view-toggle / tray / reset / active-dot / band) is SHELL-wired
       from the data-pg-* attributes; this module writes no chrome JS/CSS. Pane
       grid rows: auto [band] minmax(0,1fr) [well] auto [footer]. The list is
       reactive (subscribes to the CV collections) — no refresh button. -->
  <aside class="ctox-pane cv-sidebar" aria-label="Kandidaten" data-cv-rail data-left-content>
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker">CTOX Recruiting</span>
          <h2 class="ctox-pane-title">Kandidaten</h2>
        </div>
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon is-primary" data-action="new" aria-label="Neuer CV" title="Neuer CV"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-action="import" aria-label="Profile importieren" title="Profile importieren (JSON)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12M12 15l-4-4M12 15l4-4M5 21h14"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-action="export" aria-label="Profile exportieren" title="Profile exportieren (JSON)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 21V9M12 9l-4 4M12 9l4 4M5 3h14"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-cv-reparse-all aria-label="Alle reparsen" title="Alle CV-PDFs erneut parsen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v4h-4"/></svg></button>
        </div>
      </div>
      <div class="ctox-filterbar">
        <input class="ctox-pane-search" type="search" data-pg-search placeholder="Suchen..." aria-label="Kandidaten suchen" />
        <div class="ctox-view-toggle" role="group" aria-label="Darstellung">
          <button type="button" class="ctox-pane-icon" data-pg-view="cards" aria-pressed="true" aria-label="Shard-Ansicht" title="Shard-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="14" width="16" height="7" rx="1.5"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-pg-view="list" aria-pressed="false" aria-label="Listen-Ansicht" title="Listen-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
        </div>
        <button type="button" class="ctox-pane-icon ctox-filter-toggle" data-pg-tray-toggle aria-expanded="false" aria-label="Filter" title="Filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.4" fill="var(--surface-2)"/><circle cx="15" cy="12" r="2.4" fill="var(--surface-2)"/><circle cx="8" cy="17" r="2.4" fill="var(--surface-2)"/></svg></button>
      </div>
      <div class="ctox-filter-tray" data-pg-tray hidden>
        <div class="ctox-filter-row">
          <select class="ctox-select" data-pg-filter data-pg-name="sort" data-pg-default="updated_desc" aria-label="Sortieren">
            <option value="updated_desc">Neueste</option>
            <option value="name_asc">Name</option>
            <option value="phase_asc">Status</option>
            <option value="template_asc">Template</option>
          </select>
          <select class="ctox-select" data-pg-filter data-pg-name="template" data-pg-default="all" aria-label="Template filtern">
            <option value="all">Alle Templates</option>
            <option value="minimal">Minimal</option>
            <option value="classic">Klassisch</option>
            <option value="modern">Modern</option>
          </select>
          <button type="button" class="ctox-sort-dir" data-pg-reset aria-label="Filter zurücksetzen" title="Filter zurücksetzen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10a8 8 0 1 1 2 7"/><path d="M4 5v5h5"/></svg></button>
        </div>
      </div>
    </header>
    <nav class="ctox-view-switch" aria-label="Status-Ansichten">
      <div class="ctox-pane-tabs">
        <button type="button" class="ctox-pane-tab is-active" role="tab" data-pg-band="all" aria-selected="true">Alle<span class="view-count" data-pg-count="all"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="progress" aria-selected="false">In Arbeit<span class="view-count" data-pg-count="progress"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="review" aria-selected="false">Korrektur<span class="view-count" data-pg-count="review"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="approved" aria-selected="false">Freigegeben<span class="view-count" data-pg-count="approved"></span></button>
      </div>
    </nav>
    <div class="ctox-pane-body ctox-well">
      <div class="ctox-record-list cv-candidate-list" data-cv-list></div>
    </div>
    <footer class="ctox-pane-footer"><span data-pg-footer></span></footer>
  </aside>

  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="260" data-resizer-max="420" aria-label="Kandidatenspalte anpassen"></button>

  <!-- MAIN: the CV stage — the unique work surface (original PDF / correction /
       print preview). It auto-reveals on selection: empty until a candidate is
       picked (visible = hasSelection && !userCollapsed). The workflow action,
       view switch, template and per-record print toggles live HERE, on the
       selected CV — the left shards stay pure selectors. The render/print
       pipeline is unchanged. -->
  <section class="ctox-pane cv-workbench" aria-label="CV Arbeitsbereich" data-cv-main>
    <header class="ctox-pane-header ctox-pane-band cv-stage-head" data-cv-stage-head hidden>
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-cv-stage-kicker></span>
          <h2 class="ctox-pane-title" data-cv-stage-title>CV Stage</h2>
        </div>
        <div class="ctox-pane-actions" data-cv-stage-actions></div>
      </div>
      <div class="cv-stage-controls" data-cv-stage-controls></div>
    </header>
    <div class="cv-stage" data-cv-stage></div>
  </section>
</main>
