<main class="ctox-workspace calendar-app is-right-hidden" data-calendar-root data-resize-frame>
  <!-- LEFT PANEL: Calendars List & Booking Pages -->
  <aside class="ctox-pane ctox-pane--glass" id="calendar-left">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-t="calendar">Kalender</span>
          <h2 class="ctox-pane-title" data-t="myCalendars">Meine Kalender</h2>
        </div>
        <div class="ctox-pane-actions">
          <button class="ctox-pane-icon" id="addNewCalendarBtn" type="button" title="Kalender hinzufügen" aria-label="Kalender hinzufügen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
      </div>
    </header>

    <div class="ctox-pane-body">
      <div class="ctox-pane-scroll os-scrollbar">
        <div class="calendar-sidebar-section">
          <div id="calendarListContainer">
            <!-- Dynamic Calendars List -->
          </div>
        </div>

        <hr class="calendar-separator" />

        <!-- Booking Links / Pages section -->
        <div class="calendar-sidebar-section">
          <div class="calendar-section-title-bar">
            <span class="ctox-field-label" data-t="bookingPages">Buchungsseiten</span>
            <button class="ctox-pane-icon" id="addBookingPageBtn" type="button" title="Buchungsseite hinzufügen" aria-label="Buchungsseite hinzufügen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            </button>
          </div>
          <div id="bookingPagesListContainer">
            <!-- Dynamic Booking Links -->
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- LEFT RESIZER (shell-global, app.js setupModuleResizers) -->
  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="250" data-resizer-max="450" aria-label="Linke Spaltenbreite anpassen"></button>

  <!-- CENTER PANEL: EventCalendar View -->
  <section class="ctox-pane" id="calendar-center">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <h2 class="ctox-pane-title" data-t="calendar">Kalender</h2>
        </div>
        <div class="ctox-pane-actions">
          <span class="ctox-badge calendar-data-status" id="calendarDataStatus" hidden aria-live="polite"></span>
          <button class="ctox-pane-icon" id="btnNewEvent" type="button" data-t-title="newEvent" data-t-aria="newEvent" title="Neuer Termin" aria-label="Neuer Termin">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <div class="calendar-navigation">
            <button class="ctox-pane-icon" id="prevPeriodBtn" type="button" title="Zurück" aria-label="Vorheriger Zeitraum">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 6l-6 6 6 6"/></svg>
            </button>
            <button class="ctox-pane-icon" id="todayPeriodBtn" type="button" data-t-title="today" data-t-aria="today" title="Heute" aria-label="Heute">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 6h14v14H5zM5 10h14M9 4v4M15 4v4"/></svg>
            </button>
            <button class="ctox-pane-icon" id="nextPeriodBtn" type="button" title="Vorwärts" aria-label="Nächster Zeitraum">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
            </button>
          </div>
          <button class="ctox-pane-icon calendar-toggle-right" data-toggle-right type="button" title="Buchungen einblenden" aria-label="Buchungen einblenden" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- EventCalendar Mount Point -->
    <div class="calendar-grid-container">
      <div id="eventCalendarView" class="ec-theme-business-os"></div>
    </div>
  </section>

  <!-- RIGHT RESIZER (shell-global, app.js setupModuleResizers) -->
  <button class="ctox-column-resizer" type="button" data-resizer="right" data-resizer-var="--ctox-right-width" data-resizer-min="200" data-resizer-max="400" aria-label="Rechte Spaltenbreite anpassen"></button>

  <!-- RIGHT PANEL: Bookings & Active Holds Auditing -->
  <aside class="ctox-pane" id="calendar-right">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <h2 class="ctox-pane-title" data-t="bookings">Buchungen</h2>
        </div>
      </div>
    </header>

    <div class="ctox-pane-body">
      <div class="ctox-pane-scroll os-scrollbar">
        <div id="bookingContext" class="calendar-sidebar-section" aria-live="polite"></div>
        <!-- Active Holds -->
        <div class="calendar-sidebar-section">
          <div class="calendar-section-title-bar">
            <span class="ctox-field-label">Temporäre Holds</span>
          </div>
          <div id="bookingHoldsList">
            <!-- Dynamic Holds -->
            <div class="ctox-empty">Keine aktiven Holds.</div>
          </div>
        </div>

        <hr class="calendar-separator" />

        <!-- Confirmed Bookings -->
        <div class="calendar-sidebar-section">
          <div class="calendar-section-title-bar">
            <span class="ctox-field-label">Bestätigte Buchungen</span>
          </div>
          <div id="bookingsList">
            <!-- Dynamic Bookings -->
            <div class="ctox-empty">Keine bestätigten Buchungen.</div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Sliding Details Drawer (Inspector) for creating/editing events, calendars, and booking pages -->
  <div class="ctox-bottom-drawer" id="calendarInspectorDrawer" data-detail-drawer role="dialog" aria-modal="false" aria-labelledby="drawerTitle" tabindex="-1">
    <div class="ctox-drawer-handle"><div class="ctox-drawer-handle-bar"></div></div>
    <header class="ctox-drawer-header">
      <div class="ctox-drawer-header-left">
        <span class="ctox-pane-kicker" id="drawerKicker">Kalender</span>
        <h3 class="ctox-pane-title" id="drawerTitle">Details</h3>
      </div>
      <button type="button" class="ctox-pane-icon" id="closeDrawerBtn" title="Schließen" aria-label="Schließen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </header>
    <div class="ctox-drawer-body os-scrollbar" id="drawerContent">
      <!-- Forms loaded dynamically -->
    </div>
  </div>
</main>
