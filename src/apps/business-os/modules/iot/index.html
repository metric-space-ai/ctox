<main class="iot-module" data-iot-root data-resize-frame>
  <section class="iot-pane iot-left" aria-label="IoT Navigation">
    <div data-iot-left></div>
  </section>
  <button class="ctox-column-resizer iot-resizer" type="button" data-iot-column-resizer data-resizer="left" data-resizer-var="--iot-left-width" data-resizer-min="240" data-resizer-max="520" aria-label="Adjust left column width"></button>
  <section class="iot-pane iot-center" aria-label="IoT Workbench">
    <div data-iot-center></div>
  </section>
  <button class="ctox-column-resizer iot-resizer" type="button" data-iot-column-resizer data-resizer="right" data-resizer-var="--iot-right-width" data-resizer-min="300" data-resizer-max="620" aria-label="Adjust right column width"></button>
  <section class="iot-pane iot-right" aria-label="IoT Context">
    <div data-iot-right></div>
  </section>
</main>
