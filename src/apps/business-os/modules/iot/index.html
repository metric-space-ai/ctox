<main class="ctox-workspace iot-module" data-iot-root data-resize-frame>
  <!-- LEFT: asset/signal tree — the selector column. All chrome behaviour
       (search / view-toggle / tray / reset / active-dot / counted band) is
       SHELL-wired from the data-pg-* attributes; this module writes no chrome
       JS/CSS. Header carries the standing Neu / Import / Export icon actions.
       Tree rows are pure selectors: expanding a branch is navigation (allowed),
       but opening data happens in the MAIN view, never inline. -->
  <aside class="ctox-pane iot-pane iot-left" aria-label="Assets & Signale" data-iot-left data-left-content>
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-copy="kicker">CTOX IoT</span>
          <h2 class="ctox-pane-title" data-copy="listTitle">Assets &amp; Signale</h2>
        </div>
        <div class="ctox-pane-actions">
          <button class="ctox-pane-icon is-primary" type="button" data-action="new" aria-label="Asset anlegen" title="Asset anlegen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
          <button class="ctox-pane-icon" type="button" data-action="import" aria-label="Importieren" title="Importieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12M12 15l-4-4M12 15l4-4M5 21h14"/></svg></button>
          <button class="ctox-pane-icon" type="button" data-action="export" aria-label="Exportieren" title="Exportieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 21V9M12 9l-4 4M12 9l4 4M5 3h14"/></svg></button>
        </div>
      </div>
      <div class="ctox-filterbar">
        <input class="ctox-pane-search" type="search" data-pg-search placeholder="Suchen..." aria-label="Assets suchen" />
        <div class="ctox-view-toggle" role="group" aria-label="Darstellung">
          <button type="button" class="ctox-pane-icon" data-pg-view="cards" aria-pressed="true" aria-label="Baum-Ansicht" title="Baum-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="14" width="16" height="7" rx="1.5"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-pg-view="list" aria-pressed="false" aria-label="Listen-Ansicht" title="Listen-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
        </div>
        <button type="button" class="ctox-pane-icon ctox-filter-toggle" data-pg-tray-toggle aria-expanded="false" aria-label="Filter" title="Filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.4" fill="var(--surface-2)"/><circle cx="15" cy="12" r="2.4" fill="var(--surface-2)"/><circle cx="8" cy="17" r="2.4" fill="var(--surface-2)"/></svg></button>
      </div>
      <div class="ctox-filter-tray" data-pg-tray hidden>
        <div class="ctox-filter-row">
          <select class="ctox-select" data-pg-filter data-pg-name="realm" data-pg-default="all" aria-label="Bereich filtern">
            <option value="all" data-copy="allRealms">Alle Bereiche</option>
          </select>
          <button type="button" class="ctox-sort-dir" data-pg-reset aria-label="Filter zurücksetzen" title="Filter zurücksetzen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10a8 8 0 1 1 2 7"/><path d="M4 5v5h5"/></svg></button>
        </div>
      </div>
    </header>
    <nav class="ctox-view-switch" aria-label="Ansichten">
      <div class="ctox-pane-tabs">
        <button type="button" class="ctox-pane-tab is-active" role="tab" data-pg-band="all" aria-selected="true"><span data-copy="bandAll">Alle</span><span class="view-count" data-pg-count="all"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="signals" aria-selected="false"><span data-copy="bandSignals">Signale</span><span class="view-count" data-pg-count="signals"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="alarms" aria-selected="false"><span data-copy="bandAlarms">Alarme</span><span class="view-count" data-pg-count="alarms"></span></button>
      </div>
    </nav>
    <div class="ctox-pane-body ctox-well">
      <div class="iot-tree os-scrollbar" data-iot-tree></div>
    </div>
    <footer class="ctox-pane-footer"><span data-pg-footer></span></footer>
  </aside>

  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="260" data-resizer-max="520" aria-label="Spaltenbreite anpassen"></button>

  <!-- MAIN: dashboard of automation widgets (standing orders to CTOX) for the
       selected asset/signal — the unique work surface. Filled by index.js on
       selection; no third column. -->
  <section class="ctox-pane iot-pane iot-center" aria-label="Dashboard" data-iot-center></section>
</main>
