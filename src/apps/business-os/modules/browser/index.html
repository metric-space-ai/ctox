<main class="browser-module" data-browser-root>
  <section class="browser-chrome" aria-label="Browser Steuerung">
    <div class="browser-tabbar">
      <div class="ctox-callout" data-browser-auth-assist hidden></div>
      <div class="browser-session-list ctox-pane-tabs" data-browser-session-list aria-label="Browser Fenster"></div>
      <button type="button" class="ctox-icon-button browser-new-window" data-browser-start aria-label="Neues Browserfenster" title="Neues Browserfenster">+</button>
      <button type="button" class="ctox-pane-icon browser-toggle-advanced" data-browser-toggle-advanced aria-label="Erweiterte Aktionen" title="Erweiterte Aktionen" aria-pressed="false">⋯</button>
    </div>

    <!-- Erweiterte Aktionen + Diagnose. Standardmäßig eingeklappt (is-advanced-hidden);
         data-browser-toggle-advanced schaltet die Sichtbarkeit um. -->
    <div class="browser-advanced is-advanced-hidden" data-browser-advanced>
      <div class="browser-advanced-actions">
        <label class="ctox-choice">
          <input type="checkbox" data-browser-private> Privat-Modus
        </label>
        <label class="ctox-compact-field">
          <span>Viewport</span>
          <select class="ctox-select" data-browser-viewport>
            <option value="1280x720">Desktop 1280×720</option>
            <option value="390x844">Mobil 390×844</option>
          </select>
        </label>
        <button type="button" class="ctox-button" data-browser-new-tab>Neuer Tab</button>
        <button type="button" class="ctox-button" data-browser-upload>Upload</button>
        <button type="button" class="ctox-button" data-browser-controller-acquire>Steuerung übernehmen</button>
        <button type="button" class="ctox-button" data-browser-controller-release>Steuerung freigeben</button>
        <button type="button" class="ctox-button" data-browser-observer-grant>Beobachter hinzufügen</button>
        <button type="button" class="ctox-button" data-browser-observer-revoke>Beobachter entfernen</button>
        <button type="button" class="ctox-button" data-browser-clipboard-copy>Clipboard kopieren</button>
        <button type="button" class="ctox-button" data-browser-clipboard-paste>Clipboard einfügen</button>
        <button type="button" class="ctox-button" data-browser-clipboard-clear>Clipboard leeren</button>
        <button type="button" class="ctox-button" data-browser-send-to-ctox data-t="sendToCtox">An CTOX senden</button>
        <button type="button" class="ctox-button is-danger" data-browser-stop data-t="close">Fenster schließen</button>
      </div>
      <div class="browser-diagnostics" hidden aria-hidden="true">
        <span data-browser-session-card></span>
        <span data-browser-status-meta></span>
        <span data-browser-frame-id></span>
        <span data-browser-frame-seq></span>
        <span data-browser-frame-size></span>
        <span data-browser-frame-time></span>
        <span data-browser-input-state></span>
        <span data-browser-command-state></span>
        <span data-browser-command-history></span>
        <span data-browser-handoff-history></span>
      </div>
    </div>

    <div class="ctox-callout" data-browser-notice hidden></div>
    <header class="browser-toolbar ctox-toolbar">
      <div class="browser-nav-actions" aria-label="Navigation">
        <button type="button" class="ctox-icon-button" data-browser-back aria-label="Zurueck" data-t-aria="navBack">‹</button>
        <button type="button" class="ctox-icon-button" data-browser-forward aria-label="Vor" data-t-aria="navForward">›</button>
        <button type="button" class="ctox-icon-button" data-browser-reload aria-label="Neu laden" data-t-aria="navReload">↻</button>
      </div>
      <form class="browser-address-form" data-browser-address-form>
        <input class="ctox-input" data-browser-address type="url" placeholder="https://example.com" autocomplete="off">
        <button type="submit" class="ctox-button is-primary" data-browser-go data-t="go">Los</button>
      </form>
    </header>
    <div class="browser-status-strip" aria-label="Browser Status">
      <span class="ctox-badge" data-browser-status-chip data-t="statusDisconnected">Nicht verbunden</span>
      <span data-browser-status-title data-t="noWindowOpen">Kein Browser-Fenster geoeffnet</span>
    </div>
    <div class="browser-download-strip" data-browser-downloads hidden></div>
  </section>

  <section class="browser-workbench" aria-label="Browser Inhalt">
    <div class="browser-frame-shell" data-browser-frame-shell>
      <canvas data-browser-canvas width="1280" height="720" tabindex="0" aria-label="Remote browser frame"></canvas>
      <div class="browser-empty ctox-empty" data-browser-empty data-t="framePreparing">Browser-Fenster wird vorbereitet</div>
    </div>
  </section>
</main>
