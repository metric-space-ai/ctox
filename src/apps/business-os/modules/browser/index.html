<main class="browser-module" data-browser-root>
  <section class="browser-chrome" aria-label="Browser Steuerung">
    <div class="browser-tabbar">
    <div class="browser-auth-assist" data-browser-auth-assist hidden></div>
      <div class="browser-session-list" data-browser-session-list aria-label="Browser Fenster"></div>
    <div class="browser-actions">
      <button type="button" data-browser-start>Neues Fenster</button>
      <button type="button" data-browser-send-to-ctox>An CTOX senden</button>
      <button type="button" data-browser-stop>Schliessen</button>
    </div>
      <button type="button" class="browser-icon-button" data-browser-refresh aria-label="Aktualisieren">↻</button>
    </div>
    <div class="browser-dev-actions" hidden>
      <button type="button" data-browser-reset>Reset</button>
      <button type="button" data-browser-seed>Seed Frame</button>
      <button type="button" data-browser-clear>Clear Frames</button>
    </div>
    <div class="browser-notice" data-browser-notice hidden></div>
    <header class="browser-toolbar">
      <div class="browser-nav-actions" aria-label="Navigation">
        <button type="button" data-browser-back aria-label="Zurueck">‹</button>
        <button type="button" data-browser-forward aria-label="Vor">›</button>
        <button type="button" data-browser-reload aria-label="Neu laden">↻</button>
      </div>
      <form class="browser-address-form" data-browser-address-form>
        <input data-browser-address type="url" placeholder="https://example.com" autocomplete="off">
        <button type="submit">Los</button>
      </form>
    </header>
    <div class="browser-status-strip" aria-label="Browser Status">
      <span class="browser-status-chip" data-browser-status-chip>Nicht verbunden</span>
      <span data-browser-status-title>Kein Browser-Fenster geoeffnet</span>
    </div>
    <span data-browser-status-meta hidden></span>
  </section>

  <section class="browser-workbench" aria-label="Browser Inhalt">
    <div class="browser-frame-shell" data-browser-frame-shell>
      <canvas data-browser-canvas width="1280" height="720" tabindex="0" aria-label="Remote browser frame"></canvas>
      <div class="browser-empty" data-browser-empty>Browser-Fenster wird vorbereitet</div>
    </div>
  </section>

  <div class="browser-diagnostics" hidden aria-hidden="true">
    <span data-browser-session-card></span>
    <span data-browser-frame-id></span>
    <span data-browser-frame-seq></span>
    <span data-browser-frame-size></span>
    <span data-browser-frame-time></span>
    <span data-browser-input-state></span>
    <span data-browser-command-state></span>
    <span data-browser-command-history></span>
    <span data-browser-handoff-history></span>
  </div>
</main>
