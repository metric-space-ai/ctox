<section class="ats-module ats-submissions" data-ats-root>
  <header class="ats-head"><h1 data-ats-title></h1><p class="ats-sub" data-ats-sub></p></header>
  <form class="ats-form" data-ats-form>
    <input type="text" name="candidate_id" placeholder="Kandidat-ID" required data-f />
    <input type="text" name="client_account_id" placeholder="Kunden-Account-ID" required data-f />
    <input type="text" name="vacancy_id" placeholder="Vakanz-ID (optional)" data-f />
    <input type="text" name="client_contact_id" placeholder="Kontakt-ID (optional)" data-f />
    <button type="submit">Vorstellen</button>
  </form>
  <div class="ats-gate" data-ats-gate></div>
  <div class="ats-count" data-ats-count></div>
  <div class="ats-list" data-ats-list></div>
</section>
