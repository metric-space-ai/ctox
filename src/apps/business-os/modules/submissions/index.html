<main class="ctox-workspace ctox-workspace--single ats-module ats-submissions" data-ats-root>
  <section class="ctox-pane">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-ats-sub></span>
          <h2 class="ctox-pane-title" data-ats-title></h2>
        </div>
      </div>
    </header>
    <div class="ctox-pane-scroll ats-body">
      <form class="ats-form" data-ats-form>
        <input class="ctox-input" type="text" name="candidate_id" placeholder="Kandidat-ID" required data-f />
        <input class="ctox-input" type="text" name="client_account_id" placeholder="Kunden-Account-ID" required data-f />
        <input class="ctox-input" type="text" name="vacancy_id" placeholder="Vakanz-ID (optional)" data-f />
        <input class="ctox-input" type="text" name="client_contact_id" placeholder="Kontakt-ID (optional)" data-f />
        <button type="submit" class="ctox-button is-primary">Vorstellen</button>
      </form>
      <div class="ats-gate" data-ats-gate></div>
      <div class="ats-count" data-ats-count></div>
      <div class="ats-list" data-ats-list></div>
    </div>
  </section>
</main>
