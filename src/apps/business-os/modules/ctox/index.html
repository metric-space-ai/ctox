<main class="ctox-workspace ctox-workspace--two-pane ctox-harness-app" data-ctox-harness data-resize-frame>
  <!-- The task column chrome (canonical data-pg grammar) is built once by the
       module in JS (buildTaskColumn → taskColumnMarkup) so it is localized and
       is never rebuilt on data refresh — the shell wires the data-pg-* markup
       and the module only refreshes the list inside the well. -->
  <aside class="ctox-pane ctox-harness-left" data-ctox-left aria-label="CTOX Tasks"></aside>
  <button class="ctox-column-resizer" type="button" data-ctox-column-resizer data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="220" data-resizer-max="560" aria-label="Task-Spalte verbreitern oder verkleinern"></button>
  <section class="ctox-pane ctox-harness-main" data-ctox-main aria-label="CTOX Live Flow">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles"><span class="ctox-pane-kicker">CTOX Live Flow</span><h2 class="ctox-pane-title">Was CTOX gerade tut</h2></div>
        <div class="ctox-pane-actions"></div>
      </div>
    </header>
    <div class="ctox-pane-body ctox-flow-well"><div class="ctox-empty">Live Flow wird geladen.</div></div>
    <footer class="ctox-harness-footer">CTOX Core · nicht live</footer>
  </section>
</main>
