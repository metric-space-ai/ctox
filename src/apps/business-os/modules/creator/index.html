<main class="ctox-workspace ctox-workspace--two-pane creator-module" data-creator-root data-resize-frame>
  <!-- LEFT: existing apps + recent app requests — canonical column grammar.
       All chrome behaviour (search / view-toggle / tray / reset / active-dot /
       band) is SHELL-wired from the data-pg-* attributes; this module writes no
       chrome JS/CSS. Selecting an app prefills upgrade mode in the composer;
       selecting an Auftrag adopts its request text. A shard is a pure selector
       (no per-row buttons). Pane grid rows: auto auto minmax(0,1fr) auto. -->
  <aside class="ctox-pane creator-library" aria-label="Existing apps and recent requests" data-left-content>
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-t="rightKicker">Deine Apps</span>
          <h2 class="ctox-pane-title" data-t="rightTitle">Weiterarbeiten</h2>
        </div>
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon" data-action="import" data-t-title="libImport" data-t-aria="libImport" aria-label="Aufträge importieren" title="Aufträge importieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12M12 15l-4-4M12 15l4-4M5 21h14"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-action="export" data-t-title="libExport" data-t-aria="libExport" aria-label="Aufträge exportieren" title="Aufträge exportieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 21V9M12 9l-4 4M12 9l4 4M5 3h14"/></svg></button>
        </div>
      </div>
      <div class="ctox-filterbar">
        <input class="ctox-pane-search" type="search" data-pg-search placeholder="Apps und Aufträge suchen..." data-t-placeholder="libSearch" aria-label="Apps und Aufträge suchen" />
        <div class="ctox-view-toggle" role="group" aria-label="Darstellung">
          <button type="button" class="ctox-pane-icon" data-pg-view="cards" aria-pressed="true" aria-label="Shard-Ansicht" title="Shard-Ansicht" data-t-title="libViewCards" data-t-aria="libViewCards"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="14" width="16" height="7" rx="1.5"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-pg-view="list" aria-pressed="false" aria-label="Listen-Ansicht" title="Listen-Ansicht" data-t-title="libViewList" data-t-aria="libViewList"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
        </div>
        <button type="button" class="ctox-pane-icon ctox-filter-toggle" data-pg-tray-toggle aria-expanded="false" aria-label="Filter" title="Filter" data-t-title="libFilter" data-t-aria="libFilter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.4" fill="var(--surface-2)"/><circle cx="15" cy="12" r="2.4" fill="var(--surface-2)"/><circle cx="8" cy="17" r="2.4" fill="var(--surface-2)"/></svg></button>
      </div>
      <div class="ctox-filter-tray" data-pg-tray hidden>
        <div class="ctox-filter-row">
          <select class="ctox-select" data-pg-filter data-pg-name="status" data-pg-default="all" aria-label="Auftragsstatus filtern" data-creator-status-filter>
            <option value="all" data-t="statusAll">Alle Status</option>
          </select>
          <button type="button" class="ctox-sort-dir" data-pg-reset aria-label="Filter zurücksetzen" title="Filter zurücksetzen" data-t-title="libReset" data-t-aria="libReset"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10a8 8 0 1 1 2 7"/><path d="M4 5v5h5"/></svg></button>
        </div>
      </div>
    </header>
    <nav class="ctox-view-switch" aria-label="Ansichten">
      <div class="ctox-pane-tabs">
        <button type="button" class="ctox-pane-tab is-active" role="tab" data-pg-band="apps" aria-selected="true"><span data-t="bandApps">Apps</span><span class="view-count" data-pg-count="apps"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="auftraege" aria-selected="false"><span data-t="bandAuftraege">Aufträge</span><span class="view-count" data-pg-count="auftraege"></span></button>
      </div>
    </nav>
    <div class="ctox-pane-body ctox-well">
      <div class="ctox-list creator-library-list" data-creator-list></div>
    </div>
    <footer class="ctox-pane-footer"><span data-pg-footer></span></footer>
  </aside>

  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="240" data-resizer-max="420" title="Spaltenbreite anpassen" aria-label="Spaltenbreite anpassen"></button>

  <section class="ctox-pane creator-main" aria-label="App creation workspace">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <h1 class="ctox-pane-title" data-t="centerTitle">Was möchtest du bauen?</h1>
        </div>
      </div>
    </header>

    <div class="ctox-pane-body">
      <div class="ctox-pane-scroll creator-workspace">
        <section class="creator-composer" aria-labelledby="creator-request-label">
          <label class="ctox-field-label" id="creator-request-label" for="app-request-input" data-t="requestLabel">Deine App-Idee</label>
          <textarea id="app-request-input" class="ctox-textarea creator-request-textarea" placeholder="Zum Beispiel: Erstelle eine einfache CRM-App mit Kundenliste, Suche, Status und Detailansicht." data-t-placeholder="requestPlaceholder"></textarea>
        </section>

        <section class="creator-examples" aria-labelledby="creator-examples-title">
          <span class="ctox-field-label" id="creator-examples-title" data-t="examplesTitle">Oder starte mit einem Beispiel</span>
          <div class="creator-example-grid" data-example-prompts></div>
        </section>

        <details class="creator-options">
          <summary data-t="advancedSettings">Optionale Einstellungen &amp; Referenzen</summary>
          <div class="creator-options-body">
            <div class="creator-form-group">
              <label class="ctox-field-label" for="creator-inspiration-url" data-t="inspirationTitle">Websites als Inspiration</label>
              <div class="creator-url-row">
                <input class="ctox-input" id="creator-inspiration-url" type="url" inputmode="url" autocomplete="url" placeholder="https://linear.app" data-t-placeholder="inspirationPlaceholder">
                <button class="ctox-button" id="btn-add-inspiration" type="button" data-t="addInspiration">Hinzufügen</button>
              </div>
              <div class="creator-url-list" data-inspiration-list aria-live="polite"></div>
            </div>

            <div class="creator-form-grid">
              <div class="creator-form-group">
                <label class="ctox-field-label" for="input-app-title" data-t="fieldTitle">Titel der App</label>
                <input type="text" id="input-app-title" class="ctox-input" placeholder="Optional, z. B. Kundenakte">
              </div>
              <div class="creator-form-group">
                <label class="ctox-field-label" for="input-app-id" data-t="fieldModuleId">Modul-ID</label>
                <input type="text" id="input-app-id" class="ctox-input" placeholder="Optional, z. B. kundenakte" pattern="[a-z0-9\-]+">
              </div>
            </div>

            <div class="creator-form-group">
              <label class="ctox-field-label" for="input-app-desc" data-t="fieldDescription">Kurzbeschreibung</label>
              <input type="text" id="input-app-desc" class="ctox-input" placeholder="Optional">
            </div>

            <div class="creator-form-grid creator-options-grid">
              <div class="creator-form-group">
                <label class="ctox-field-label" for="select-app-category" data-t="fieldCategory">Kategorie</label>
                <select id="select-app-category" class="ctox-select">
                  <option value="" selected data-t="optionalChoice">Optional</option>
                  <option value="Productivity">Productivity</option>
                  <option value="Management">Management</option>
                  <option value="Finance">Finance</option>
                  <option value="Utilities">Utilities</option>
                  <option value="Development">Development</option>
                </select>
              </div>
              <div class="creator-form-group">
                <label class="ctox-field-label" for="select-app-archetype" data-t="fieldArchetype">Grundstruktur</label>
                <select id="select-app-archetype" class="ctox-select">
                  <option value="record-workbench" selected data-t="archetypeRecordWorkbench">Liste &amp; Details</option>
                  <option value="queue-workflow" data-t="archetypeQueueWorkflow">Warteschlange &amp; Workflow</option>
                  <option value="editor-document" data-t="archetypeEditorDocument">Editor &amp; Dokument</option>
                  <option value="automation" data-t="archetypeAutomation">Automatisierung</option>
                  <option value="timeline-thread" data-t="archetypeTimelineThread">Verlauf &amp; Thread</option>
                </select>
              </div>
              <div class="creator-form-group">
                <label class="ctox-field-label" for="select-app-layout" data-t="fieldLayout">Fenster</label>
                <select id="select-app-layout" class="ctox-select">
                  <option value="windowed" selected data-t="layoutWindowed">Standard-App-Fenster</option>
                  <option value="full-workspace" data-t="layoutFull">Ganze Arbeitsfläche</option>
                </select>
              </div>
            </div>

            <div class="creator-form-group">
              <label class="ctox-field-label" data-t="fieldCollections">Datentabellen</label>
              <div id="collections-list"></div>
              <div class="collection-row">
                <input type="text" id="input-new-collection" class="ctox-input" placeholder="Neue Datentabelle…" data-t-placeholder="newCollectionPlaceholder">
                <button type="button" id="btn-add-collection" class="ctox-icon-button" title="Datentabelle hinzufügen" data-t-title="addCollection" aria-label="Datentabelle hinzufügen" data-t-aria="addCollection">+</button>
              </div>
            </div>
          </div>
        </details>

        <footer class="creator-submit">
          <div class="sync-status">
            <span class="sync-dot is-blocked" id="deploy-sync-dot"></span>
            <span id="deploy-sync-text" aria-live="polite" data-t="requestMissing">Beschreibe zuerst kurz deine App.</span>
          </div>
          <button type="button" id="btn-deploy-app" class="ctox-button ctox-run-control" disabled>
            <span data-t="deployButton">App erstellen</span>
            <span aria-hidden="true">→</span>
          </button>
        </footer>

        <details class="creator-status-details">
          <summary data-t="terminalTitle">Technischer Status</summary>
          <div id="console-logs-container" class="console-logs os-scrollbar" aria-live="polite">
            <div class="console-log-entry info">[SYSTEM] App Creator bereit.</div>
          </div>
        </details>
      </div>
    </div>
  </section>
</main>
