<section class="ats-module ats-intake" data-ats-root>
  <header class="ctox-pane-header ctox-pane-band ats-head">
    <div class="ctox-pane-title-row">
      <div class="ctox-pane-titles">
        <span class="ctox-pane-kicker">Bewerbungseingang</span>
        <h1 class="ctox-pane-title" data-ats-title></h1>
      </div>
    </div>
    <p class="ats-sub" data-ats-sub></p>
  </header>
  <div class="ats-body">
    <form class="ats-form" data-ats-form>
      <input class="ctox-input" type="text" name="name" placeholder="Name" required data-f />
      <input class="ctox-input" type="email" name="email" placeholder="E-Mail" data-f />
      <input class="ctox-input" type="text" name="phone" placeholder="Telefon" data-f />
      <input class="ctox-input" type="text" name="vacancy_id" placeholder="Vakanz-ID" data-f />
      <select class="ctox-select" name="channel" data-f>
        <option value="career_site">career_site</option>
        <option value="job_board">job_board</option>
        <option value="easy_apply">easy_apply</option>
        <option value="email">email</option>
        <option value="qr">qr</option>
        <option value="walk_in">walk_in</option>
        <option value="referral">referral</option>
      </select>
      <button class="ctox-button is-primary" type="submit">Erfassen</button>
    </form>
    <div class="ats-gate" data-ats-gate></div>
    <div class="ats-count" data-ats-count></div>
    <div class="ats-list" data-ats-list></div>
  </div>
</section>
