<main class="support-module" data-support-root>
  <section class="support-pane support-left" aria-label="Support queues">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-i18n="kicker">Support Desk</span>
          <h2 class="ctox-pane-title" data-i18n="queueTitle">Queues</h2>
        </div>
      </div>
      <div class="ctox-pane-tools">
        <input class="ctox-pane-search" type="search" data-support-search data-i18n-placeholder="searchPlaceholder" placeholder="Suche nach Kunde, Ticket oder Nachricht">
      </div>
    </header>
    <div class="support-filter-list" data-support-filters></div>
  </section>

  <section class="support-pane support-center" aria-label="Support conversation">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-i18n="conversationKicker">Conversation</span>
          <h2 class="ctox-pane-title" data-support-title data-i18n="emptyTitle">No support conversation selected</h2>
        </div>
        <div class="ctox-pane-actions">
          <button class="ctox-pane-icon support-context-toggle" type="button" data-support-toggle-context aria-expanded="false" title="Kontext öffnen" aria-label="Kontext öffnen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
          </button>
          <button class="ctox-pane-icon" type="button" data-support-ask-ctox title="Ask CTOX" aria-label="Ask CTOX" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5h16v11H9l-5 4V5Z"/></svg>
          </button>
        </div>
      </div>
    </header>
    <div class="support-timeline" data-support-timeline></div>
    <footer class="support-composer" data-support-composer>
      <textarea class="ctox-textarea" data-support-note rows="3" data-i18n-placeholder="notePlaceholder" placeholder="Internal note"></textarea>
      <button class="ctox-button is-primary" type="button" data-support-note-submit disabled data-i18n="noteAction">Add note</button>
    </footer>
  </section>

  <!-- third_pane_justification: Support operators need customer identity, linked tickets, SLA state, and CTOX suggestions visible while reading and replying. -->
  <aside class="support-pane support-right" aria-label="Support context">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-i18n="contextKicker">Context</span>
          <h2 class="ctox-pane-title" data-i18n="contextTitle">Customer and ticket context</h2>
        </div>
        <div class="ctox-pane-actions">
          <button class="ctox-pane-icon support-context-toggle" type="button" data-support-toggle-context aria-expanded="true" title="Zur Unterhaltung" aria-label="Zur Unterhaltung">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
        </div>
      </div>
    </header>
    <div class="support-context-list" data-support-context></div>
  </aside>
</main>
