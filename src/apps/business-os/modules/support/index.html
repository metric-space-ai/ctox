<main class="support-module" data-support-root>
  <section class="support-pane support-left" aria-label="Support queues">
    <header class="support-pane-header">
      <p class="support-kicker" data-i18n="kicker">Support Desk</p>
      <h2 data-i18n="queueTitle">Queues</h2>
    </header>
    <div class="support-filter-list" data-support-filters></div>
  </section>

  <section class="support-pane support-center" aria-label="Support conversation">
    <header class="support-work-header">
      <div>
        <p class="support-kicker" data-i18n="conversationKicker">Conversation</p>
        <h2 data-support-title data-i18n="emptyTitle">No support conversation selected</h2>
      </div>
      <button class="support-icon-button" type="button" data-support-ask-ctox title="Ask CTOX" disabled>
        <span aria-hidden="true">?</span>
      </button>
    </header>
    <div class="support-timeline" data-support-timeline></div>
    <footer class="support-composer" data-support-composer>
      <textarea data-support-note rows="3" data-i18n-placeholder="notePlaceholder" placeholder="Internal note"></textarea>
      <button type="button" data-support-note-submit disabled data-i18n="noteAction">Add note</button>
    </footer>
  </section>

  <!-- third_pane_justification: Support operators need customer identity, linked tickets, SLA state, and CTOX suggestions visible while reading and replying. -->
  <aside class="support-pane support-right" aria-label="Support context">
    <header class="support-pane-header">
      <p class="support-kicker" data-i18n="contextKicker">Context</p>
      <h2 data-i18n="contextTitle">Customer and ticket context</h2>
    </header>
    <div class="support-context-list" data-support-context></div>
  </aside>
</main>
