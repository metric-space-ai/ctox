<main class="reports-module" data-reports-root>
  <aside class="reports-rail">
    <header class="ctox-pane-header">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker">CTOX Intake</span>
          <h2 class="ctox-pane-title">Bugs &amp; Features</h2>
        </div>
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon" data-refresh-reports title="Aktualisieren">⟳</button>
        </div>
      </div>
      <div class="ctox-pane-tools">
        <input class="ctox-pane-search" data-report-search placeholder="Suchen..." />
        <select class="ctox-pane-filter" data-report-kind style="min-width: 120px; width: auto; flex-shrink: 0;">
          <option value="all">Alle Typen</option>
          <option value="bug">Bugs</option>
          <option value="feature">Features</option>
        </select>
        <select class="ctox-pane-sort" data-report-status style="min-width: 120px; width: auto; flex-shrink: 0;">
          <option value="all">Alle Status</option>
          <option value="open">Offen</option>
          <option value="running">In Arbeit</option>
          <option value="completed">Erledigt</option>
          <option value="blocked">Blockiert</option>
        </select>
      </div>
    </header>
    <div class="reports-list os-scrollbar" data-reports-list></div>
  </aside>
  <button class="ctox-column-resizer" type="button" data-resizer="left" aria-label="Spaltenbreite anpassen"></button>
  <section class="reports-detail" data-reports-detail></section>
</main>
