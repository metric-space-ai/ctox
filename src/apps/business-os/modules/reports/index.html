<main class="ctox-workspace reports-module is-actions-hidden" data-reports-root data-resize-frame>
  <!-- The rail chrome below is the canonical data-pg-* grammar — the SHELL
       wires search / view toggle / tray / reset / active-dot / band / counts /
       footer (autoWirePaneGrammar); the module only renders lists and listens
       to ctox-pane-grammar-change. This file is the single source of truth for
       the module markup: index.js fetches it with the JS cache-buster
       (loadModuleMarkup), like ctox/coding-agents/knowledge/threads/app-store. -->
  <aside class="ctox-pane reports-rail" aria-label="Reports Liste">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker">CTOX Intake</span>
          <h2 class="ctox-pane-title">Bugs &amp; Features</h2>
        </div>
        <!-- Standing rail action: JSON export of the filtered list. No import
             (reports arrive through CTOX intake flows) and no refresh button —
             the module keeps itself current (reactive). -->
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon" data-action="export-json" aria-label="Gefilterte Liste als JSON exportieren" title="Gefilterte Liste als JSON exportieren"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v11M12 3 8 7M12 3l4 4M5 12v7h14v-7"/></svg></button>
        </div>
      </div>
      <!-- Row 2: filter section — search + shard/list toggle + collapsed tray.
           data-pg-* attributes are wired by the shell grammar. -->
      <div class="reports-filterbar">
        <input class="ctox-pane-search" type="search" data-pg-search placeholder="Suchen..." aria-label="Bugs und Features suchen" />
        <div class="reports-view-toggle" role="group" aria-label="Darstellung">
          <button type="button" class="ctox-pane-icon" data-pg-view="cards" aria-pressed="true" aria-label="Shard-Ansicht" title="Shard-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="14" width="16" height="7" rx="1.5"/></svg></button>
          <button type="button" class="ctox-pane-icon" data-pg-view="list" aria-pressed="false" aria-label="Listen-Ansicht" title="Listen-Ansicht"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
        </div>
        <button type="button" class="ctox-pane-icon reports-filter-toggle" data-pg-tray-toggle aria-expanded="false" aria-label="Filter" title="Filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.4" fill="var(--surface-2)"/><circle cx="15" cy="12" r="2.4" fill="var(--surface-2)"/><circle cx="8" cy="17" r="2.4" fill="var(--surface-2)"/></svg></button>
      </div>
      <div class="reports-filter-advanced" data-pg-tray hidden>
        <div class="reports-filter-row">
          <select class="ctox-select reports-select" data-pg-filter data-pg-name="status" data-pg-default="all" aria-label="Status filtern">
            <option value="all">Alle Status</option>
            <option value="open">Offen</option>
            <option value="running">In Arbeit</option>
            <option value="completed">Erledigt</option>
            <option value="blocked">Blockiert</option>
          </select>
          <button type="button" class="reports-sort-dir reports-filter-reset" data-pg-reset aria-label="Filter zurücksetzen" title="Filter zurücksetzen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10a8 8 0 1 1 2 7"/><path d="M4 5v5h5"/></svg></button>
        </div>
      </div>
    </header>
    <!-- Row 3: counted view band (zeros filled by the module, zeros included). -->
    <nav class="reports-view-switch" data-report-kind-chips aria-label="Typ Ansichten">
      <div class="ctox-pane-tabs">
        <button type="button" class="ctox-pane-tab is-active" role="tab" data-pg-band="all" aria-selected="true">Alle<span class="view-count" data-pg-count="all"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="bug" aria-selected="false">Bugs<span class="view-count" data-pg-count="bug"></span></button>
        <button type="button" class="ctox-pane-tab" role="tab" data-pg-band="feature" aria-selected="false">Features<span class="view-count" data-pg-count="feature"></span></button>
      </div>
    </nav>
    <div class="ctox-pane-body reports-well">
      <div class="ctox-list" data-reports-list></div>
    </div>
    <footer class="reports-footer"><span data-pg-footer></span></footer>
  </aside>
  <button class="ctox-column-resizer" type="button" data-resizer="left" data-resizer-var="--ctox-left-width" data-resizer-min="260" data-resizer-max="500" aria-label="Spaltenbreite anpassen"></button>
  <section class="ctox-pane reports-detail" data-reports-detail aria-label="Report Details">
    <header class="ctox-pane-header ctox-pane-band">
      <div class="ctox-pane-title-row">
        <div class="ctox-pane-titles">
          <span class="ctox-pane-kicker" data-report-kind-label></span>
          <h2 class="ctox-pane-title" data-report-title>Eintrag auswählen</h2>
        </div>
        <div class="ctox-pane-actions">
          <button type="button" class="ctox-pane-icon reports-toggle-actions" data-toggle-actions title="Aktionen einblenden" aria-label="Aktionen einblenden" aria-pressed="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/></svg>
          </button>
        </div>
      </div>
    </header>
    <div class="ctox-pane-scroll reports-detail-scroll" data-reports-detail-scroll></div>
    <footer class="reports-footer"><span data-pg-footer></span></footer>
  </section>
  <button class="ctox-column-resizer" type="button" data-resizer="right" data-resizer-var="--ctox-right-width" data-resizer-min="280" data-resizer-max="440" aria-label="Spaltenbreite anpassen"></button>
  <aside class="ctox-pane reports-actions" aria-label="Report Aktionen" data-reports-actions></aside>
</main>
