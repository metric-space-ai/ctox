<!doctype html>
<html lang="de" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <base href="/business-os/">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CTOX Business OS</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230e1417'/%3E%3Cpath d='M16 4 27 10v12l-11 6-11-6V10z' fill='%2310b981' fill-opacity='.2' stroke='%2322d3ee' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%2310b981'/%3E%3C/svg%3E" />
    <script>
      (() => {
        try {
          const prefs = JSON.parse(localStorage.getItem('ctox.businessOs.accountPreferences') || '{}') || {};
          const theme = prefs.theme === 'light' ? 'light' : 'dark';
          const language = prefs.language === 'en' ? 'en' : 'de';
          const shellStyle = prefs.shellStyle === 'macos' ? 'macos' : 'windows';
          document.documentElement.dataset.theme = theme;
          document.documentElement.lang = language;
          document.documentElement.dataset.shellStyle = shellStyle;
        } catch {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.dataset.shellStyle = 'windows';
        }
      })();
    </script>
    <style>
      html[data-theme="dark"] {
        background: #0e1417;
        color: #eef3f5;
      }
      html[data-theme="light"] {
        background: #eef5f8;
        color: #162127;
      }
      body[data-module-shell="full"] .workspace-frame,
      body[data-module-loading] .workspace-frame {
        grid-template-columns: minmax(0, 1fr) !important;
      }
      body[data-module-shell="full"] .workspace-pane-left,
      body[data-module-shell="full"] .workspace-pane-right,
      body[data-module-loading] .workspace-pane-left,
      body[data-module-loading] .workspace-pane-right {
        display: none !important;
      }
      /* When the server already knows the request is unauthenticated, never paint
         the workspace startup loader — it falsely implies data is loading. */
      html[data-auth-state="locked"] #startup-loader {
        display: none !important;
      }
    </style>
    <link rel="stylesheet" href="app.css?v=20260623-shell-icons" />
    <link rel="stylesheet" href="shared/base.css?v=20260609-base1" />
  </head>
  <body data-module-shell="full" data-module-loading="startup">
    <script>
      (() => {
        try {
          const session = window.CTOX_BUSINESS_OS_SESSION;
          if (session && session.authenticated === false) {
            document.documentElement.dataset.authState = 'locked';
          }
        } catch {}
      })();
    </script>
    <div class="app-shell" data-shell>
      <header class="topbar">
        <div class="topbar-left-group">
          <div class="topbar-brand-triad">
            <button class="topbar-triad-button start-button" type="button" data-shell-start aria-label="Startmenü öffnen" title="Startmenü öffnen" data-shell-t-aria="startMenuOpen" data-shell-t-title="startMenuOpen">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1.5" />
                <rect x="14" y="3" width="7" height="7" rx="1.5" />
                <rect x="3" y="14" width="7" height="7" rx="1.5" />
                <rect x="14" y="14" width="7" height="7" rx="1.5" />
              </svg>
            </button>
            <button class="topbar-triad-button show-desktop-button" type="button" data-show-desktop aria-label="Desktop anzeigen" title="Desktop anzeigen" data-shell-t-aria="showDesktop" data-shell-t-title="showDesktop">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 5.5h16v13H4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
                <path d="M8 9h8M8 12h8M8 15h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
            <button class="topbar-triad-button ctox-button" type="button" data-shell-ctox aria-label="CTOX AI Core öffnen" title="CTOX AI Core öffnen" data-shell-t-aria="ctoxCoreOpen" data-shell-t-title="ctoxCoreOpen">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <defs>
                  <linearGradient id="grad-triad-ctox" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#10b981" />
                    <stop offset="100%" stop-color="#06b6d4" />
                  </linearGradient>
                </defs>
                <polygon points="12,2 2,7 12,12 22,7" fill="url(#grad-triad-ctox)" fill-opacity="0.25" stroke="url(#grad-triad-ctox)" stroke-width="2" stroke-linejoin="round" />
                <polygon points="2,7 2,17 12,22 12,12" fill="url(#grad-triad-ctox)" fill-opacity="0.15" stroke="url(#grad-triad-ctox)" stroke-width="2" stroke-linejoin="round" />
                <polygon points="12,12 12,22 22,17 22,7" fill="url(#grad-triad-ctox)" fill-opacity="0.15" stroke="url(#grad-triad-ctox)" stroke-width="2" stroke-linejoin="round" />
                <circle cx="12" cy="12" r="3" fill="url(#grad-triad-ctox)" />
              </svg>
            </button>
            <span class="triad-separator" aria-hidden="true"></span>
            <button class="topbar-triad-button back-button" type="button" data-shell-back aria-label="Zurück" title="Zurück" data-shell-t-aria="navBack" data-shell-t-title="navBack" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="topbar-triad-button forward-button" type="button" data-shell-forward aria-label="Vorwärts" title="Vorwärts" data-shell-t-aria="navForward" data-shell-t-title="navForward" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="topbar-status-bar">
            <button class="ctox-shell-warning" type="button" data-ctox-shell-warning hidden data-shell-t="ctoxNotWorking">CTOX Verbindung prüfen</button>
            <span class="brand-status" data-status-text>Starting native runtime</span>
          </div>
        </div>
        <div class="module-nav">
          <nav class="module-tabs" data-module-tabs aria-label="Geöffnete Apps" data-shell-t-aria="openApps"></nav>
        </div>
        <div class="topbar-actions">
          <button class="account-button" type="button" data-open-account aria-label="Login öffnen" data-shell-t-aria="loginOpen">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 12.5a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path>
              <path d="M4.75 20.25a7.25 7.25 0 0 1 14.5 0"></path>
            </svg>
            <span data-account-label>Login</span>
          </button>
          <button class="icon-button app-menu-button" type="button" data-open-settings aria-label="App-Menü öffnen" data-shell-t-aria="appMenuOpen">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 7h14M5 12h14M5 17h14"></path>
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace-frame">
        <aside class="workspace-pane workspace-pane-left" data-left-pane>
          <div class="pane-title" data-shell-t="context">Context</div>
          <div data-left-content></div>
        </aside>

        <section class="workspace-pane workspace-pane-center" data-module-host>
          <div class="workspace-startup-loader" id="startup-loader">
            <div class="startup-logo-container">
              <div class="startup-logo-glow"></div>
              <svg class="startup-logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#10b981" />
                    <stop offset="100%" stop-color="#06b6d4" />
                  </linearGradient>
                </defs>
                <path d="M50 15 L85 35 L85 75 L50 95 L15 75 L15 35 Z" stroke="url(#logoGrad)" stroke-width="4" stroke-linejoin="round" />
                <path d="M50 30 L73 43 L73 70 L50 83 L27 70 L27 43 Z" fill="url(#logoGrad)" fill-opacity="0.15" stroke="url(#logoGrad)" stroke-width="2" />
                <path d="M50 15 L50 95" stroke="url(#logoGrad)" stroke-width="1.5" stroke-dasharray="4 4" />
                <path d="M15 35 L85 75" stroke="url(#logoGrad)" stroke-width="1.5" stroke-dasharray="4 4" />
                <path d="M85 35 L15 75" stroke="url(#logoGrad)" stroke-width="1.5" stroke-dasharray="4 4" />
                <circle cx="50" cy="50" r="10" fill="url(#logoGrad)" />
              </svg>
            </div>
            <h2 class="startup-title">CTOX Business OS</h2>
            <div class="startup-progress-container">
              <div class="startup-progress-bar" id="startup-progress-bar"></div>
            </div>
            <div class="startup-status-text" id="startup-status-text" data-shell-t="startupStarting">System wird gestartet...</div>

            <div class="startup-error-card" id="startup-error-card" hidden>
              <div class="error-header">
                <svg class="error-warning-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="12" y1="9" x2="12" y2="13" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="12" y1="17" x2="12.01" y2="17" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h3 data-shell-t="startupFailedTitle">System-Start fehlgeschlagen</h3>
              </div>
              <div class="error-body">
                <p data-shell-t="startupFailedBody">Bei der Verbindung zum lokalen Daten-Netzwerk ist ein schwerwiegender Fehler aufgetreten. Der lokale RxDB-Catalog-Sync meldet:</p>
                <code class="error-msg-block" id="startup-error-msg"></code>
              </div>
              <div class="error-footer">
                <button class="error-retry-btn" id="startup-retry-btn" type="button">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 11-.57-8.38l5.67-5.67" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span data-shell-t="startupRetry">Erneut versuchen</span>
                </button>
              </div>
            </div>
          </div>
        </section>

        <aside class="workspace-pane workspace-pane-right" data-right-pane>
          <div class="pane-title" data-shell-t="topics">Topics</div>
          <div data-right-content></div>
        </aside>
      </main>
    </div>

    <div class="drawer-backdrop" data-backdrop hidden></div>
    <aside class="drawer drawer-left" data-drawer-left hidden></aside>
    <aside class="drawer drawer-right" data-drawer-right hidden></aside>
    <section class="drawer drawer-bottom" data-drawer-bottom hidden></section>

    <div class="shell-window-layer" data-shell-window-layer></div>
    <nav class="shell-taskbar" data-shell-taskbar aria-label="Offene Fenster" data-shell-t-aria="openWindowsAria"></nav>
    <div class="shell-window-switcher" data-shell-window-switcher hidden aria-hidden="true">
      <div class="shell-window-switcher-panel" data-shell-window-switcher-panel role="listbox"></div>
    </div>
    <aside class="shell-notifications" data-shell-notifications aria-live="polite" aria-label="Benachrichtigungen" data-shell-t-aria="notificationsAria"></aside>

    <script type="module" src="app.js?v=20260629-runtime-app-allowlist-v1"></script>
  </body>
</html>
