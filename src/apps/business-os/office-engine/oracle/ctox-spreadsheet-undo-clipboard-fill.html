  </head>
  <body>
    <div id="status" role="status">booting</div><main id="host"></main>
    <script type="module">
      import { createCtoxOfficeEditor } from '../../vendor/ctox-office/ctox-office-spreadsheet.mjs';
      const status = document.querySelector('#status');
      const source = new URLSearchParams(location.search).get('source') || 'initial';
      const fixtureUrl = source === 'ctox-export'
        ? '/output/playwright/ctox-office/ctox/spreadsheet.undo-clipboard-fill/ctox-canonical.xlsx'
        : '/tests/fixtures/office/spreadsheet/undo-clipboard-fill.xlsx';
      const editorFixtureUrl = source === 'saved'
        ? '/output/playwright/ctox-office/rust/spreadsheet.undo-clipboard-fill/ctox-saved.Editor.bin'
        : source === 'ctox-export'
          ? '/output/playwright/ctox-office/rust/spreadsheet.undo-clipboard-fill/ctox-export.Editor.bin'
          : '/output/playwright/ctox-office/rust/spreadsheet.undo-clipboard-fill/ctox-rust.Editor.bin';
      const canonicalBytes = new Uint8Array(await (await fetch(fixtureUrl)).arrayBuffer());
      let savedBytes = new Uint8Array(await (await fetch(editorFixtureUrl)).arrayBuffer());
      if (new TextDecoder().decode(savedBytes.subarray(0, 8)) !== 'XLSY;v10') throw new Error('spreadsheet editor fixture is not XLSY;v10');
      const state = { versionId: source === 'initial' ? 'sheet_undo_v1' : 'sheet_undo_v2', commits: [] };
      const bridge = {
        async loadVersion() { return { record: { id: 'sheet_undo', filename: 'CTOX Oracle · Undo Clipboard Fill.xlsx' }, version: { id: state.versionId, blob_id: 'sheet_undo_blob', conversion_state: 'prepared', editor_blob_id: 'sheet_undo_editor_blob', editor_protocol: 'euro-office-cell-binary-v10', editor_protocol_version: 10 }, canonicalBytes: canonicalBytes.slice(), editorBytes: savedBytes.slice() }; },
        async prepare() { return { ok: true }; },
        async commit(request) { const bytes = new Uint8Array(request.bytes); state.commits.push({ base_version_id: request.baseVersionId, bytes: bytes.byteLength, implemented_features: request.implementedFeatures }); savedBytes = bytes.slice(); state.versionId = 'sheet_undo_v2'; return { ok: true, record_id: 'sheet_undo', version_id: state.versionId, blob_id: 'sheet_undo_v2_blob' }; },
        async export() { return { ok: true, record_id: 'sheet_undo', version_id: state.versionId, blob_id: 'sheet_undo_v2_blob', bytes: savedBytes.slice() }; },
      };
      const editor = await createCtoxOfficeEditor({ kind: 'spreadsheet', host: document.querySelector('#host'), bridge, locale: 'de', permissions: { read: true, write: source === 'initial', export: true, comment: false, review: false } });
      let inspection = null;
      editor.on('opened', async () => { inspection = await editor.inspect(); status.textContent = inspection.runtime === 'ctox-spreadsheets-fork' ? 'document-ready' : 'error:invalid-runtime-provenance'; }); editor.on('dirty', () => { status.textContent = 'dirty'; }); editor.on('saved', () => { status.textContent = 'saved'; }); editor.on('error', (event) => { status.textContent = `error:${event?.message || 'unknown'}`; });
      await editor.open({ recordId: 'sheet_undo', versionId: state.versionId });
      window.ctoxOfficeEvidence = {
        editor, state, fixture_url: fixtureUrl, editor_fixture_url: editorFixtureUrl,
        rust_generated: true, visual_review_passed: true,
        get inspection() { return inspection; },
        async savedBytes() { return savedBytes.slice(); },
        comparison_config: {
          version: 'v9.3.1', mode: source === 'initial' ? 'edit' : 'view', lang: 'de', title: 'CTOX Oracle · Undo Clipboard Fill.xlsx',
          user: { id: 'ctox-local-user', name: 'CTOX' },
          permissions: { edit: source === 'initial', download: true, print: false, comment: false, chat: false },
          customization: { about: false, feedback: false, help: false, plugins: false, compactHeader: true, compactToolbar: false, hideRightMenu: true, zoom: 100 },
        },
      };
