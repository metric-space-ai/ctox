<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" href="data:,">
    <title>Euro-Office Reopen · document.comments-track-changes</title>
    <style>
      html,body,#oracle-editor{height:100%;margin:0;overflow:hidden;background:#e7ebea}
      #oracle-status{position:fixed;z-index:20;right:12px;top:8px;padding:5px 9px;border-radius:4px;background:#17211fee;color:#fff;font:12px ui-monospace,monospace;pointer-events:none}
    </style>
    <script src="http://127.0.0.1:8088/web-apps/apps/api/documents/api.js"></script>
  </head>
  <body>
    <div id="oracle-status" role="status">booting</div>
    <div id="oracle-editor"></div>
    <script>
      const status = document.querySelector('#oracle-status');
      const events = [];
      const record = (name, payload = {}) => { events.push({ name, payload, at_ms: Date.now() }); status.textContent = name; };
      const params = new URLSearchParams(location.search);
      const source = params.get('source') === 'oracle' ? 'saved' : 'saved-ctox';
      const oracleRun = params.get('run') || String(Date.now());
      const reopenMode = params.get('mode') === 'edit' ? 'edit' : 'view';
      const documentUrl = `http://host.lima.internal:4180/${source}/document.comments-track-changes.docx`;
      const config = {
        type: 'desktop', width: '100%', height: '100%', documentType: 'word',
        document: {
          fileType: 'docx', key: `ctox-document-comments-track-changes-export-${source}-${oracleRun}`,
          title: 'CTOX Export · Comments Track Changes.docx', url: documentUrl,
          permissions: { edit: reopenMode === 'edit', download: true, print: false, comment: true, review: true },
        },
        editorConfig: { lang: 'de', mode: reopenMode, user: { id: 'ctox-reopen', name: 'CTOX Reopen' }, customization: { about: false, feedback: false, help: false, plugins: false, compactHeader: true, hideRightMenu: false, zoom: 100 } },
        events: {
          onAppReady: (event) => record('app-ready', event?.data),
          onDocumentReady: (event) => record('document-ready', event?.data),
          onError: (event) => record('error', event?.data),
          onWarning: (event) => record('warning', event?.data),
        },
      };
      window.oracleEvidence = { feature_id: 'document.comments-track-changes', document_url: documentUrl, config, events };
      window.oracleEditor = new DocsAPI.DocEditor('oracle-editor', config);
    </script>
  </body>
</html>
