interfaces:
  - display_name: Business OS App Module Development
    short_description: Build runnable CTOX Business OS app modules with native ESM, CTOX DB/WebRTC persistence, command-bus automation, and guard validation.
    default_prompt: Build or modify this CTOX Business OS app module. Your first app-building step is to choose and inspect the three most relevant existing Business OS apps as references, then build a vanilla HTML/CSS/browser ESM app that uses ctx.db for persistence and ctx.commandBus.dispatch for automation. Run the CTOX app validator and report the exact result.
