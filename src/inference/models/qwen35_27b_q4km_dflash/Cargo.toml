[package]
name = "ctox-qwen35-27b-q4km-dflash"
version = "0.1.0"
edition = "2021"
rust-version = "1.88"
license = "Apache-2.0"
description = "Self-contained Qwen3.5-27B Q4_K_M target + DFlash speculative-decoding draft. Byte-exact Rust port of lucebox/dflash. All ggml + ggml-cuda CUDA kernels and the ggml C FFI are vendored inside this crate — no code shared with other models."

# Keep this crate OUT of any parent workspace. The tree sits under
# src/inference/ physically, but src/inference/ is the OpenAI-Codex-fork
# workspace (edition 2024, strict lints) which this port cannot live in,
# and we don't want it picked up by tools/model-runtime/Cargo.toml either.
# Declaring an empty [workspace] here makes this a self-contained crate.
[workspace]

[lib]
name = "ctox_qwen35_27b_q4km_dflash"
path = "src/lib.rs"

[[bin]]
name = "qwen35-27b-q4km-dflash-bench"
path = "src/bin/bench.rs"
required-features = ["cuda"]

[[bin]]
# Local inference socket server. Speaks CTOX's line-delimited JSON IPC on
# a Unix domain socket (matches src/harness/core/src/client.rs::LocalIpcRequest).
# No HTTP, no network listener — peer UID check via SO_PEERCRED. Emits
# OpenAI Responses API stream events. See src/server.rs.
name = "qwen35-27b-q4km-dflash-server"
path = "src/bin/server.rs"
required-features = ["cuda"]

[[bin]]
# Standalone bit-exact verifier for the `cuda_port::ops::norm` Rust port.
# Runs rms_norm on a device-allocated f32 tensor via the ported
# dispatcher, compares against a CPU reference implementation.
name = "qwen35-27b-q4km-dflash-rms-norm-verify"
path = "src/bin/rms_norm_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::unary` port — exercises silu,
# neg, exp on f32 and byte-compares against CPU reference impls.
name = "qwen35-27b-q4km-dflash-unary-verify"
path = "src/bin/unary_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::scale` port.
name = "qwen35-27b-q4km-dflash-scale-verify"
path = "src/bin/scale_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::fill` port (f32 + f16).
name = "qwen35-27b-q4km-dflash-fill-verify"
path = "src/bin/fill_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::diag` port.
name = "qwen35-27b-q4km-dflash-diag-verify"
path = "src/bin/diag_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::binbcast` port (add/sub/mul f32).
name = "qwen35-27b-q4km-dflash-binbcast-verify"
path = "src/bin/binbcast_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::tri` port (four ggml_tri_type variants).
name = "qwen35-27b-q4km-dflash-tri-verify"
path = "src/bin/tri_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::pad` port (f32, circular + non-circular).
name = "qwen35-27b-q4km-dflash-pad-verify"
path = "src/bin/pad_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::cumsum` port (f32 non-CUB fallback).
name = "qwen35-27b-q4km-dflash-cumsum-verify"
path = "src/bin/cumsum_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::concat` port (contig + non-cont f32).
name = "qwen35-27b-q4km-dflash-concat-verify"
path = "src/bin/concat_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::cpy` port
# (f32→f32, f32→f16, f16→f16 via the generic cpy_scalar path).
name = "qwen35-27b-q4km-dflash-cpy-verify"
path = "src/bin/cpy_verify.rs"
required-features = ["cuda"]

[[bin]]
# Verifier for the `cuda_port::ops::solve_tri` port
# (fast kernel, <0,0> general case).
name = "qwen35-27b-q4km-dflash-solve-tri-verify"
path = "src/bin/solve_tri_verify.rs"
required-features = ["cuda"]

[features]
default = []
# CUDA is the only real build mode — the target model is 27B in Q4_K_M,
# which is hopeless without GPU. The feature still exists so `cargo check`
# on a non-CUDA host compiles the Rust surface.
cuda = []

[dependencies]
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
half = { version = "2", features = ["bytemuck"] }
bytemuck = "1"
memmap2 = "0.9"
libc = "0.2"
# Data-parallel helper for the per-position top-K extract in the DDTree
# path. Matches the reference's `#pragma omp parallel for`.
rayon = "1.10"
# First-party parser for the draft model format.
safetensors = "0.4"
# Bench + server CLIs.
clap = { version = "4", features = ["derive"] }
# Server-bin additions: async runtime, socket IO, wire serde, tokenizer.
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "signal", "time", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", default-features = false, features = ["clock"] }

# SO_PEERCRED peer-UID auth on Linux.
[target.'cfg(target_os = "linux")'.dependencies]
nix = { version = "0.30", default-features = false, features = ["socket", "user"] }

[profile.release]
lto = "fat"
codegen-units = 1
