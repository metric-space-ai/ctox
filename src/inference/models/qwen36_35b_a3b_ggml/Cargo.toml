[package]
name = "ctox-qwen36-35b-a3b-ggml"
version = "0.1.0"
edition = "2021"
rust-version = "1.88"
license = "Apache-2.0"
description = "Qwen3.6-35B-A3B ggml/CUDA Unix-socket backend for CTOX local Responses IPC."

[workspace]

[[bin]]
name = "qwen36-35b-a3b-ggml-server"
path = "src/main.rs"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "signal", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4"] }

[target.'cfg(target_os = "linux")'.dependencies]
nix = { version = "0.30", default-features = false, features = ["socket", "user"] }

[profile.release]
lto = "thin"
codegen-units = 1
